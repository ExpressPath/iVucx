services:
  - type: web
    name: ivucx
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEAN_WORKDIR
        value: /app/lean
      - key: LEAN_CMD
        value: lake
      - key: LEAN_ARGS
        value: env lean
