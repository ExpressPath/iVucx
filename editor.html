<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iVucx Editor</title>
  <style>
    :root{
      --bg:#0d1117;
      --panel:#11161c;
      --ink:#e6edf3;
      --muted:#9aa7b6;
      --line:#2d333b;
      --accent:#2f81f7;
      --accent-dark:#0f4aa6;
      --ok:#3fb950;
      --warn:#ff7b72;
      --header:#010409;
      --header-ink:#e6edf3;
    }

    *,*::before,*::after{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:56px;
      padding:10px 14px;
      background:var(--header);
      color:var(--header-ink);
      border-bottom:1px solid #1b1f24;
    }

    .left-cluster,
    .right-cluster{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .product{
      font-size:14px;
      font-weight:650;
      white-space:nowrap;
    }

    .lang-badge{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.28);
      font-size:12px;
      font-weight:650;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .file-name{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      color:#d0d7de;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }

    .btn{
      border:1px solid transparent;
      background:#1f2937;
      border-color:#374151;
      color:#e6edf3;
      border-radius:8px;
      height:34px;
      padding:0 12px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      transition:background-color .2s ease,color .2s ease,border-color .2s ease,transform .12s ease;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .btn-back{
      background:transparent;
      border-color:rgba(255,255,255,0.25);
      color:#f6f8fa;
      width:34px;
      min-width:34px;
      padding:0;
      border-radius:999px;
      font-size:24px;
      line-height:1;
    }

    .btn-back:hover{
      background:rgba(255,255,255,0.08);
    }

    .btn-run{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .btn-run:hover{
      background:var(--accent-dark);
      border-color:var(--accent-dark);
    }

    .runner-input{
      width:min(44vw, 380px);
      min-width:180px;
      height:34px;
      border-radius:8px;
      border:1px solid #374151;
      background:rgba(17,24,39,0.8);
      color:#e6edf3;
      font-size:12px;
      padding:0 10px;
      outline:none;
    }

    .runner-input::placeholder{
      color:#8b96a5;
    }

    .workspace{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(360px, 1fr) minmax(280px, 36%);
      gap:10px;
      padding:10px;
    }

    .pane{
      min-height:0;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .pane-head{
      flex:0 0 38px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 12px;
      border-bottom:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
      background:linear-gradient(to bottom, #141b23, #10161d);
    }

    .status{
      font-weight:650;
      color:var(--ok);
    }

    .status.error{
      color:var(--warn);
    }

    .editor-frame{
      flex:1;
      min-height:0;
      position:relative;
      background:#0d1117;
    }

    #editor{
      position:absolute;
      inset:0;
    }

    #fallbackEditor{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      outline:none;
      resize:none;
      padding:16px;
      font-size:14px;
      line-height:1.5;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      background:#0d1117;
      color:#e6edf3;
      display:none;
    }

    #coq,
    #ide-wrapper{
      position:fixed;
      width:1px;
      height:1px;
      top:-10000px;
      left:-10000px;
      overflow:hidden;
      opacity:0;
      pointer-events:none;
      z-index:-1;
    }

    #outputPanel{
      flex:1;
      margin:0;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      padding:14px;
      font-size:13px;
      line-height:1.45;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      color:#c9d1d9;
      background:#0d1117;
    }

    @media (max-width:1020px){
      .workspace{
        grid-template-columns:1fr;
        grid-template-rows:minmax(300px, 1fr) minmax(180px, 42%);
      }

      .right-cluster{
        width:100%;
        justify-content:flex-end;
      }
    }

    @media (max-width:760px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .left-cluster,
      .right-cluster{
        width:100%;
      }

      .right-cluster{
        justify-content:space-between;
      }

      .runner-input{
        width:100%;
        min-width:0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="left-cluster">
      <button class="btn btn-back" id="backBtn" type="button" aria-label="Back to summary">×</button>
      <div class="product">iVucx Editor</div>
      <div class="lang-badge" id="langBadge">Lean</div>
      <div class="file-name" id="fileName">Main.lean</div>
    </div>
    <div class="right-cluster">
      <input
        class="runner-input"
        id="runnerEndpoint"
        type="text"
        placeholder="Runner endpoint (e.g. https://example.com/api/run)"
        autocomplete="off"
      />
      <button class="btn btn-run" id="runBtn" type="button">Run</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane">
      <div class="pane-head">
        <span>Editor</span>
        <span class="status" id="statusText">Ready</span>
      </div>
      <div class="editor-frame">
        <div id="editor"></div>
        <textarea id="fallbackEditor" spellcheck="false"></textarea>
      </div>
    </section>

    <section class="pane">
      <div class="pane-head">
        <span>Server Output</span>
        <span>Ctrl/Cmd + Enter to run</span>
      </div>
      <pre id="outputPanel"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script>
    (function(){
      const INIT_STORAGE_KEY = 'ivucxEditorInit';
      const EDITOR_RETURN_KEY = 'ivucxEditorReturn';
      const RUNNER_STORAGE_KEY = 'ivucxRunnerEndpoint';

      const langBadgeEl = document.getElementById('langBadge');
      const fileNameEl = document.getElementById('fileName');
      const outputEl = document.getElementById('outputPanel');
      const statusEl = document.getElementById('statusText');
      const runnerEndpointEl = document.getElementById('runnerEndpoint');
      const runBtn = document.getElementById('runBtn');
      const backBtn = document.getElementById('backBtn');
      const fallbackEditor = document.getElementById('fallbackEditor');
      const editorMount = document.getElementById('editor');

      const languageConfig = {
        Lean: {
          monacoId: 'ivucx-lean',
          fileName: 'Main.lean',
          extension: '.lean',
          starter: [
            'theorem hello : True := by',
            '  trivial'
          ].join('\n')
        },
        Coq: {
          monacoId: 'ivucx-coq',
          fileName: 'Main.v',
          extension: '.v',
          starter: [
            'Theorem hello : True.',
            'Proof.',
            '  exact I.',
            'Qed.'
          ].join('\n')
        },
        Isabelle: {
          monacoId: 'ivucx-isabelle',
          fileName: 'Main.thy',
          extension: '.thy',
          starter: [
            'theory Main',
            '  imports Main',
            'begin',
            '',
            'lemma hello: "True"',
            '  by simp',
            '',
            'end'
          ].join('\n')
        },
        Agda: {
          monacoId: 'ivucx-agda',
          fileName: 'Main.agda',
          extension: '.agda',
          starter: [
            'module Main where',
            '',
            'data True : Set where',
            '  triv : True',
            '',
            'hello : True',
            'hello = triv'
          ].join('\n')
        }
      };

      const initPayload = readInitPayload();
      const params = new URLSearchParams(window.location.search);
      const selectedLanguage = resolveLanguage(params.get('lang') || initPayload.proofAssistant || 'Lean');
      const selectedConfig = languageConfig[selectedLanguage];
      window.__ivucxNeedsJsCoq = selectedLanguage === 'Coq';
      window.__ivucxNeedsLean4 = selectedLanguage === 'Lean';

      langBadgeEl.textContent = selectedLanguage;
      fileNameEl.textContent = selectedConfig.fileName;

      updateRunnerInputVisibility(selectedLanguage);

      const restoredRunner = params.get('runner') || safeStorageGet(localStorage, RUNNER_STORAGE_KEY);
      runnerEndpointEl.value = restoredRunner;

      const summaryText = typeof initPayload.summary === 'string'
        ? initPayload.summary
        : (typeof initPayload.draft === 'string' ? initPayload.draft : '');
      const initialDraft = initPayload.keepSummaryBackground
        ? ''
        : (typeof initPayload.draft === 'string'
          ? initPayload.draft
          : summaryText);


      let editorInstance = null;
      let useFallbackEditor = false;
      let monacoRef = null;
      let running = false;
      let jscoqReady = false;
      let jscoqInitPromise = null;
      let jscoqInitError = '';
      let lean4Ready = false;
      let lean4InitPromise = null;
      let lean4InitError = '';


      setStatus('Ready');
      setInitialOutputMessage(selectedLanguage, selectedConfig.fileName, initPayload, restoredRunner, summaryText);

      // Coqの場合はjsCoq初期化完了までRunボタンを無効化
      if(selectedLanguage === 'Coq') {
        initializeCoqRuntime();
      }
      if(selectedLanguage === 'Lean') {
        initializeLeanRuntime();
      }

      backBtn.addEventListener('click', ()=>{
        handleBackNavigation();
      });

      runnerEndpointEl.addEventListener('change', ()=>{
        safeStorageSet(localStorage, RUNNER_STORAGE_KEY, runnerEndpointEl.value.trim());
      });

      runBtn.addEventListener('click', ()=>{
        runProof();
      });

      initializeEditor(initialDraft, selectedLanguage);
      window.addEventListener('paste', handleProofFilePaste, true);

      function readInitPayload(){
        try{
          const raw = sessionStorage.getItem(INIT_STORAGE_KEY);
          if(!raw) return {};
          sessionStorage.removeItem(INIT_STORAGE_KEY);
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        }catch(err){
          return {};
        }
      }

      function resolveLanguage(value){
        const input = String(value || '').trim().toLowerCase();
        if(input === 'coq') return 'Coq';
        if(input === 'isabelle') return 'Isabelle';
        if(input === 'agda') return 'Agda';
        return 'Lean';
      }

      function safeStorageGet(storage, key){
        try{
          return storage.getItem(key) || '';
        }catch(err){
          return '';
        }
      }

      function safeStorageHas(storage, key){
        try{
          return storage.getItem(key) !== null;
        }catch(err){
          return false;
        }
      }

      function safeStorageSet(storage, key, value){
        try{
          storage.setItem(key, value);
          return true;
        }catch(err){
          return false;
        }
      }

      function tryParseJson(text){
        if(typeof text !== 'string') return null;
        const trimmed = text.trim();
        if(!trimmed) return null;
        if(!/^[\[{]/.test(trimmed)) return null;
        try{
          return JSON.parse(trimmed);
        }catch(err){
          return null;
        }
      }

      function setStatus(text, isError){
        statusEl.textContent = text;
        statusEl.classList.toggle('error', !!isError);
      }

      function updateRunnerInputVisibility(language){
        const isLocalValidationMode = language === 'Coq' || language === 'Lean';
        runnerEndpointEl.style.display = isLocalValidationMode ? 'none' : 'block';
      }

      function waitForAutoInitJsCoq(timeoutMs = 20000){
        if(typeof autoInitJsCoq === 'function') return Promise.resolve();
        return new Promise((resolve, reject)=>{
          const started = Date.now();
          function check(){
            if(typeof autoInitJsCoq === 'function'){
              resolve();
              return;
            }
            if(Date.now() - started > timeoutMs){
              reject(new Error('autoInitJsCoq is not available'));
              return;
            }
            setTimeout(check, 50);
          }
          check();
        });
      }

      function initializeCoqRuntime(forceRetry = false){
        if(jscoqInitPromise && !forceRetry){
          return jscoqInitPromise;
        }
        jscoqReady = false;
        runBtn.disabled = true;
        jscoqInitPromise = waitForAutoInitJsCoq()
          .then(()=>{
            if(typeof autoInitJsCoq !== 'function'){
              throw new Error('autoInitJsCoq is not defined');
            }
            return autoInitJsCoq();
          })
          .then(()=>{
            jscoqInitError = '';
            jscoqReady = true;
            runBtn.disabled = false;
          })
          .catch((err)=>{
            jscoqInitError = err && err.message ? err.message : String(err);
            setStatus('jsCoq初期化失敗', true);
            runBtn.disabled = true;
          });
        return jscoqInitPromise;
      }

      function waitForAutoInitLean4(timeoutMs = 20000){
        if(typeof autoInitLean4 === 'function') return Promise.resolve();
        return new Promise((resolve, reject)=>{
          const started = Date.now();
          function check(){
            if(typeof autoInitLean4 === 'function'){
              resolve();
              return;
            }
            if(Date.now() - started > timeoutMs){
              reject(new Error('autoInitLean4 is not available'));
              return;
            }
            setTimeout(check, 50);
          }
          check();
        });
      }

      function initializeLeanRuntime(forceRetry = false){
        if(lean4InitPromise && !forceRetry){
          return lean4InitPromise;
        }
        lean4Ready = false;
        runBtn.disabled = true;
        lean4InitPromise = waitForAutoInitLean4()
          .then(()=>{
            if(typeof autoInitLean4 !== 'function'){
              throw new Error('autoInitLean4 is not defined');
            }
            return autoInitLean4();
          })
          .then(()=>{
            lean4InitError = '';
            lean4Ready = true;
            runBtn.disabled = false;
          })
          .catch((err)=>{
            lean4InitError = err && err.message ? err.message : String(err);
            setStatus('Lean 4初期化失敗', true);
            runBtn.disabled = true;
          });
        return lean4InitPromise;
      }

      function setInitialOutputMessage(language, fileName, payload, runnerEndpoint, summary){
        const lines = [
          'Editor initialized.',
          'Language: ' + language,
          'File: ' + fileName
        ];

        if(typeof summary === 'string'){
          lines.push('Summary is stored separately (' + summary.length + ' chars).');
        }

        // files変数は未定義のため削除

        if(language === 'Coq' || language === 'Lean'){
          lines.push('Local runtime validation mode is enabled.');
        } else if(runnerEndpoint){
          lines.push('Runner endpoint: ' + runnerEndpoint);
        } else {
          lines.push('Runner endpoint is empty. Set endpoint and press Run.');
        }

        lines.push('Shortcut: Ctrl/Cmd + Enter');
        outputEl.textContent = lines.join('\n');
      }

      function initializeEditor(initialText, language){
        if(typeof window.require !== 'function'){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco could not be loaded. Fallback textarea is active.';
          return;
        }

        window.require.config({
          paths: {
            vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
          }
        });

        window.require(['vs/editor/editor.main'], function(){
          monacoRef = window.monaco;
          registerCustomLanguages(monacoRef);
          defineEditorTheme(monacoRef);

          editorInstance = monacoRef.editor.create(editorMount, {
            value: initialText,
            language: selectedConfig.monacoId,
            theme: 'ivucx-github-light',
            automaticLayout: true,
            minimap: { enabled: false },
            smoothScrolling: true,
            scrollBeyondLastLine: false,
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 14,
            lineNumbersMinChars: 3,
            tabSize: 2
          });

          editorInstance.addCommand(monacoRef.KeyMod.CtrlCmd | monacoRef.KeyCode.Enter, function(){
            runProof();
          });
        }, function(){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco loading failed. Fallback textarea is active.';
        });
      }

      function activateFallbackEditor(initialText){
        useFallbackEditor = true;
        editorMount.style.display = 'none';
        fallbackEditor.style.display = 'block';
        fallbackEditor.value = initialText;
        fallbackEditor.addEventListener('keydown', function(e){
          const isRunShortcut = (e.ctrlKey || e.metaKey) && e.key === 'Enter';
          if(!isRunShortcut) return;
          e.preventDefault();
          runProof();
        });
      }

      function getEditorCode(){
        if(useFallbackEditor) return fallbackEditor.value;
        if(editorInstance) return editorInstance.getValue();
        return '';
      }

      function handleBackNavigation(){
        const currentCode = getEditorCode();
        if(currentCode.length >= 30){
          const shouldReturn = window.confirm('エディタに30文字以上の内容があります。戻るとコード編集内容は破棄されます。戻りますか？');
          if(!shouldReturn) return;
        }

        const returnPayload = {
          summary: summaryText,
          proofAssistant: selectedLanguage,
          returnedAt: new Date().toISOString()
        };

        try{
          sessionStorage.setItem(EDITOR_RETURN_KEY, JSON.stringify(returnPayload));
        }catch(err){
          // Ignore storage failures and continue navigation.
        }

        window.location.href = 'index.html';
      }

      function isEditorFocused(){
        if(useFallbackEditor){
          return document.activeElement === fallbackEditor;
        }

        if(editorInstance && typeof editorInstance.hasTextFocus === 'function'){
          if(editorInstance.hasTextFocus()) return true;
        }

        const active = document.activeElement;
        return !!(active && editorMount.contains(active));
      }

      function insertCodeAtCursor(text){
        if(useFallbackEditor){
          const start = fallbackEditor.selectionStart ?? fallbackEditor.value.length;
          const end = fallbackEditor.selectionEnd ?? fallbackEditor.value.length;
          const before = fallbackEditor.value.slice(0, start);
          const after = fallbackEditor.value.slice(end);
          fallbackEditor.value = before + text + after;
          const nextPos = start + text.length;
          fallbackEditor.selectionStart = nextPos;
          fallbackEditor.selectionEnd = nextPos;
          fallbackEditor.focus();
          return;
        }

        if(editorInstance && monacoRef){
          const range = editorInstance.getSelection();
          editorInstance.executeEdits('proof-file-paste', [{
            range: range,
            text: text,
            forceMoveMarkers: true
          }]);
          editorInstance.pushUndoStop();
          editorInstance.focus();
        }
      }

      async function handleProofFilePaste(e){
        if(!isEditorFocused()) return;

        const clipboard = e.clipboardData;
        if(!clipboard || !clipboard.items) return;

        const files = [];
        for(const item of clipboard.items){
          if(item.kind !== 'file') continue;
          const file = item.getAsFile();
          if(file) files.push(file);
        }

        if(files.length === 0) return;

        const expectedExt = selectedConfig.extension.toLowerCase();
        const matchedFiles = files.filter(file=>{
          const name = (file.name || '').toLowerCase();
          return name.endsWith(expectedExt);
        });

        if(matchedFiles.length === 0) return;

        e.preventDefault();

        const chunks = [];
        for(const file of matchedFiles){
          try{
            const text = await file.text();
            chunks.push(text);
          }catch(err){
            // Skip unreadable files and continue.
          }
        }

        if(chunks.length === 0){
          setStatus('Paste failed', true);
          outputEl.textContent = '[Paste Error]\nThe selected file could not be read from clipboard.';
          return;
        }

        const pasted = chunks.join('\n\n');
        const lineCount = pasted.length === 0 ? 0 : pasted.split(/\r?\n/).length;
        if(lineCount >= 30){
          const shouldPaste = window.confirm('貼り付け内容は ' + lineCount + ' 行です。エディタに挿入しますか？');
          if(!shouldPaste) return;
        }

        insertCodeAtCursor(pasted);
        setStatus('File pasted');
      }


      async function waitJsCoqReady(timeoutMs = 10000) {
        // jscoqInstanceがセットされるまで待つ
        return new Promise((resolve, reject) => {
          const start = Date.now();
          function check() {
            if(jscoqInstance) return resolve();
            if(Date.now() - start > timeoutMs) return reject(new Error('jsCoq初期化タイムアウト'));
            setTimeout(check, 100);
          }
          check();
        });
      }

      async function validateCoqProof(code){
        setStatus('Validating Coq proof...');
        outputEl.textContent = 'jsCoqで証明を検証中...\n';
        const normalized = stripCoqCommentsAndStrings(code);
        const libraryCatalog = buildCoqLibraryCatalog(initPayload);
        const libraryCheck = validateCoqLibraryUsage(normalized, libraryCatalog);
        if(!libraryCheck.ok){
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + libraryCheck.reason;
          return { status: 'rejected', proof_state: 'NN', reason: libraryCheck.reason };
        }
        const axiomConflict = detectCoqAxiomConflict(normalized, libraryCatalog);
        if(axiomConflict){
          const conflictLines = [
            'Library axiom conflicts with proof axiom: ' + axiomConflict.name
          ];
          if(axiomConflict.libraryStatement){
            conflictLines.push('Library axiom: ' + axiomConflict.libraryStatement);
          }
          if(axiomConflict.proofStatement){
            conflictLines.push('Proof axiom: ' + axiomConflict.proofStatement);
          }
          const conflictMessage = conflictLines.join('\n');
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + conflictMessage;
          return { status: 'rejected', proof_state: 'NN', reason: conflictMessage };
        }
        const closure = analyzeCoqClosure(code);
        if(closure.proofState === 'NN'){
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + closure.reason;
          return { status: 'rejected', proof_state: 'NN', reason: closure.reason };
        }

        // jsCoq初期化を確実に待つ
        
        if(jscoqManager && Array.isArray(jscoqManager.error)) {
          jscoqManager.error.length = 0;
        }
        try {
          if(!jscoqInstance) {
            await waitJsCoqReady();
          }
        } catch(e) {
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\njsCoqが初期化されていません（タイムアウト）。ページをリロードしてください。';
          return { status: 'error', proof_state: 'NN', reason: 'jsCoq not initialized' };
        }

        if (!jscoqInstance) {
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\njsCoqが初期化されていません。ページをリロードしてください。';
          return { status: 'error', proof_state: 'NN', reason: 'jsCoq not initialized' };
        }

        try {
          // 実行ごとに環境をリセットして前回の定義を残さない。
          await jscoqInstance.execute('Reset Initial.\n' + code);
          

          if (closure.proofState === 'YY') {
            const soundnessIssue = findCoqUnsoundToken(code);
            if(soundnessIssue){
              setStatus('Coq soundness failed', true);
              outputEl.textContent = '[Coq Soundness]\n' + soundnessIssue.line + ':' + soundnessIssue.col + ' ' + soundnessIssue.message + ' (' + soundnessIssue.token + ')';
              return { status: 'rejected', proof_state: 'YN', reason: soundnessIssue.message };
            }
            
            const goalsCount = await getCoqGoalsCount(jscoqManager);
            if(goalsCount === null){
              const summary = 'Coq goals check unavailable (jsCoq API mismatch).';
              setStatus('Coq soundness failed', true);
              outputEl.textContent = '[Coq Soundness]\n' + summary;
              return { status: 'rejected', proof_state: 'YN', reason: summary };
            }
            if(goalsCount > 0){
              const summary = 'Coq proof not complete (remaining goals: ' + goalsCount + ').';
              setStatus('Coq soundness failed', true);
              outputEl.textContent = '[Coq Soundness]\n' + summary;
              return { status: 'rejected', proof_state: 'YN', reason: summary };
            }
            setStatus('Coq proof verified (YY)');
            outputEl.textContent = '[Coq Validation Success]\n証明は ' + closure.closer + ' で完成しています (YY状態)';
            return { status: 'allowed', proof_state: 'YY', reason: 'Valid closed proof' };
          }
          if (closure.proofState === 'NY') {
            setStatus('Coq proof accepted (NY)');
            outputEl.textContent = '[Coq Validation Success]\n証明は ' + closure.closer + ' で暫定受け入れです (NY状態)';
            return { status: 'allowed', proof_state: 'NY', reason: 'Temporary acceptance (NY)' };
          }

          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n証明が Qed. / Defined. / Admitted. / Conjecture で終わっていません';
          return { status: 'rejected', proof_state: 'NN', reason: 'Proof not closed' };
        } catch (err) {
          setStatus('Coq validation failed', true);
          const errorMsg = err && err.message ? err.message : String(err);
          outputEl.textContent = '[Coq Validation]\njsCoq実行エラー:\n' + errorMsg;
          const proofState = closure.proofState === 'YY' ? 'YN' : 'NN';
          return { status: 'rejected', proof_state: proofState, reason: 'Coq execution error: ' + errorMsg };
        }
      }

      async function waitLean4Ready(timeoutMs = 15000){
        return new Promise((resolve, reject)=>{
          const start = Date.now();
          function check(){
            if(lean4Instance) return resolve();
            if(Date.now() - start > timeoutMs) return reject(new Error('Lean 4 initialization timeout'));
            setTimeout(check, 100);
          }
          check();
        });
      }

      async function validateLeanProof(code){
        setStatus('Validating Lean 4 proof...');
        const normalized = stripLeanCommentsAndStrings(code);
        const libraryCatalog = buildLeanLibraryCatalog(initPayload);
        const libraryCheck = validateLeanLibraryUsage(normalized, libraryCatalog);
        if(!libraryCheck.ok){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\n' + libraryCheck.reason;
          return { status: 'rejected', proof_state: 'NN', reason: libraryCheck.reason };
        }
        const axiomConflict = detectLeanAxiomConflict(normalized, libraryCatalog);
        if(axiomConflict){
          const conflictLines = [
            'Library axiom conflicts with proof axiom: ' + axiomConflict.name
          ];
          if(axiomConflict.libraryStatement){
            conflictLines.push('Library axiom: ' + axiomConflict.libraryStatement);
          }
          if(axiomConflict.proofStatement){
            conflictLines.push('Proof axiom: ' + axiomConflict.proofStatement);
          }
          const conflictMessage = conflictLines.join('\n');
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\n' + conflictMessage;
          return { status: 'rejected', proof_state: 'NN', reason: conflictMessage };
        }
        outputEl.textContent = 'Lean 4で証明を検証中...\n';

        try{
          if(!lean4Instance){
            await waitLean4Ready();
          }
        }catch(err){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\nLean 4が初期化されていません（タイムアウト）。';
          return { status: 'error', proof_state: 'NN', reason: 'Lean 4 not initialized' };
        }

        if(!lean4Instance){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\nLean 4が初期化されていません。';
          return { status: 'error', proof_state: 'NN', reason: 'Lean 4 not initialized' };
        }

        try{
          const diagnostics = await lean4Instance.execute(code);
          const errors = Array.isArray(diagnostics)
            ? diagnostics.filter((item)=>item && Number(item.severity || 0) === 1)
            : [];

          if(errors.length > 0){
            const first = errors[0] || {};
            const range = first.range || {};
            const start = range.start || {};
            const line = Number.isFinite(start.line) ? String(start.line + 1) : '?';
            const col = Number.isFinite(start.character) ? String(start.character + 1) : '?';
            const msg = first.message || 'Lean 4 reported an error';
            setStatus('Lean validation failed', true);
            outputEl.textContent = '[Lean Validation]\n' + line + ':' + col + ' ' + msg;
            return { status: 'rejected', proof_state: 'NN', reason: msg };
          }

          const closure = analyzeLeanClosure(code);
          if(closure.proofState === 'NN'){
            setStatus('Lean validation failed', true);
            outputEl.textContent = '[Lean Validation]\n' + (closure.reason || 'Code is empty');
            return { status: 'rejected', proof_state: 'NN', reason: closure.reason || 'Lean code is empty' };
          }
          if(closure.proofState === 'NY'){
            setStatus('Lean proof accepted (NY)');
            outputEl.textContent = '[Lean Validation Success]\n証明は ' + closure.closer + ' を含むため暫定受け入れです (NY状態)';
            return { status: 'allowed', proof_state: 'NY', reason: 'Temporary acceptance (NY)' };
          }

          setStatus('Lean proof verified (YY)');
          outputEl.textContent = '[Lean Validation Success]\nLean 4でエラーなく検証できました (YY状態)';
          return { status: 'allowed', proof_state: 'YY', reason: 'Lean 4 verified' };
        }catch(err){
          const errorMsg = err && err.message ? err.message : String(err);
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\nLean 4実行エラー:\n' + errorMsg;
          return { status: 'error', proof_state: 'NN', reason: 'Lean 4 execution error: ' + errorMsg };
        }
      }

      function analyzeLeanClosure(code){
        if(!code || typeof code !== 'string'){
          return { proofState: 'NN', closer: '', reason: 'Code is empty' };
        }

        const normalized = stripLeanCommentsAndStrings(code).trim();
        if(!normalized){
          return { proofState: 'NN', closer: '', reason: 'Code is empty' };
        }

        if(/\b(sorry|admit)\b/.test(normalized)){
          return { proofState: 'NY', closer: 'sorry/admit' };
        }

        if(/(^|\n)\s*(axiom|constant)\b/.test(normalized)){
          return { proofState: 'NY', closer: 'axiom/constant' };
        }

        return { proofState: 'YY', closer: 'Lean checked' };
      }

      function stripLeanCommentsAndStrings(input){
        let output = '';
        let i = 0;
        let blockCommentDepth = 0;
        let inString = false;
        let inLineComment = false;

        while(i < input.length){
          const ch = input[i];
          const next = input[i + 1];

          if(inString){
            if(ch === '\\'){
              i += 2;
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            i += 1;
            continue;
          }

          if(inLineComment){
            if(ch === '\n' || ch === '\r'){
              inLineComment = false;
              output += ch;
            }
            i += 1;
            continue;
          }

          if(blockCommentDepth > 0){
            if(ch === '/' && next === '-'){
              blockCommentDepth += 1;
              i += 2;
              continue;
            }
            if(ch === '-' && next === '/'){
              blockCommentDepth -= 1;
              i += 2;
              continue;
            }
            i += 1;
            continue;
          }

          if(ch === '-' && next === '-'){
            inLineComment = true;
            i += 2;
            continue;
          }

          if(ch === '/' && next === '-'){
            blockCommentDepth = 1;
            i += 2;
            continue;
          }

          if(ch === '"'){
            inString = true;
            i += 1;
            continue;
          }

          output += ch;
          i += 1;
        }

        return output;
      }

      function analyzeCoqClosure(code) {
        if(!code || typeof code !== 'string'){
          return { proofState: 'NN', reason: 'Code is empty' };
        }

        const normalized = stripCoqCommentsAndStrings(code).trim();
        if(!normalized){
          return { proofState: 'NN', reason: 'Code is empty' };
        }

        if(/Admitted\.\s*$/.test(normalized)){
          return { proofState: 'NY', closer: 'Admitted.' };
        }
        if(isConjectureTail(normalized)){
          return { proofState: 'NY', closer: 'Conjecture.' };
        }
        if(/Defined\.\s*$/.test(normalized)){
          return { proofState: 'YY', closer: 'Defined.' };
        }
        if(/Qed\.\s*$/.test(normalized)){
          return { proofState: 'YY', closer: 'Qed.' };
        }

        return { proofState: 'NN', reason: '証明は最後を Qed. / Defined. / Admitted. / Conjecture で閉じてください。' };
      }

      function isConjectureTail(normalized){
        const matches = Array.from(normalized.matchAll(/\bConjecture\b/g));
        if(matches.length === 0) return false;
        const last = matches[matches.length - 1];
        const idx = typeof last.index === 'number' ? last.index : -1;
        if(idx < 0) return false;
        const tail = normalized.slice(idx).trim();
        if(!tail.endsWith('.')) return false;
        const dotCount = (tail.match(/\./g) || []).length;
        if(dotCount !== 1) return false;
        return true;
      }

      function stripCoqCommentsAndStrings(input){
        let output = '';
        let i = 0;
        let commentDepth = 0;
        let inString = false;

        while(i < input.length){
          const ch = input[i];
          const next = input[i + 1];

          if(inString){
            if(ch === '\\'){
              i += 2;
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            i += 1;
            continue;
          }

          if(commentDepth > 0){
            if(ch === '(' && next === '*'){
              commentDepth += 1;
              i += 2;
              continue;
            }
            if(ch === '*' && next === ')'){
              commentDepth -= 1;
              i += 2;
              continue;
            }
            i += 1;
            continue;
          }

          if(ch === '"'){
            inString = true;
            i += 1;
            continue;
          }
          if(ch === '(' && next === '*'){
            commentDepth = 1;
            i += 2;
            continue;
          }

          output += ch;
          i += 1;
        }

        return output;
      }

      function createCoqErrorCollector(manager, sourceText){
        const errors = [];
        let errorCount = 0;
        let detachFn = null;

        function reset(){
          errors.length = 0;
          errorCount = 0;
        }

        function getErrorCount(){ return errorCount; }
        function getErrors(){ return errors.slice(); }

        function onError(payload){
          if(payload === null || payload === undefined) return;
          if(Array.isArray(payload)){
            if(payload.length === 0) return;
            for(let i = 0; i < payload.length; i += 1){
              onError(payload[i]);
            }
            return;
          }
          const derived = extractCoqErrorFromPayload(payload, sourceText, manager);
          const msg = derived.message || stringifyCoqPayload(payload);
          const parsed = parseCoqErrorMessage(msg);
          if(!isMeaningfulCoqError(derived, msg, parsed)) return;
          const errObj = {
            timestamp: Date.now(),
            raw: payload,
            msg: msg,
            parsed: parsed,
            derived: derived
          };
          errors.push(errObj);
          errorCount += 1;
        }

        function attach(){
          if(detachFn) return true;
          const detachList = [];
          let attached = false;
          const targets = [];
          if(typeof window !== 'undefined' && window.jsCoq) {
            targets.push({ type: 'global', obj: window.jsCoq });
          }
          if(manager) {
            targets.push({ type: 'manager', obj: manager });
            if(manager.coq) targets.push({ type: 'coq', obj: manager.coq });
            if(manager.provider && manager.provider.coq) targets.push({ type: 'provider', obj: manager.provider.coq });
          }

          for(const target of targets){
            const obj = target.obj;
            if(!obj || typeof obj !== 'object') continue;

            if('onError' in obj){
              const prev = obj.onError;
              obj.onError = function(payload){
                onError(payload);
                if(typeof prev === 'function'){
                  try { prev(payload); } catch(e) {}
                }
              };
              detachList.push(function(){ obj.onError = prev; });
              attached = true;
            }
            if(typeof obj.on === 'function'){
              try {
                obj.on('error', onError);
                detachList.push(function(){
                  if(typeof obj.off === 'function'){
                    try { obj.off('error', onError); } catch(e) {}
                  }
                });
                attached = true;
              } catch(e) {
                // try next target
              }
            }
          }

          if(manager && typeof manager.reportError === 'function'){
            const prev = manager.reportError;
            manager.reportError = function(payload){
              onError(payload);
              return prev.apply(this, arguments);
            };
            detachList.push(function(){ manager.reportError = prev; });
            attached = true;
          }

          if(manager && typeof manager.addError === 'function'){
            const prev = manager.addError;
            manager.addError = function(payload){
              onError(payload);
              return prev.apply(this, arguments);
            };
            detachList.push(function(){ manager.addError = prev; });
            attached = true;
          }

          if(manager && ('error' in manager)){
            const prevDescriptor = Object.getOwnPropertyDescriptor(manager, 'error');
            let current = manager.error;
            try {
              Object.defineProperty(manager, 'error', {
                configurable: true,
                enumerable: true,
                get: function(){ return current; },
                set: function(value){
                  current = value;
                  if(Array.isArray(value) && value.length > 0){
                    onError(value[0]);
                  }else if(value){
                    onError(value);
                  }
                }
              });
              detachList.push(function(){
                try {
                  if(prevDescriptor){
                    Object.defineProperty(manager, 'error', prevDescriptor);
                  }else{
                    delete manager.error;
                    manager.error = current;
                  }
                } catch(e) {}
              });
              attached = true;
            } catch(e) {
              // ignore and continue to array hook
            }
          }

          if(manager && Array.isArray(manager.error)){
            const arr = manager.error;
            if(typeof arr.push === 'function'){
              const prevPush = arr.push;
              arr.push = function(){
                for(let i = 0; i < arguments.length; i += 1){
                  onError(arguments[i]);
                }
                return prevPush.apply(this, arguments);
              };
              detachList.push(function(){ arr.push = prevPush; });
              attached = true;
            }
          }

          if(attached){
            detachFn = function(){
              for(let i = 0; i < detachList.length; i += 1){
                try { detachList[i](); } catch(e) {}
              }
            };
            return true;
          }

          return false;
        }

        function detach(){
          if(typeof detachFn === 'function'){
            detachFn();
            detachFn = null;
          }
        }

        return { attach, detach, reset, getErrorCount, getErrors };
      }

      function stringifyCoqPayload(payload){
        try {
          if(typeof payload === 'string') return payload;
          if(payload === null || payload === undefined) return String(payload);
          if(payload.toString){
            const str = payload.toString();
            if(str && str !== '[object Object]') return str;
          }
          const json = JSON.stringify(payload, safeJsonReplacer(), 2);
          if(typeof json === 'string') return json;
          return String(payload);
        } catch(e) {
          return String(payload);
        }
      }

      function extractCoqErrorFromPayload(payload, sourceText, manager){
        let message = '';
        let location = null;
        const pprint = manager && manager.pprint && typeof manager.pprint.pp2Text === 'function'
          ? manager.pprint
          : null;
        if(payload && typeof payload === 'object'){
          message = pickCoqMessage(payload);
          if(!message && payload.err && typeof payload.err === 'object'){
            message = pickCoqMessage(payload.err);
          }
          if(!message && payload.feedback && Array.isArray(payload.feedback)){
            const fb = payload.feedback.find((item)=> item && item.level === 'Error') || payload.feedback[0];
            if(fb){
              if(!message && pprint && fb.msg){
                try {
                  const text = pprint.pp2Text(fb.msg);
                  if(text) message = text;
                } catch(e) {}
              }
              if(!message && fb.msg){
                try { message = typeof fb.msg === 'string' ? fb.msg : JSON.stringify(fb.msg); } catch(e) {}
              }
              if(!message && fb.message) message = String(fb.message);
            }
          }
          if(!message && pprint && payload.msg){
            try {
              const text = pprint.pp2Text(payload.msg);
              if(text) message = text;
            } catch(e) {}
          }
          if(!message && pprint && payload.err && payload.err.msg){
            try {
              const text = pprint.pp2Text(payload.err.msg);
              if(text) message = text;
            } catch(e) {}
          }
          const locCandidates = [];
          if(payload.loc) locCandidates.push(payload.loc);
          if(payload.location) locCandidates.push(payload.location);
          if(payload.range) locCandidates.push(payload.range);
          if(payload.pploc) locCandidates.push(payload.pploc);
          if(payload.pos) locCandidates.push(payload.pos);
          if(payload.position) locCandidates.push(payload.position);
          if(payload.span) locCandidates.push(payload.span);
          if(payload.feedback && Array.isArray(payload.feedback)){
            const fb = payload.feedback.find((item)=> item && item.level === 'Error') || payload.feedback[0];
            if(fb){
              if(fb.loc) locCandidates.push(fb.loc);
              if(fb.location) locCandidates.push(fb.location);
              if(fb.pploc) locCandidates.push(fb.pploc);
              if(fb.range) locCandidates.push(fb.range);
            }
          }
          if(payload.err && payload.err.loc) locCandidates.push(payload.err.loc);
          if(payload.err && payload.err.location) locCandidates.push(payload.err.location);
          if(payload.err && payload.err.range) locCandidates.push(payload.err.range);

          for(const loc of locCandidates){
            const resolved = normalizeCoqLocation(loc, sourceText);
            if(resolved){
              location = resolved;
              break;
            }
          }
        } else if(typeof payload === 'string'){
          message = payload;
        }

        if(!message){
          message = '';
        }

        return { message, location };
      }

      function pickCoqMessage(obj){
        if(!obj || typeof obj !== 'object') return '';
        if(typeof obj.message === 'string') return obj.message;
        if(typeof obj.msg === 'string') return obj.msg;
        if(typeof obj.error === 'string') return obj.error;
        if(obj.error && typeof obj.error.message === 'string') return obj.error.message;
        if(typeof obj.text === 'string') return obj.text;
        if(typeof obj.pp === 'string') return obj.pp;
        if(obj.pp && typeof obj.pp === 'string') return obj.pp;
        if(obj.msg && typeof obj.msg === 'object'){
          try { return JSON.stringify(obj.msg); } catch(e) {}
        }
        if(obj.message && typeof obj.message === 'object'){
          try { return JSON.stringify(obj.message); } catch(e) {}
        }
        if(obj.error && typeof obj.error === 'object'){
          try { return JSON.stringify(obj.error); } catch(e) {}
        }
        return '';
      }

      function parseCoqErrorMessage(msg){
        if(!msg) return {};
        const parsed = { line: null, charFrom: null, charTo: null, summary: null };

        let m = msg.match(/line\s+(\d+)(?:[,\s]+characters\s+(\d+)(?:-(\d+))?)?/i);
        if(m){
          parsed.line = Number(m[1]);
          if(m[2]) parsed.charFrom = Number(m[2]);
          if(m[3]) parsed.charTo = Number(m[3]);
        } else {
          m = msg.match(/at\s+line\s+(\d+)(?:\s*,\s*char(?:acter)?s?\s*(\d+))?/i);
          if(m){
            parsed.line = Number(m[1]);
            if(m[2]) parsed.charFrom = Number(m[2]);
          }
        }

        m = msg.match(/(?:Error|error|Fail):?\s*(.+?)(?:\n|$)/i);
        if(m) parsed.summary = m[1].trim();
        if(!parsed.summary) parsed.summary = (msg.length > 200 ? msg.slice(0, 200) + '…' : msg);
        return parsed;
      }

      function sanitizeCoqMessage(msg){
        const trimmed = String(msg || '').trim();
        if(!trimmed) return '';
        if(trimmed === '[object Object]') return '';
        if(/^\[\s*\]$/.test(trimmed)) return '';
        if(/^\{\s*\}$/.test(trimmed)) return '';
        return trimmed;
      }

      function isMeaningfulCoqError(derived, msg, parsed){
        if(derived && derived.location) return true;
        const summary = parsed && parsed.summary ? sanitizeCoqMessage(parsed.summary) : '';
        if(summary) return true;
        const raw = sanitizeCoqMessage(msg);
        return !!raw;
      }

      function pickBestCoqError(errors){
        if(!Array.isArray(errors) || errors.length === 0) return null;
        for(let i = errors.length - 1; i >= 0; i -= 1){
          const err = errors[i];
          if(!err) continue;
          const derived = err.derived || {};
          const parsed = err.parsed || {};
          if(isMeaningfulCoqError(derived, err.msg, parsed)) return err;
        }
        return null;
      }

      function formatCoqPayloadError(payload, sourceText, manager){
        if(payload === null || payload === undefined) return '';
        const derived = extractCoqErrorFromPayload(payload, sourceText, manager);
        const msg = derived.message || stringifyCoqPayload(payload);
        const parsed = parseCoqErrorMessage(msg);
        const derivedMsg = sanitizeCoqMessage(derived.message);
        const parsedMsg = sanitizeCoqMessage(parsed.summary);
        const rawMsg = sanitizeCoqMessage(msg);
        const summary = derivedMsg || parsedMsg || rawMsg;
        if(!summary) return '';
        if(derived.location && Number.isFinite(derived.location.line) && Number.isFinite(derived.location.col)){
          return derived.location.line + ':' + derived.location.col + ' ' + summary;
        }
        return summary;
      }

      function pickBestCoqManagerError(errors, sourceText, manager){
        if(!Array.isArray(errors) || errors.length === 0) return '';
        for(let i = errors.length - 1; i >= 0; i -= 1){
          const msg = formatCoqPayloadError(errors[i], sourceText, manager);
          if(msg) return msg;
        }
        return '';
      }

      function coqSentenceText(stm){
        if(!stm || typeof stm !== 'object') return '';
        const candidates = [
          stm.text,
          stm.sentence,
          stm.s,
          stm.raw,
          stm.content,
          stm.stmt
        ];
        for(let i = 0; i < candidates.length; i += 1){
          if(typeof candidates[i] === 'string' && candidates[i].trim()) return candidates[i];
        }
        return '';
      }

      function coqSentenceStatus(stm){
        const phase = String(stm && stm.phase ? stm.phase : '').toLowerCase();
        const sid = pickNumber(
          stm && stm.coq_sid,
          stm && stm.state_id,
          stm && stm.state,
          stm && stm.sid,
          stm && stm.sentence_id
        );
        const processed = (Number.isFinite(sid) && sid > 0)
          || phase === 'processed'
          || phase === 'done'
          || phase === 'complete'
          || phase === 'checked';
        const pending = phase === 'pending'
          || phase === 'adding'
          || phase === 'added'
          || phase === 'processing';
        return { processed, pending, phase, sid };
      }

      function coqSentenceHasError(stm){
        if(!stm || typeof stm !== 'object') return false;
        if(stm.err || stm.error) return true;
        if(Array.isArray(stm.feedback) && stm.feedback.some(coqFeedbackIsError)) return true;
        const phase = String(stm.phase || '').toLowerCase();
        if(phase === 'error' || phase === 'failed') return true;
        return false;
      }

      function summarizeCoqExecution(manager, sourceText){
        const sentences = manager && manager.doc && Array.isArray(manager.doc.sentences)
          ? manager.doc.sentences
          : [];
        const summary = {
          total: 0,
          processed: 0,
          pending: 0,
          hasError: false
        };
        for(let i = 0; i < sentences.length; i += 1){
          const stm = sentences[i];
          const text = coqSentenceText(stm);
          if(!text) continue;
          summary.total += 1;
          const status = coqSentenceStatus(stm);
          if(status.processed) summary.processed += 1;
          if(status.pending) summary.pending += 1;
          if(coqSentenceHasError(stm)) summary.hasError = true;
        }
        if(summary.total === 0 && typeof sourceText === 'string' && sourceText.trim()){
          summary.hasError = summary.hasError || false;
        }
        return summary;
      }

      function getLastCoqSid(manager){
        if(!manager || !manager.doc || !Array.isArray(manager.doc.sentences)) return null;
        let maxSid = null;
        for(let i = 0; i < manager.doc.sentences.length; i += 1){
          const stm = manager.doc.sentences[i];
          const sid = pickNumber(stm && stm.coq_sid, stm && stm.state_id, stm && stm.state, stm && stm.sid);
          if(Number.isFinite(sid)){
            if(maxSid === null || sid > maxSid) maxSid = sid;
          }
        }
        return maxSid;
      }

      function unwrapGoalsResponse(res){
        if(!res || typeof res !== 'object') return res;
        if(res.data) return res.data;
        if(res.answer) return res.answer;
        if(res.result) return res.result;
        if(res.value) return res.value;
        return res;
      }

      function countGoalsFromResponse(res, depth){
        if(res === null || res === undefined) return null;
        const level = Number.isFinite(depth) ? depth : 0;
        if(level > 6) return null;
        if(typeof res === 'string'){
          if(/no\s+more\s+goals/i.test(res)) return 0;
          if(/not\s+in\s+proof\s+mode/i.test(res)) return 0;
          if(/no\s+focused\s+proof/i.test(res)) return 0;
          return null;
        }
        if(typeof res === 'number'){
          return Number.isFinite(res) ? res : null;
        }
        if(Array.isArray(res)){
          let total = 0;
          let saw = false;
          for(let i = 0; i < res.length; i += 1){
            const inner = countGoalsFromResponse(res[i], level + 1);
            if(inner !== null){
              total += inner;
              saw = true;
            }
          }
          return saw ? total : null;
        }
        if(typeof res === 'object'){
          // unwrap common wrappers
          const wrappers = ['data','value','result','answer','payload','msg','message','text'];
          for(let i = 0; i < wrappers.length; i += 1){
            if(res[wrappers[i]] !== undefined){
              const inner = countGoalsFromResponse(res[wrappers[i]], level + 1);
              if(inner !== null) return inner;
            }
          }

          let count = 0;
          let saw = false;
          const fields = [
            'goals','goal','fg_goals','bg_goals',
            'shelf','shelved','stack','given_up','givenUp',
            'aborted','admitted','admit'
          ];
          for(let i = 0; i < fields.length; i += 1){
            const key = fields[i];
            if(!Object.prototype.hasOwnProperty.call(res, key)) continue;
            const val = res[key];
            if(Array.isArray(val)){
              count += val.length;
              saw = true;
            } else if(val && typeof val === 'object'){
              const inner = countGoalsFromResponse(val, level + 1);
              if(inner !== null){
                count += inner;
                saw = true;
              }
            } else if(key === 'goal' && val){
              count += 1;
              saw = true;
            }
          }
          if(saw) return count;

          // last resort: look for any key containing "goal"
          const keys = Object.keys(res);
          for(let i = 0; i < keys.length; i += 1){
            const key = keys[i];
            if(!/goal/i.test(key)) continue;
            const inner = countGoalsFromResponse(res[key], level + 1);
            if(inner !== null) return inner;
          }
        }
        return null;
      }

      async function resolveMaybePromise(fn){
        try {
          const res = fn();
          if(res && typeof res.then === 'function') return await res;
          return res;
        } catch(e) {
          return null;
        }
      }

      async function getCoqGoalsCount(manager){
        const targets = [];
        const sid = manager ? getLastCoqSid(manager) : null;
        if(typeof window !== 'undefined' && window.jsCoq) {
          targets.push({ obj: window.jsCoq, sid: null });
        }
        if(manager) targets.push({ obj: manager, sid: sid });
        if(manager && manager.coq) targets.push({ obj: manager.coq, sid: sid });
        if(manager && manager.provider && manager.provider.coq) targets.push({ obj: manager.provider.coq, sid: sid });

        const calls = [];
        for(let i = 0; i < targets.length; i += 1){
          const obj = targets[i].obj;
          const objSid = targets[i].sid;
          if(!obj || typeof obj !== 'object') continue;
          if(typeof obj.goals === 'function') calls.push(() => (objSid !== null ? obj.goals(objSid) : obj.goals()));
          if(typeof obj.Goals === 'function') calls.push(() => (objSid !== null ? obj.Goals(objSid) : obj.Goals()));
          if(typeof obj.getGoals === 'function') calls.push(() => (objSid !== null ? obj.getGoals(objSid) : obj.getGoals()));
          if(typeof obj.query === 'function') {
            if(objSid !== null) {
              calls.push(() => obj.query(objSid, 'Goals'));
              calls.push(() => obj.query(objSid, 'Goals.'));
              calls.push(() => obj.query(objSid, { query: 'Goals' }));
              calls.push(() => obj.query(objSid, { query: 'Goals.' }));
            }
            calls.push(() => obj.query('Goals'));
            calls.push(() => obj.query('Goals.'));
            calls.push(() => obj.query({ query: 'Goals' }));
            calls.push(() => obj.query({ query: 'Goals.' }));
          }
          if(typeof obj.exec === 'function') {
            calls.push(() => obj.exec('Goals.'));
            calls.push(() => obj.exec('Goals'));
          }
        }

        for(let i = 0; i < calls.length; i += 1){
          const res = await resolveMaybePromise(calls[i]);
          if(res !== null && res !== undefined){
            const normalized = unwrapGoalsResponse(res);
            const count = countGoalsFromResponse(normalized);
            if(count !== null) return count;
          }
        }
        return null;
      }

      function coqFeedbackIsError(feedback){
        if(!feedback) return false;
        if(typeof feedback.is_error === 'boolean') return feedback.is_error;
        if(typeof feedback.sev === 'number' && feedback.sev >= 2) return true;
        if(typeof feedback.severity === 'number' && feedback.severity >= 2) return true;
        const level = String(feedback.level || feedback.severity || feedback.sev || '').toLowerCase();
        if(level === 'error' || level === 'err' || level === 'fatal') return true;
        return false;
      }

      function collectCoqErrorCandidates(manager){
        const payloads = [];
        let hasSignal = false;
        if(manager && Array.isArray(manager.error) && manager.error.length > 0){
          hasSignal = true;
          payloads.push(...manager.error);
        }

        const sentences = manager && manager.doc && Array.isArray(manager.doc.sentences)
          ? manager.doc.sentences
          : null;
        if(sentences){
          for(let i = 0; i < sentences.length; i += 1){
            const stm = sentences[i];
            if(!stm) continue;
            if(stm.err || stm.error){
              hasSignal = true;
              payloads.push(stm.err || stm.error);
            }
            if(typeof stm.phase === 'string' && /error|failed/i.test(stm.phase)){
              hasSignal = true;
              payloads.push(stm);
            }
            if(Array.isArray(stm.feedback)){
              const errorFeedback = stm.feedback.filter(coqFeedbackIsError);
              if(errorFeedback.length){
                hasSignal = true;
                payloads.push(...errorFeedback);
              }
            }
          }
        }

        return { payloads, hasSignal };
      }

      function formatCollectedCoqError(err){
        if(!err) return '';
        const parsed = err.parsed || {};
        const derived = err.derived || {};
        const derivedLoc = derived.location || null;
        const derivedMsg = sanitizeCoqMessage(derived.message);
        const parsedMsg = sanitizeCoqMessage(parsed.summary);
        const rawMsg = sanitizeCoqMessage(err.msg);
        const summary = derivedMsg || parsedMsg || rawMsg;
        if(!summary) return '';
        if(derivedLoc && Number.isFinite(derivedLoc.line) && Number.isFinite(derivedLoc.col)){
          return derivedLoc.line + ':' + derivedLoc.col + ' ' + summary;
        }
        return summary;
      }

      function getCoqErrorDetails(manager, collector, sourceText){
        const candidates = collectCoqErrorCandidates(manager);
        let hasError = candidates.hasSignal;

        for(let i = 0; i < candidates.payloads.length; i += 1){
          const msg = formatCoqPayloadError(candidates.payloads[i], sourceText, manager);
          if(msg) return { hasError: true, message: msg };
        }

        const collectorBest = collector ? pickBestCoqError(collector.getErrors()) : null;
        if(collectorBest){
          hasError = true;
          const collectorMsg = formatCollectedCoqError(collectorBest);
          if(collectorMsg) return { hasError: true, message: collectorMsg };
        }

        if(hasError){
          const fallback = manager ? sanitizeCoqMessage(extractCoqError(manager, sourceText)) : '';
          if(fallback) return { hasError: true, message: fallback };
        }

        return { hasError, message: '' };
      }

      function safeJsonReplacer(){
        const seen = new WeakSet();
        return function(key, val){
          if(val && typeof val === 'object'){
            if(seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if(typeof val === 'function') return '[Function]';
          return val;
        };
      }

      function findCoqUnsoundToken(code){
        if(!code || typeof code !== 'string') return null;
        const tokenMessages = {
          Axiom: 'Axiom declaration is not allowed in YY proofs.',
          Axioms: 'Axiom declaration is not allowed in YY proofs.',
          Parameter: 'Parameter introduces an axiom; not allowed in YY proofs.',
          Parameters: 'Parameter introduces axioms; not allowed in YY proofs.',
          Variable: 'Variable introduces an assumption; not allowed in YY proofs.',
          Variables: 'Variable introduces assumptions; not allowed in YY proofs.',
          Hypothesis: 'Hypothesis introduces an assumption; not allowed in YY proofs.',
          Hypotheses: 'Hypothesis introduces assumptions; not allowed in YY proofs.',
          Assumption: 'Assumption introduces an axiom; not allowed in YY proofs.',
          Assumptions: 'Assumption introduces axioms; not allowed in YY proofs.',
          Context: 'Context introduces assumptions; not allowed in YY proofs.',
          Admitted: 'Admitted leaves the proof incomplete.',
          Admit: 'Admit leaves the proof incomplete.',
          admit: 'admit leaves the proof incomplete.',
          Conjecture: 'Conjecture leaves the proof unproven.'
        };

        let i = 0;
        let line = 1;
        let col = 1;
        let commentDepth = 0;
        let inString = false;
        let word = '';
        let wordLine = 1;
        let wordCol = 1;

        function flushWord(){
          if(!word) return null;
          const token = word;
          word = '';
          if(Object.prototype.hasOwnProperty.call(tokenMessages, token)){
            return {
              token,
              line: wordLine,
              col: wordCol,
              message: tokenMessages[token]
            };
          }
          return null;
        }

        function advanceChar(){
          const ch = code[i];
          if(ch === '\r'){
            if(code[i + 1] === '\n'){
              i += 2;
            }else{
              i += 1;
            }
            line += 1;
            col = 1;
            return;
          }
          if(ch === '\n'){
            i += 1;
            line += 1;
            col = 1;
            return;
          }
          i += 1;
          col += 1;
        }

        while(i < code.length){
          const ch = code[i];
          const next = code[i + 1];

          if(inString){
            if(ch === '\\'){
              advanceChar();
              if(i < code.length) advanceChar();
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            advanceChar();
            continue;
          }

          if(commentDepth > 0){
            if(ch === '(' && next === '*'){
              commentDepth += 1;
              advanceChar();
              advanceChar();
              continue;
            }
            if(ch === '*' && next === ')'){
              commentDepth -= 1;
              advanceChar();
              advanceChar();
              continue;
            }
            advanceChar();
            continue;
          }

          if(ch === '"'){
            inString = true;
            advanceChar();
            continue;
          }
          if(ch === '(' && next === '*'){
            commentDepth = 1;
            advanceChar();
            advanceChar();
            continue;
          }

          if(/[A-Za-z]/.test(ch)){
            if(word.length === 0){
              wordLine = line;
              wordCol = col;
            }
            word += ch;
            advanceChar();
            continue;
          }

          const hit = flushWord();
          if(hit) return hit;
          advanceChar();
        }

        const finalHit = flushWord();
        if(finalHit) return finalHit;
        return null;
      }

      function buildCoqLibraryCatalog(payload){
        const collected = collectCoqLibraryTables(payload);
        const tables = collected.tables;
        const allowedLibraries = new Set();
        const allowedTheorems = new Set();
        const libraryAxioms = new Map();

        tables.forEach((table)=>{
          extractLibraryNames(table).forEach((name)=>{
            if(name) allowedLibraries.add(name);
          });
          extractTheoremsFromTable(table).forEach((name)=>{
            if(name) allowedTheorems.add(name);
          });
          extractAxiomsFromTable(table).forEach((entry)=>{
            if(!entry || !entry.name) return;
            const normalizedStatement = normalizeCoqStatement(entry.statement);
            if(libraryAxioms.has(entry.name)) return;
            libraryAxioms.set(entry.name, normalizedStatement);
          });
        });

        return {
          tablesCount: tables.length,
          allowedLibraries,
          allowedTheorems,
          libraryAxioms,
          sourcePresent: collected.sourcePresent
        };
      }

      function collectCoqLibraryTables(payload){
        const out = [];
        const sources = [];
        let sourcePresent = false;
        if(payload && typeof payload === 'object'){
          const payloadKeys = [
            'coqLibraryTables',
            'coqLibraryTable',
            'libraryTables',
            'libraryTable',
            'coqLibraries',
            'library'
          ];
          payloadKeys.forEach((key)=>{
            if(Object.prototype.hasOwnProperty.call(payload, key)){
              sourcePresent = true;
              sources.push(payload[key]);
            }
          });
        }

        const stored = readStoredLibraryTables(['ivucxCoqLibraryTables', 'ivucxLibraryTables']);
        if(stored.found) sourcePresent = true;
        sources.push(...stored.values);

        sources.forEach((source)=>{
          normalizeLibraryTablesInput(source).forEach((table)=>{
            if(isCoqLibraryTable(table)) out.push(table);
          });
        });

        return { tables: out, sourcePresent };
      }

      function readStoredLibraryTables(keys){
        const values = [];
        let found = false;
        const storages = [localStorage, sessionStorage];
        keys.forEach((key)=>{
          storages.forEach((storage)=>{
            if(!safeStorageHas(storage, key)) return;
            found = true;
            const raw = safeStorageGet(storage, key);
            if(raw) values.push(raw);
          });
        });
        return { values, found };
      }

      function normalizeLibraryTablesInput(source){
        const out = [];
        if(!source) return out;
        if(typeof source === 'string'){
          const parsed = tryParseJson(source);
          if(parsed) return normalizeLibraryTablesInput(parsed);
          return out;
        }
        if(Array.isArray(source)){
          out.push(...source);
          return out;
        }
        if(typeof source === 'object'){
          if(Array.isArray(source.Coq)) out.push(...source.Coq);
          if(Array.isArray(source.coq)) out.push(...source.coq);
          if(Array.isArray(source.tables)) out.push(...source.tables);
          if(out.length === 0) out.push(source);
        }
        return out;
      }

      function isCoqLibraryTable(table){
        if(!table || typeof table !== 'object') return false;
        const lang = table.language || table.lang || table.assistant || table.proofAssistant;
        if(!lang) return true;
        return String(lang).trim().toLowerCase() === 'coq';
      }

      function extractLibraryNames(table){
        const names = [];
        if(!table || typeof table !== 'object') return names;
        const candidates = [
          table.library,
          table.libraryName,
          table.name,
          table.module,
          table.table,
          table.tableName
        ];
        candidates.forEach((value)=>{
          if(typeof value === 'string' && value.trim()){
            names.push(value.trim());
          }
        });
        if(Array.isArray(table.libraries)){
          table.libraries.forEach((value)=>{
            if(typeof value === 'string' && value.trim()){
              names.push(value.trim());
            }
          });
        }
        return names;
      }

      function extractTheoremsFromTable(table){
        const out = [];
        if(!table || typeof table !== 'object') return out;
        if(Array.isArray(table.theorems)){
          out.push(...extractNamesFromEntries(table.theorems));
        }
        if(Array.isArray(table.entries)){
          table.entries.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.type && String(entry.type).toLowerCase() !== 'theorem') return;
            const name = extractEntryName(entry);
            if(name) out.push(name);
          });
        }
        if(Array.isArray(table.items)){
          table.items.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'theorem') return;
            const name = extractEntryName(entry);
            if(name) out.push(name);
          });
        }
        if(Array.isArray(table.rows)){
          table.rows.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'theorem') return;
            const name = extractEntryName(entry);
            if(name) out.push(name);
          });
        }
        return out;
      }

      function extractAxiomsFromTable(table){
        const out = [];
        if(!table || typeof table !== 'object') return out;
        if(Array.isArray(table.axioms)){
          out.push(...normalizeAxiomEntries(table.axioms));
        }
        if(Array.isArray(table.entries)){
          table.entries.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.type && String(entry.type).toLowerCase() !== 'axiom') return;
            out.push(...normalizeAxiomEntries([entry]));
          });
        }
        if(Array.isArray(table.items)){
          table.items.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'axiom') return;
            out.push(...normalizeAxiomEntries([entry]));
          });
        }
        if(Array.isArray(table.rows)){
          table.rows.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'axiom') return;
            out.push(...normalizeAxiomEntries([entry]));
          });
        }
        return out;
      }

      function extractNamesFromEntries(entries){
        const out = [];
        entries.forEach((entry)=>{
          const name = extractEntryName(entry);
          if(name) out.push(name);
        });
        return out;
      }

      function extractEntryName(entry){
        if(typeof entry === 'string') return entry.trim();
        if(entry && typeof entry === 'object'){
          const candidates = [entry.name, entry.theorem, entry.id, entry.symbol, entry.title, entry.label];
          for(const value of candidates){
            if(typeof value === 'string' && value.trim()) return value.trim();
          }
        }
        return '';
      }

      function normalizeAxiomEntries(entries){
        const out = [];
        entries.forEach((entry)=>{
          if(!entry) return;
          if(typeof entry === 'string'){
            out.push(...parseAxiomString(entry));
            return;
          }
          if(typeof entry === 'object'){
            const parsed = typeof entry.axiom === 'string' ? parseAxiomString(entry.axiom) : [];
            if(parsed.length){
              out.push(...parsed);
              return;
            }
            const name = extractEntryName(entry) || (typeof entry.axiom === 'string' ? entry.axiom.trim() : '');
            const statement = extractAxiomStatement(entry);
            if(name) out.push({ name, statement });
          }
        });
        return out;
      }

      function parseAxiomString(text){
        const out = [];
        const trimmed = String(text || '').trim();
        if(!trimmed) return out;
        const axiomMatch = trimmed.match(/Axioms?\b\s+([^:]+?)\s*:\s*(.+)\.?$/i);
        if(axiomMatch){
          const names = splitAxiomNames(axiomMatch[1]);
          const stmt = normalizeCoqStatement(axiomMatch[2]);
          names.forEach((name)=>{
            if(name) out.push({ name, statement: stmt });
          });
          return out;
        }
        const colonMatch = trimmed.match(/^([^:]+?)\s*:\s*(.+)$/);
        if(colonMatch){
          const names = splitAxiomNames(colonMatch[1]);
          const stmt = normalizeCoqStatement(colonMatch[2]);
          names.forEach((name)=>{
            if(name) out.push({ name, statement: stmt });
          });
          return out;
        }
        out.push({ name: trimmed, statement: '' });
        return out;
      }

      function splitAxiomNames(part){
        return String(part || '')
          .trim()
          .split(/\s+/)
          .map((name)=>name.trim())
          .filter((name)=>!!name);
      }

      function extractAxiomStatement(entry){
        if(!entry || typeof entry !== 'object') return '';
        const candidates = [entry.statement, entry.prop, entry.type, entry.signature, entry.formula];
        for(const value of candidates){
          if(typeof value === 'string' && value.trim()){
            return normalizeCoqStatement(value);
          }
        }
        return '';
      }

      function normalizeCoqStatement(statement){
        return String(statement || '').replace(/\s+/g, ' ').trim();
      }

      function validateCoqLibraryUsage(normalized, catalog){
        if(!catalog || !normalized) return { ok: true, invalid: [] };
        const used = extractCoqLibraryReferences(normalized);
        if(used.length === 0) return { ok: true, invalid: [] };
        if(catalog.allowedLibraries.size === 0){
          const baseMessage = catalog.sourcePresent
            ? 'Coq LibraryTable is empty.'
            : 'Coq LibraryTable is missing.';
          return {
            ok: false,
            invalid: used,
            reason: baseMessage + ' Imports are not allowed: ' + formatLibraryReferences(used)
          };
        }
        const invalid = used.filter((ref)=>!isAllowedCoqLibrary(ref, catalog.allowedLibraries));
        if(invalid.length === 0) return { ok: true, invalid: [] };
        return {
          ok: false,
          invalid,
          reason: 'Coq LibraryTable does not allow these libraries: ' + formatLibraryReferences(invalid)
        };
      }

      function extractCoqLibraryReferences(normalized){
        const refs = [];
        const requireRegex = /(^|\n)\s*(From\s+([A-Za-z0-9_.']+)\s+)?Require\s+((Import|Export)\s+)?([\s\S]*?)\.(?=\s|$)/g;
        let match;
        while((match = requireRegex.exec(normalized)) !== null){
          const prefix = match[3] ? match[3].trim() : '';
          const modulesPart = match[6] ? match[6].trim() : '';
          if(!modulesPart) continue;
          const quoted = extractQuotedStrings(modulesPart);
          quoted.forEach((value)=>{
            if(value) refs.push({ type: 'string', value });
          });
          const stripped = modulesPart.replace(/"[^"]*"/g, ' ');
          const modules = extractCoqModuleNames(stripped);
          modules.forEach((name)=>{
            if(!name) return;
            if(prefix){
              refs.push({ type: 'from', prefix, qualid: name });
            }else{
              refs.push({ type: 'qualid', name });
            }
          });
        }
        return refs;
      }

      function extractQuotedStrings(text){
        const out = [];
        const regex = /"([^"]*)"/g;
        let match;
        while((match = regex.exec(text)) !== null){
          if(match[1]) out.push(match[1]);
        }
        return out;
      }

      function extractCoqModuleNames(text){
        const out = [];
        const tokens = text.replace(/\s+/g, ' ').trim().split(' ').filter(Boolean);
        for(let i = 0; i < tokens.length; i += 1){
          const token = tokens[i];
          if(token === 'as'){
            i += 1;
            continue;
          }
          if(!/^[A-Za-z_][A-Za-z0-9_']*(?:\.[A-Za-z_][A-Za-z0-9_']*)*$/.test(token)) continue;
          out.push(token);
        }
        return out;
      }

      function isAllowedCoqLibrary(ref, allowed){
        if(!ref) return false;
        if(ref.type === 'string'){
          return matchesLibraryName(ref.value, allowed);
        }
        if(ref.type === 'from'){
          return matchesFromLibrary(ref.prefix, ref.qualid, allowed);
        }
        return matchesLibraryName(ref.name, allowed);
      }
