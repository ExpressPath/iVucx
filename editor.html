<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iVucx Editor</title>
  <style>
    :root{
      --bg:#f6f8fa;
      --panel:#ffffff;
      --ink:#1f2328;
      --muted:#656d76;
      --line:#d0d7de;
      --accent:#1f6feb;
      --accent-dark:#0f4aa6;
      --ok:#1a7f37;
      --warn:#cf222e;
      --header:#24292f;
      --header-ink:#f6f8fa;
    }

    *,*::before,*::after{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:56px;
      padding:10px 14px;
      background:var(--header);
      color:var(--header-ink);
      border-bottom:1px solid #1b1f24;
    }

    .left-cluster,
    .right-cluster{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .product{
      font-size:14px;
      font-weight:650;
      white-space:nowrap;
    }

    .lang-badge{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.28);
      font-size:12px;
      font-weight:650;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .file-name{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      color:#d0d7de;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }

    .btn{
      border:1px solid transparent;
      background:#ffffff;
      color:#24292f;
      border-radius:8px;
      height:34px;
      padding:0 12px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      transition:background-color .2s ease,color .2s ease,border-color .2s ease,transform .12s ease;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .btn-back{
      background:transparent;
      border-color:rgba(255,255,255,0.25);
      color:#f6f8fa;
      width:34px;
      min-width:34px;
      padding:0;
      border-radius:999px;
      font-size:24px;
      line-height:1;
    }

    .btn-back:hover{
      background:rgba(255,255,255,0.08);
    }

    .btn-run{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .btn-run:hover{
      background:var(--accent-dark);
      border-color:var(--accent-dark);
    }

    .runner-input{
      width:min(44vw, 380px);
      min-width:180px;
      height:34px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:12px;
      padding:0 10px;
      outline:none;
    }

    .runner-input::placeholder{
      color:#c3c9d0;
    }

    .workspace{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(360px, 1fr) minmax(280px, 36%);
      gap:10px;
      padding:10px;
    }

    .pane{
      min-height:0;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .pane-head{
      flex:0 0 38px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 12px;
      border-bottom:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
      background:linear-gradient(to bottom, #ffffff, #f8fafc);
    }

    .status{
      font-weight:650;
      color:var(--ok);
    }

    .status.error{
      color:var(--warn);
    }

    .editor-frame{
      flex:1;
      min-height:0;
      position:relative;
      background:#fff;
    }

    #editor{
      position:absolute;
      inset:0;
    }

    #fallbackEditor{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      outline:none;
      resize:none;
      padding:16px;
      font-size:14px;
      line-height:1.5;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      display:none;
    }

    #outputPanel{
      flex:1;
      margin:0;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      padding:14px;
      font-size:13px;
      line-height:1.45;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      color:#24292f;
      background:#fbfdff;
    }

    @media (max-width:1020px){
      .workspace{
        grid-template-columns:1fr;
        grid-template-rows:minmax(300px, 1fr) minmax(180px, 42%);
      }

      .right-cluster{
        width:100%;
        justify-content:flex-end;
      }
    }

    @media (max-width:760px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .left-cluster,
      .right-cluster{
        width:100%;
      }

      .right-cluster{
        justify-content:space-between;
      }

      .runner-input{
        width:100%;
        min-width:0;
      }
    }
  </style>
  <link rel="stylesheet" href="https://jscoq.github.io/jscoq/latest/dist/jscoq.css">
</head>
<body>
  <header class="topbar">
    <div class="left-cluster">
      <button class="btn btn-back" id="backBtn" type="button" aria-label="Back to summary">×</button>
      <div class="product">iVucx Editor</div>
      <div class="lang-badge" id="langBadge">Lean</div>
      <div class="file-name" id="fileName">Main.lean</div>
    </div>
    <div class="right-cluster">
      <input
        class="runner-input"
        id="runnerEndpoint"
        type="text"
        placeholder="Runner endpoint (e.g. https://example.com/api/run)"
        autocomplete="off"
      />
      <button class="btn btn-run" id="runBtn" type="button">Run</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane">
      <div class="pane-head">
        <span>Editor</span>
        <span class="status" id="statusText">Ready</span>
      </div>
      <div class="editor-frame">
        <div id="editor"></div>
        <textarea id="fallbackEditor" spellcheck="false"></textarea>
      </div>
    </section>

    <section class="pane">
      <div class="pane-head">
        <span>Server Output</span>
        <span>Ctrl/Cmd + Enter to run</span>
      </div>
      <pre id="outputPanel"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script>
    (function(){
      const INIT_STORAGE_KEY = 'ivucxEditorInit';
      const EDITOR_RETURN_KEY = 'ivucxEditorReturn';
      const RUNNER_STORAGE_KEY = 'ivucxRunnerEndpoint';

      const langBadgeEl = document.getElementById('langBadge');
      const fileNameEl = document.getElementById('fileName');
      const outputEl = document.getElementById('outputPanel');
      const statusEl = document.getElementById('statusText');
      const runnerEndpointEl = document.getElementById('runnerEndpoint');
      const runBtn = document.getElementById('runBtn');
      const backBtn = document.getElementById('backBtn');
      const fallbackEditor = document.getElementById('fallbackEditor');
      const editorMount = document.getElementById('editor');

      const languageConfig = {
        Lean: {
          monacoId: 'ivucx-lean',
          fileName: 'Main.lean',
          extension: '.lean',
          starter: [
            'theorem hello : True := by',
            '  trivial'
          ].join('\n')
        },
        Coq: {
          monacoId: 'ivucx-coq',
          fileName: 'Main.v',
          extension: '.v',
          starter: [
            'Theorem hello : True.',
            'Proof.',
            '  exact I.',
            'Qed.'
          ].join('\n')
        },
        Isabelle: {
          monacoId: 'ivucx-isabelle',
          fileName: 'Main.thy',
          extension: '.thy',
          starter: [
            'theory Main',
            '  imports Main',
            'begin',
            '',
            'lemma hello: "True"',
            '  by simp',
            '',
            'end'
          ].join('\n')
        },
        Agda: {
          monacoId: 'ivucx-agda',
          fileName: 'Main.agda',
          extension: '.agda',
          starter: [
            'module Main where',
            '',
            'data True : Set where',
            '  triv : True',
            '',
            'hello : True',
            'hello = triv'
          ].join('\n')
        }
      };

      const initPayload = readInitPayload();
      const params = new URLSearchParams(window.location.search);
      const selectedLanguage = resolveLanguage(params.get('lang') || initPayload.proofAssistant || 'Lean');
      const selectedConfig = languageConfig[selectedLanguage];

      langBadgeEl.textContent = selectedLanguage;
      fileNameEl.textContent = selectedConfig.fileName;

      const restoredRunner = params.get('runner') || localStorage.getItem(RUNNER_STORAGE_KEY) || '';
      runnerEndpointEl.value = restoredRunner;

      const summaryText = typeof initPayload.summary === 'string'
        ? initPayload.summary
        : (typeof initPayload.draft === 'string' ? initPayload.draft : '');
      const initialDraft = '';

      let editorInstance = null;
      let useFallbackEditor = false;
      let monacoRef = null;
      let running = false;

      setStatus('Ready');
      setInitialOutputMessage(selectedLanguage, selectedConfig.fileName, initPayload, restoredRunner, summaryText);

      backBtn.addEventListener('click', ()=>{
        handleBackNavigation();
      });

      runnerEndpointEl.addEventListener('change', ()=>{
        localStorage.setItem(RUNNER_STORAGE_KEY, runnerEndpointEl.value.trim());
      });

      runBtn.addEventListener('click', ()=>{
        runProof();
      });

      initializeEditor(initialDraft, selectedLanguage);
      window.addEventListener('paste', handleProofFilePaste, true);

      function readInitPayload(){
        try{
          const raw = sessionStorage.getItem(INIT_STORAGE_KEY);
          if(!raw) return {};
          sessionStorage.removeItem(INIT_STORAGE_KEY);
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        }catch(err){
          return {};
        }
      }

      function resolveLanguage(value){
        const input = String(value || '').trim().toLowerCase();
        if(input === 'coq') return 'Coq';
        if(input === 'isabelle') return 'Isabelle';
        if(input === 'agda') return 'Agda';
        return 'Lean';
      }

      function setStatus(text, isError){
        statusEl.textContent = text;
        statusEl.classList.toggle('error', !!isError);
      }

      function setInitialOutputMessage(language, fileName, payload, runnerEndpoint, summary){
        const files = Array.isArray(payload.attachedFileNames) ? payload.attachedFileNames : [];
        const lines = [
          'Editor initialized.',
          'Language: ' + language,
          'File: ' + fileName
        ];

        if(typeof summary === 'string'){
          lines.push('Summary is stored separately (' + summary.length + ' chars).');
        }

        if(files.length > 0){
          lines.push('Attached files from previous step: ' + files.join(', '));
        }

        if(runnerEndpoint){
          lines.push('Runner endpoint: ' + runnerEndpoint);
        } else {
          lines.push('Runner endpoint is empty. Set endpoint and press Run.');
        }

        lines.push('Shortcut: Ctrl/Cmd + Enter');
        outputEl.textContent = lines.join('\n');
      }

      function initializeEditor(initialText, language){
        if(typeof window.require !== 'function'){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco could not be loaded. Fallback textarea is active.';
          return;
        }

        window.require.config({
          paths: {
            vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
          }
        });

        window.require(['vs/editor/editor.main'], function(){
          monacoRef = window.monaco;
          registerCustomLanguages(monacoRef);
          defineEditorTheme(monacoRef);

          editorInstance = monacoRef.editor.create(editorMount, {
            value: initialText,
            language: selectedConfig.monacoId,
            theme: 'ivucx-github-light',
            automaticLayout: true,
            minimap: { enabled: false },
            smoothScrolling: true,
            scrollBeyondLastLine: false,
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 14,
            lineNumbersMinChars: 3,
            tabSize: 2
          });

          editorInstance.addCommand(monacoRef.KeyMod.CtrlCmd | monacoRef.KeyCode.Enter, function(){
            runProof();
          });
        }, function(){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco loading failed. Fallback textarea is active.';
        });
      }

      function activateFallbackEditor(initialText){
        useFallbackEditor = true;
        editorMount.style.display = 'none';
        fallbackEditor.style.display = 'block';
        fallbackEditor.value = initialText;
        fallbackEditor.addEventListener('keydown', function(e){
          const isRunShortcut = (e.ctrlKey || e.metaKey) && e.key === 'Enter';
          if(!isRunShortcut) return;
          e.preventDefault();
          runProof();
        });
      }

      function getEditorCode(){
        if(useFallbackEditor) return fallbackEditor.value;
        if(editorInstance) return editorInstance.getValue();
        return '';
      }

      function handleBackNavigation(){
        const currentCode = getEditorCode();
        if(currentCode.length >= 30){
          const shouldReturn = window.confirm('エディタに30文字以上の内容があります。戻るとコード編集内容は破棄されます。戻りますか？');
          if(!shouldReturn) return;
        }

        const returnPayload = {
          summary: summaryText,
          proofAssistant: selectedLanguage,
          returnedAt: new Date().toISOString()
        };

        try{
          sessionStorage.setItem(EDITOR_RETURN_KEY, JSON.stringify(returnPayload));
        }catch(err){
          // Ignore storage failures and continue navigation.
        }

        window.location.href = 'index.html';
      }

      function isEditorFocused(){
        if(useFallbackEditor){
          return document.activeElement === fallbackEditor;
        }

        if(editorInstance && typeof editorInstance.hasTextFocus === 'function'){
          if(editorInstance.hasTextFocus()) return true;
        }

        const active = document.activeElement;
        return !!(active && editorMount.contains(active));
      }

      function insertCodeAtCursor(text){
        if(useFallbackEditor){
          const start = fallbackEditor.selectionStart ?? fallbackEditor.value.length;
          const end = fallbackEditor.selectionEnd ?? fallbackEditor.value.length;
          const before = fallbackEditor.value.slice(0, start);
          const after = fallbackEditor.value.slice(end);
          fallbackEditor.value = before + text + after;
          const nextPos = start + text.length;
          fallbackEditor.selectionStart = nextPos;
          fallbackEditor.selectionEnd = nextPos;
          fallbackEditor.focus();
          return;
        }

        if(editorInstance && monacoRef){
          const range = editorInstance.getSelection();
          editorInstance.executeEdits('proof-file-paste', [{
            range: range,
            text: text,
            forceMoveMarkers: true
          }]);
          editorInstance.pushUndoStop();
          editorInstance.focus();
        }
      }

      async function handleProofFilePaste(e){
        if(!isEditorFocused()) return;

        const clipboard = e.clipboardData;
        if(!clipboard || !clipboard.items) return;

        const files = [];
        for(const item of clipboard.items){
          if(item.kind !== 'file') continue;
          const file = item.getAsFile();
          if(file) files.push(file);
        }

        if(files.length === 0) return;

        const expectedExt = selectedConfig.extension.toLowerCase();
        const matchedFiles = files.filter(file=>{
          const name = (file.name || '').toLowerCase();
          return name.endsWith(expectedExt);
        });

        if(matchedFiles.length === 0) return;

        e.preventDefault();

        const chunks = [];
        for(const file of matchedFiles){
          try{
            const text = await file.text();
            chunks.push(text);
          }catch(err){
            // Skip unreadable files and continue.
          }
        }

        if(chunks.length === 0){
          setStatus('Paste failed', true);
          outputEl.textContent = '[Paste Error]\nThe selected file could not be read from clipboard.';
          return;
        }

        const pasted = chunks.join('\n\n');
        const lineCount = pasted.length === 0 ? 0 : pasted.split(/\r?\n/).length;
        if(lineCount >= 30){
          const shouldPaste = window.confirm('貼り付け内容は ' + lineCount + ' 行です。エディタに挿入しますか？');
          if(!shouldPaste) return;
        }

        insertCodeAtCursor(pasted);
        setStatus('File pasted');
      }

      async function validateCoqProof(code){
        setStatus('Validating Coq proof...');
        outputEl.textContent = 'jsCoqで証明を検証中...\n';

        const isInScrolledMode = initPayload.sourceState === 1;
        if(!isInScrolledMode) {
          return { status: 'skip', reason: 'Not in gray mode' };
        }

        if (!jscoqInstance) {
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\njsCoqが初期化されていません。ページをリロードしてください。';
          return { status: 'error', proof_state: 'NN', reason: 'jsCoq not initialized' };
        }

        try {
          // jsCoqでコードを実行
          await jscoqInstance.execute(code);
          
          // エラーが出なかった場合、証明の終了方法をチェック
          const trimmed = code.trim();
          const hasQed = /\bQed\./.test(trimmed);
          const hasAdmitted = /\bAdmitted\./.test(trimmed);
          
          if (hasQed) {
            setStatus('Coq proof verified (YY)');
            outputEl.textContent = '[Coq Validation Success]\n証明は Qed. で完成しています (YY状態)';
            return { status: 'allowed', proof_state: 'YY', reason: 'Valid proved theorem' };
          } else if (hasAdmitted) {
            setStatus('Coq proof accepted (NY)');
            outputEl.textContent = '[Coq Validation Success]\n証明は Admitted. で暫定受け入れです (NY状態)';
            return { status: 'allowed', proof_state: 'NY', reason: 'Admitted by user' };
          } else {
            setStatus('Coq validation failed', true);
            outputEl.textContent = '[Coq Validation]\n証明が Qed. または Admitted. で終わっていません';
            return { status: 'rejected', proof_state: 'NN', reason: 'Proof not closed' };
          }
        } catch (err) {
          // jsCoq実行でエラーが出た場合、YNまたはNNとして拒否
          setStatus('Coq validation failed', true);
          const errorMsg = String(err);
          outputEl.textContent = '[Coq Validation]\njsCoq実行エラー:\n' + errorMsg;
          const hasQed = /\bQed\./.test(code.trim());
          const proofState = hasQed ? 'YN' : 'NN';
          return { status: 'rejected', proof_state: proofState, reason: 'Coq execution error: ' + errorMsg };
        }
      }

      function analyzeCoqCode(code) {
        if (!code || typeof code !== 'string') {
          return { isValid: false, error: 'Code is empty' };
        }

        const trimmed = code.trim();
        const lines = trimmed.split(/\r?\n/);
        
        let hasError = false;
        let errorMsg = '';
        let hasQed = false;
        let hasAdmitted = false;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          
          if (line.includes('Qed.')) {
            hasQed = true;
          }
          if (line.includes('Admitted.')) {
            hasAdmitted = true;
          }
          
          if (line.includes('Sorry') || line.includes('admit')) {
            hasError = true;
            errorMsg = 'Unsupported proof term found: ' + line;
          }
        }

        if (!hasQed && !hasAdmitted) {
          hasError = true;
          if (!errorMsg) {
            errorMsg = 'Proof must end with Qed. or Admitted.';
          }
        }

        return {
          isValid: hasQed || hasAdmitted,
          hasError: hasError,
          error: errorMsg,
          hasQed: hasQed,
          hasAdmitted: hasAdmitted
        };
      }

      async function runProof(){
        if(running) return;

        const endpoint = runnerEndpointEl.value.trim();
        localStorage.setItem(RUNNER_STORAGE_KEY, endpoint);

        if(!endpoint){
          setStatus('Runner endpoint required', true);
          outputEl.textContent = [
            '[Configuration]',
            'Runner endpoint is empty.',
            'Set the endpoint URL in the top input and run again.'
          ].join('\n');
          return;
        }

        running = true;
        runBtn.disabled = true;
        setStatus('Running...');

        const code = getEditorCode();
        const isCoqInScrolledMode = selectedLanguage === 'Coq' && initPayload.sourceState === 1;

        if (isCoqInScrolledMode) {
          const validation = await validateCoqProof(code);
          if (validation.status !== 'allowed') {
            running = false;
            runBtn.disabled = false;
            return;
          }
        }

        const payload = {
          proofAssistant: selectedLanguage,
          language: selectedLanguage.toLowerCase(),
          fileName: selectedConfig.fileName,
          summary: summaryText,
          code: code,
          context: {
            draftCreatedAt: initPayload.createdAt || null,
            attachedFileNames: Array.isArray(initPayload.attachedFileNames) ? initPayload.attachedFileNames : [],
            summaryLength: summaryText.length
          }
        };

        if (isCoqInScrolledMode) {
          payload.proof_state = 'YY';
        }

        try{
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          const raw = await response.text();
          if(!response.ok){
            throw new Error('HTTP ' + response.status + ' ' + response.statusText + '\n' + raw.slice(0, 1200));
          }

          let result = null;
          const contentType = response.headers.get('content-type') || '';
          if(contentType.includes('application/json')){
            try{
              result = JSON.parse(raw);
            }catch(err){
              result = { stdout: raw };
            }
          } else {
            result = { stdout: raw };
          }

          outputEl.textContent = formatRunResponse(result);
          setStatus('Run completed');
        }catch(err){
          const msg = err && err.message ? err.message : String(err);
          outputEl.textContent = '[Run Error]\n' + msg;
          setStatus('Run failed', true);
        }finally{
          running = false;
          runBtn.disabled = false;
        }
      }

      function formatRunResponse(data){
        if(typeof data === 'string') return data;
        if(!data || typeof data !== 'object') return String(data);

        const sections = [];

        if(typeof data.stdout === 'string' && data.stdout.length > 0){
          sections.push('[stdout]\n' + data.stdout);
        }

        if(typeof data.stderr === 'string' && data.stderr.length > 0){
          sections.push('[stderr]\n' + data.stderr);
        }

        if(Array.isArray(data.diagnostics) && data.diagnostics.length > 0){
          const diagnosticLines = data.diagnostics.map(function(item, index){
            if(typeof item === 'string') return (index + 1) + '. ' + item;
            const file = item.file ? item.file + ':' : '';
            const line = item.line ? String(item.line) : '?';
            const col = item.column ? String(item.column) : '?';
            const message = item.message || JSON.stringify(item);
            return (index + 1) + '. ' + file + line + ':' + col + ' ' + message;
          });
          sections.push('[diagnostics]\n' + diagnosticLines.join('\n'));
        }

        if(typeof data.result === 'string' && data.result.length > 0){
          sections.push('[result]\n' + data.result);
        }

        if(sections.length === 0){
          sections.push(JSON.stringify(data, null, 2));
        }

        return sections.join('\n\n');
      }

      function defineEditorTheme(monaco){
        monaco.editor.defineTheme('ivucx-github-light', {
          base: 'vs',
          inherit: true,
          rules: [
            { token: 'comment', foreground: '6A737D' },
            { token: 'keyword', foreground: 'CF222E' },
            { token: 'number', foreground: '0550AE' },
            { token: 'operator', foreground: '24292F' },
            { token: 'type.identifier', foreground: '8250DF' }
          ],
          colors: {
            'editor.background': '#FFFFFF',
            'editorLineNumber.foreground': '#9AA4B2',
            'editorLineNumber.activeForeground': '#57606A',
            'editor.selectionBackground': '#DDEBFF',
            'editor.inactiveSelectionBackground': '#EDF3FF',
            'editorCursor.foreground': '#0969DA',
            'editorIndentGuide.background1': '#EFF2F6'
          }
        });
      }

      function registerCustomLanguages(monaco){
        registerLeanLanguage(monaco);
        registerCoqLanguage(monaco);
        registerIsabelleLanguage(monaco);
        registerAgdaLanguage(monaco);
      }

      function registerLeanLanguage(monaco){
        const id = languageConfig.Lean.monacoId;
        monaco.languages.register({ id: id });
        monaco.languages.setMonarchTokensProvider(id, {
          keywords: [
            'theorem','lemma','def','axiom','example','inductive','structure','namespace','open','import',
            'where','by','match','with','if','then','else','let','in','have','show','fun','forall','exists'
          ],
          operators: [':=','->','=>','<-','<->','=','+','-','*','/','|',':','<','>'],
          symbols: /[:=><!~?&|+\-*\/\\]+/,
          tokenizer: {
            root: [
              { include: '@whitespace' },
              [/[A-Z][\w']*/, 'type.identifier'],
              [/[a-zA-Z_][\w']*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
              [/\d+(\.\d+)?/, 'number'],
              [/[{}()\[\]]/, '@brackets'],
              [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }]
            ],
            whitespace: [
              [/[ \t\r\n]+/, ''],
              [/--.*$/, 'comment'],
              [/\/-/, 'comment', '@comment']
            ],
            comment: [
              [/[^-/]+/, 'comment'],
              [/\/-/, 'comment', '@push'],
              [/-\//, 'comment', '@pop'],
              [/[-/]/, 'comment']
            ]
          }
        });
      }

      function registerCoqLanguage(monaco){
        const id = languageConfig.Coq.monacoId;
        monaco.languages.register({ id: id });
        monaco.languages.setMonarchTokensProvider(id, {
          keywords: [
            'Theorem','Lemma','Corollary','Proof','Qed','Defined','Fixpoint','Inductive','Definition',
            'forall','exists','match','with','end','fun','let','in','Type','Prop','Set'
          ],
          operators: [':=','->','=>','<->','=','+','-','*','/','|',':','<','>'],
          symbols: /[:=><!~?&|+\-*\/\\]+/,
          tokenizer: {
            root: [
              { include: '@whitespace' },
              [/[A-Z][\w']*/, 'type.identifier'],
              [/[a-zA-Z_][\w']*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
              [/\d+(\.\d+)?/, 'number'],
              [/[{}()\[\]]/, '@brackets'],
              [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }]
            ],
            whitespace: [
              [/[ \t\r\n]+/, ''],
              [/\(\*/, 'comment', '@comment']
            ],
            comment: [
              [/[^(*]+/, 'comment'],
              [/\(\*/, 'comment', '@push'],
              [/\*\)/, 'comment', '@pop'],
              [/[*()]/, 'comment']
            ]
          }
        });
      }

      function registerIsabelleLanguage(monaco){
        const id = languageConfig.Isabelle.monacoId;
        monaco.languages.register({ id: id });
        monaco.languages.setMonarchTokensProvider(id, {
          keywords: [
            'theory','imports','begin','end','lemma','theorem','proof','qed','by','assumes','shows',
            'have','show','fixes','obtains','where','if','then','else','let','in'
          ],
          operators: [':=','->','=>','<->','=','+','-','*','/','|',':','<','>'],
          symbols: /[:=><!~?&|+\-*\/\\]+/,
          tokenizer: {
            root: [
              { include: '@whitespace' },
              [/[A-Z][\w']*/, 'type.identifier'],
              [/[a-zA-Z_][\w']*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
              [/"([^"\\]|\\.)*"/, 'string'],
              [/\d+(\.\d+)?/, 'number'],
              [/[{}()\[\]]/, '@brackets'],
              [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }]
            ],
            whitespace: [
              [/[ \t\r\n]+/, ''],
              [/\(\*/, 'comment', '@comment']
            ],
            comment: [
              [/[^(*]+/, 'comment'],
              [/\(\*/, 'comment', '@push'],
              [/\*\)/, 'comment', '@pop'],
              [/[*()]/, 'comment']
            ]
          }
        });
      }

      function registerAgdaLanguage(monaco){
        const id = languageConfig.Agda.monacoId;
        monaco.languages.register({ id: id });
        monaco.languages.setMonarchTokensProvider(id, {
          keywords: [
            'module','where','data','record','postulate','open','import','infix','infixl','infixr',
            'let','in','with','forall','Set','Prop'
          ],
          operators: [':=','->','=>','=','+','-','*','/','|',':','<','>'],
          symbols: /[:=><!~?&|+\-*\/\\]+/,
          tokenizer: {
            root: [
              { include: '@whitespace' },
              [/[A-Z][\w']*/, 'type.identifier'],
              [/[a-zA-Z_][\w']*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
              [/\d+(\.\d+)?/, 'number'],
              [/[{}()\[\]]/, '@brackets'],
              [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }]
            ],
            whitespace: [
              [/[ \t\r\n]+/, ''],
              [/--.*$/, 'comment'],
              [/\{-/, 'comment', '@comment']
            ],
            comment: [
              [/[^{}-]+/, 'comment'],
              [/\{-/, 'comment', '@push'],
              [/-\}/, 'comment', '@pop'],
              [/[-{}]/, 'comment']
            ]
          }
        });
      }
    })();
  </script>
  <div id="coq" style="display:none;"></div>
  <script src="https://jscoq.github.io/jscoq/latest/dist/jscoq.js"></script>
