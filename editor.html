<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iVucx Editor</title>
  <style>
    :root{
      --bg:#0d1117;
      --panel:#11161c;
      --ink:#e6edf3;
      --muted:#9aa7b6;
      --line:#2d333b;
      --accent:#2f81f7;
      --accent-dark:#0f4aa6;
      --ok:#3fb950;
      --warn:#ff7b72;
      --header:#010409;
      --header-ink:#e6edf3;
    }
    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:56px;
      padding:10px 14px;
      background:var(--header);
      color:var(--header-ink);
      border-bottom:1px solid #1b1f24;
    }

    .left-cluster,
    .right-cluster{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .product{
      font-size:14px;
      font-weight:650;
      white-space:nowrap;
    }

    .lang-badge{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.28);
      font-size:12px;
      font-weight:650;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .file-name{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      color:#d0d7de;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }

    .btn{
      border:1px solid transparent;
      background:#1f2937;
      border-color:#374151;
      color:#e6edf3;
      border-radius:8px;
      height:34px;
      padding:0 12px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      transition:background-color .2s ease,color .2s ease,border-color .2s ease,transform .12s ease;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .btn-back{
      background:transparent;
      border-color:rgba(255,255,255,0.25);
      color:#f6f8fa;
      width:34px;
      min-width:34px;
      padding:0;
      border-radius:999px;
      font-size:24px;
      line-height:1;
    }

    .btn-back:hover{
      background:rgba(255,255,255,0.08);
    }

    .btn-run{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .btn-run:hover{
      background:var(--accent-dark);
      border-color:var(--accent-dark);
    }
.workspace{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(360px, 1fr) minmax(280px, 36%);
      gap:10px;
      padding:10px;
    }

    .pane{
      min-height:0;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .pane-head{
      flex:0 0 38px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 12px;
      border-bottom:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
      background:linear-gradient(to bottom, #141b23, #10161d);
    }

    .status{
      font-weight:650;
      color:var(--ok);
    }

    .status.error{
      color:var(--warn);
    }

    .editor-frame{
      flex:1;
      min-height:0;
      position:relative;
      background:#0d1117;
    }

    #editor{
      position:absolute;
      inset:0;
    }

    #fallbackEditor{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      outline:none;
      resize:none;
      padding:16px;
      font-size:14px;
      line-height:1.5;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      background:#0d1117;
      color:#e6edf3;
      display:none;
    }

    #coq,
    #ide-wrapper{
      position:fixed;
      width:1px;
      height:1px;
      top:-10000px;
      left:-10000px;
      overflow:hidden;
      opacity:0;
      pointer-events:none;
      z-index:-1;
    }

    #outputPanel{
      flex:1;
      margin:0;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      padding:14px;
      font-size:13px;
      line-height:1.45;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      color:#c9d1d9;
      background:#0d1117;
    }

    .lean-panel{
      border-top:1px solid var(--line);
      background:#0f1520;
      display:none;
      flex-direction:column;
      min-height:0;
    }

    .lean-panel.active{
      display:flex;
    }

    .lean-panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px 12px;
      font-size:11px;
      color:var(--muted);
      border-bottom:1px solid var(--line);
      background:linear-gradient(to bottom, #141b23, #10161d);
    }

    .lean-panel-actions{
      display:flex;
      gap:6px;
    }

    .btn-small{
      padding:4px 8px;
      font-size:11px;
      border-radius:6px;
    }


    .lean-goals{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:10px 12px 12px;
      border-top:1px solid var(--line);
      background:#0f1520;
    }

    .lean-goals-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-size:11px;
      color:var(--muted);
    }

    #leanGoalsInput{
      width:100%;
      min-height:90px;
      resize:vertical;
      padding:8px;
      border-radius:6px;
      border:1px solid var(--line);
      background:#0d1117;
      color:#c9d1d9;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      line-height:1.4;
    }

    #leanGoalsSummary{
      font-size:12px;
      color:var(--muted);
    }

    #leanGoalsSummary.error{
      color:var(--warn);
    }

    @media (max-width:1020px){
      .workspace{
        grid-template-columns:1fr;
        grid-template-rows:minmax(300px, 1fr) minmax(180px, 42%);
      }

      .right-cluster{
        width:100%;
        justify-content:flex-end;
      }
    }

    @media (max-width:760px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .left-cluster,
      .right-cluster{
        width:100%;
      }

      .right-cluster{
        justify-content:space-between;
      }

    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="left-cluster">
      <button class="btn btn-back" id="backBtn" type="button" aria-label="Back to summary">&larr;</button>
      <div class="product">iVucx Editor</div>
      <div class="lang-badge" id="langBadge">Lean</div>
      <div class="file-name" id="fileName">Main.lean</div>
    </div>
    <div class="right-cluster">
      <button class="btn btn-run" id="runBtn" type="button">Run</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane">
      <div class="pane-head">
        <span>Editor</span>
        <span class="status" id="statusText">Ready</span>
      </div>
      <div class="editor-frame">
        <div id="editor"></div>
        <textarea id="fallbackEditor" spellcheck="false"></textarea>
      </div>
    </section>

    <section class="pane">
      <div class="pane-head">
        <span id="outputTitle">Server Output</span>
        <span id="outputHint">Ctrl/Cmd + Enter to run</span>
      </div>
      <pre id="outputPanel"></pre>
      <div class="lean-panel" id="leanPanel">
        <div class="lean-panel-head">
          <span>Lean Server</span>
        </div>
        <div class="lean-goals">
          <div class="lean-goals-row">
            <span>Goals Snapshot</span>
            <button class="btn btn-small" id="leanGoalsVerifyBtn" type="button">Verify</button>
          </div>
          <textarea id="leanGoalsInput" placeholder="Paste goals/infoview text here"></textarea>
          <div id="leanGoalsSummary">Paste goals/infoview text here to summarize.</div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="CoqRunner.js"></script>
  <script>
    (function(){
      const INIT_STORAGE_KEY = 'ivucxEditorInit';
      const EDITOR_RETURN_KEY = 'ivucxEditorReturn';

      const langBadgeEl = document.getElementById('langBadge');
      const fileNameEl = document.getElementById('fileName');
      const outputEl = document.getElementById('outputPanel');
      const outputTitleEl = document.getElementById('outputTitle');
      const outputHintEl = document.getElementById('outputHint');
      const leanPanel = document.getElementById('leanPanel');
      const leanGoalsInput = document.getElementById('leanGoalsInput');
      const leanGoalsVerifyBtn = document.getElementById('leanGoalsVerifyBtn');
      const leanGoalsSummary = document.getElementById('leanGoalsSummary');
      const statusEl = document.getElementById('statusText');
      const runBtn = document.getElementById('runBtn');
      const backBtn = document.getElementById('backBtn');
      const fallbackEditor = document.getElementById('fallbackEditor');
      const editorMount = document.getElementById('editor');

      const languageConfig = {
        Lean: {
          monacoId: 'ivucx-lean',
          fileName: 'Main.lean',
          extension: '.lean',
          starter: [
            'theorem hello : True := by',
            '  trivial'
          ].join('\n')
        },
        Coq: {
          monacoId: 'ivucx-coq',
          fileName: 'Main.v',
          extension: '.v',
          starter: [
            'Theorem hello : True.',
            'Proof.',
            '  exact I.',
            'Qed.'
          ].join('\n')
        },
        Isabelle: {
          monacoId: 'ivucx-isabelle',
          fileName: 'Main.thy',
          extension: '.thy',
          starter: [
            'theory Main',
            '  imports Main',
            'begin',
            '',
            'lemma hello: "True"',
            '  by simp',
            '',
            'end'
          ].join('\n')
        },
        Agda: {
          monacoId: 'ivucx-agda',
          fileName: 'Main.agda',
          extension: '.agda',
          starter: [
            'module Main where',
            '',
            'data True : Set where',
            '  triv : True',
            '',
            'hello : True',
            'hello = triv'
          ].join('\n')
        }
      };

      const initPayload = readInitPayload();
      const params = new URLSearchParams(window.location.search);
      const selectedLanguage = resolveLanguage(params.get('lang') || initPayload.proofAssistant || 'Lean');
      const selectedConfig = languageConfig[selectedLanguage];

      langBadgeEl.textContent = selectedLanguage;
      fileNameEl.textContent = selectedConfig.fileName;



      const summaryText = typeof initPayload.summary === 'string'
        ? initPayload.summary
        : (typeof initPayload.draft === 'string' ? initPayload.draft : '');
      const initialDraft = initPayload.keepSummaryBackground
        ? ''
        : (typeof initPayload.draft === 'string'
          ? initPayload.draft
          : summaryText);


      let editorInstance = null;
      let useFallbackEditor = false;
      let monacoRef = null;
      let running = false;
      let leanSeed = '';

      if(selectedLanguage === 'Lean'){
        leanSeed = initialDraft && initialDraft.trim()
          ? initialDraft
          : (selectedConfig && selectedConfig.starter ? selectedConfig.starter : '');
      }

      setStatus('Ready');

      setInitialOutputMessage(selectedLanguage, selectedConfig.fileName, initPayload, summaryText);
      setLeanMode(selectedLanguage === 'Lean');


      backBtn.addEventListener('click', ()=>{
        handleBackNavigation();
      });


      runBtn.addEventListener('click', ()=>{
        runProof();
      });

      if(leanGoalsVerifyBtn){
        leanGoalsVerifyBtn.addEventListener('click', ()=>{
          renderLeanGoalsSummary(leanGoalsInput ? leanGoalsInput.value : '');
        });
      }

      if(selectedLanguage === 'Lean'){
        if(!leanSeed && selectedConfig && selectedConfig.starter){
          leanSeed = selectedConfig.starter;
        }
        initializeEditor(leanSeed, selectedLanguage);
      } else {
        initializeEditor(initialDraft, selectedLanguage);
      }
      window.addEventListener('paste', handleProofFilePaste, true);

      function readInitPayload(){
        try{
          const raw = sessionStorage.getItem(INIT_STORAGE_KEY);
          if(!raw) return {};
          sessionStorage.removeItem(INIT_STORAGE_KEY);
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        }catch(err){
          return {};
        }
      }

      function resolveLanguage(value){
        const input = String(value || '').trim().toLowerCase();
        if(input === 'coq') return 'Coq';
        if(input === 'isabelle') return 'Isabelle';
        if(input === 'agda') return 'Agda';
        return 'Lean';
      }

      function safeStorageGet(storage, key){
        try{
          return storage.getItem(key) || '';
        }catch(err){
          return '';
        }
      }

      function safeStorageHas(storage, key){
        try{
          return storage.getItem(key) !== null;
        }catch(err){
          return false;
        }
      }

      function safeStorageSet(storage, key, value){
        try{
          storage.setItem(key, value);
          return true;
        }catch(err){
          return false;
        }
      }

      function tryParseJson(text){
        if(typeof text !== 'string') return null;
        const trimmed = text.trim();
        if(!trimmed) return null;
        if(!/^[\[{]/.test(trimmed)) return null;
        try{
          return JSON.parse(trimmed);
        }catch(err){
          return null;
        }
      }

      function setStatus(text, isError){
        statusEl.textContent = text;
        statusEl.classList.toggle('error', !!isError);
      }

      function setLeanMode(active){
        if(!active){
          if(outputTitleEl) outputTitleEl.textContent = 'Server Output';
          if(outputHintEl) outputHintEl.textContent = 'Ctrl/Cmd + Enter to run';
          if(runBtn) runBtn.style.display = '';
          setLeanPanelActive(false);
          return;
        }
        if(outputTitleEl) outputTitleEl.textContent = 'Lean 4';
        if(outputHintEl){
          outputHintEl.textContent = 'Ctrl/Cmd + Enter to run (server)';
        }
        setLeanPanelActive(true);
      }

      function setLeanPanelActive(active){
        if(!leanPanel) return;
        leanPanel.classList.toggle('active', !!active);
      }

      function summarizeLeanGoals(text){
        const trimmed = String(text || '').trim();
        if(!trimmed){
          return { ok: false, summary: 'No goals text provided.' };
        }
        const lower = trimmed.toLowerCase();
        if(lower.includes('no goals') || lower.includes('no goal')){
          return { ok: true, summary: 'Goals: 0 (Lean reports no goals).' };
        }
        const goalMarks = (trimmed.match(/⊢/g) || []).length;
        const lines = trimmed.split(/\r?\n/).map(line=>line.trim()).filter(Boolean);
        const head = lines.slice(0, 4).join(' | ');
        const countNote = goalMarks ? 'Goals detected: ' + goalMarks : 'Goals detected: unknown';
        const summary = head ? countNote + ' | Summary: ' + head : countNote;
        return { ok: true, summary };
      }

      function renderLeanGoalsSummary(text){
        if(!leanGoalsSummary) return;
        const result = summarizeLeanGoals(text);
        leanGoalsSummary.textContent = result.summary;
        leanGoalsSummary.classList.toggle('error', !result.ok);
      }






      function setInitialOutputMessage(language, fileName, payload, summary){
        const lines = [
          'Editor initialized.',
          'Language: ' + language,
          'File: ' + fileName
        ];

        if(typeof summary === 'string'){
          lines.push('Summary is stored separately (' + summary.length + ' chars).');
        }

        if(language === 'Coq'){
          lines.push('Coq proofs are verified on the server and via CoqRunner.');
          lines.push('Run sends code to /api/coq-check.');
        } else if(language === 'Lean'){
          lines.push('Lean 4 is verified on the Render server.');
          lines.push('Run sends code to /api/lean-check.');
        } else {
          lines.push('Runner is disabled for this language.');
        }

        lines.push('Shortcut: Ctrl/Cmd + Enter');
        outputEl.textContent = lines.join("\n");
      }

      function initializeEditor(initialText, language){
        if(typeof window.require !== 'function'){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco could not be loaded. Fallback textarea is active.';
          return;
        }

        window.require.config({
          paths: {
            vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
          }
        });

        window.require(['vs/editor/editor.main'], function(){
          monacoRef = window.monaco;
          registerCustomLanguages(monacoRef);
          defineEditorTheme(monacoRef);

          editorInstance = monacoRef.editor.create(editorMount, {
            value: initialText,
            language: selectedConfig.monacoId,
            theme: 'ivucx-github-light',
            automaticLayout: true,
            minimap: { enabled: false },
            smoothScrolling: true,
            scrollBeyondLastLine: false,
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 14,
            lineNumbersMinChars: 3,
            tabSize: 2
          });

          editorInstance.addCommand(monacoRef.KeyMod.CtrlCmd | monacoRef.KeyCode.Enter, function(){
            runProof();
          });
        }, function(){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco loading failed. Fallback textarea is active.';
        });
      }

      function activateFallbackEditor(initialText){
        useFallbackEditor = true;
        editorMount.style.display = 'none';
        fallbackEditor.style.display = 'block';
        fallbackEditor.value = initialText;
        fallbackEditor.addEventListener('keydown', function(e){
          const isRunShortcut = (e.ctrlKey || e.metaKey) && e.key === 'Enter';
          if(!isRunShortcut) return;
          e.preventDefault();
          runProof();
        });
      }

      function getEditorCode(){
        if(useFallbackEditor) return fallbackEditor.value;
        if(editorInstance) return editorInstance.getValue();
        return '';
      }

      function handleBackNavigation(){
        const currentCode = getEditorCode();
        if(currentCode.length >= 30){
          const shouldReturn = window.confirm('The editor has 30+ lines. Return to the summary?');
          if(!shouldReturn) return;
        }

        const returnPayload = {
          summary: summaryText,
          proofAssistant: selectedLanguage,
          returnedAt: new Date().toISOString()
        };

        try{
          sessionStorage.setItem(EDITOR_RETURN_KEY, JSON.stringify(returnPayload));
        }catch(err){
          // Ignore storage failures and continue navigation.
        }

        window.location.href = 'index.html';
      }

      function isEditorFocused(){
        if(useFallbackEditor){
          return document.activeElement === fallbackEditor;
        }

        if(editorInstance && typeof editorInstance.hasTextFocus === 'function'){
          if(editorInstance.hasTextFocus()) return true;
        }

        const active = document.activeElement;
        return !!(active && editorMount.contains(active));
      }

      function insertCodeAtCursor(text){
        if(useFallbackEditor){
          const start = fallbackEditor.selectionStart ?? fallbackEditor.value.length;
          const end = fallbackEditor.selectionEnd ?? fallbackEditor.value.length;
          const before = fallbackEditor.value.slice(0, start);
          const after = fallbackEditor.value.slice(end);
          fallbackEditor.value = before + text + after;
          const nextPos = start + text.length;
          fallbackEditor.selectionStart = nextPos;
          fallbackEditor.selectionEnd = nextPos;
          fallbackEditor.focus();
          return;
        }

        if(editorInstance && monacoRef){
          const range = editorInstance.getSelection();
          editorInstance.executeEdits('proof-file-paste', [{
            range: range,
            text: text,
            forceMoveMarkers: true
          }]);
          editorInstance.pushUndoStop();
          editorInstance.focus();
        }
      }

      async function handleProofFilePaste(e){
        if(!isEditorFocused()) return;

        const clipboard = e.clipboardData;
        if(!clipboard || !clipboard.items) return;

        const files = [];
        for(const item of clipboard.items){
          if(item.kind !== 'file') continue;
          const file = item.getAsFile();
          if(file) files.push(file);
        }

        if(files.length === 0) return;

        const expectedExt = selectedConfig.extension.toLowerCase();
        const matchedFiles = files.filter(file=>{
          const name = (file.name || '').toLowerCase();
          return name.endsWith(expectedExt);
        });

        if(matchedFiles.length === 0) return;

        e.preventDefault();

        const chunks = [];
        for(const file of matchedFiles){
          try{
            const text = await file.text();
            chunks.push(text);
          }catch(err){
            // Skip unreadable files and continue.
          }
        }

        if(chunks.length === 0){
          setStatus('Paste failed', true);
          outputEl.textContent = '[Paste Error]\nThe selected file could not be read from clipboard.';
          return;
        }

        const pasted = chunks.join('\n\n');
        const lineCount = pasted.length === 0 ? 0 : pasted.split(/\r?\n/).length;
        if(lineCount >= 30){
          const shouldPaste = window.confirm('You are pasting ' + lineCount + ' lines. Continue?');
          if(!shouldPaste) return;
        }

        insertCodeAtCursor(pasted);
        setStatus('File pasted');
      }



      async function validateCoqProof(code){
        setStatus('Validating Coq proof...');
        outputEl.textContent = 'Checking Coq proof...\n';
        const normalized = stripCoqCommentsAndStrings(code);
        const libraryCatalog = buildCoqLibraryCatalog(initPayload);
        const libraryCheck = validateCoqLibraryUsage(normalized, libraryCatalog);
        if(!libraryCheck.ok){
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + libraryCheck.reason;
          return { status: 'rejected', proof_state: 'NN', reason: libraryCheck.reason };
        }
        const axiomConflict = detectCoqAxiomConflict(normalized, libraryCatalog);
        if(axiomConflict){
          const conflictLines = ['Library axiom conflicts with proof axiom: ' + axiomConflict.name];
          if(axiomConflict.libraryStatement){
            conflictLines.push('Library axiom: ' + axiomConflict.libraryStatement);
          }
          if(axiomConflict.proofStatement){
            conflictLines.push('Proof axiom: ' + axiomConflict.proofStatement);
          }
          const conflictMessage = conflictLines.join("\n");
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + conflictMessage;
          return { status: 'rejected', proof_state: 'NN', reason: conflictMessage };
        }
        const closure = analyzeCoqClosure(code);
        if(closure.proofState === 'NN'){
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + closure.reason;
          return { status: 'rejected', proof_state: 'NN', reason: closure.reason };
        }

        const soundnessIssue = findCoqUnsoundToken(code);
        if(soundnessIssue){
          const summary = soundnessIssue.line + ':' + soundnessIssue.col + ' ' + soundnessIssue.message + ' (' + soundnessIssue.token + ') (remaining goals: unknown).';
          setStatus('Coq soundness failed', true);
          outputEl.textContent = '[Coq Soundness]\n' + summary;
          return { status: 'rejected', proof_state: 'YN', reason: soundnessIssue.message };
        }

        function formatCoqRunnerDetails(details){
          if(!details) return '';
          const lines = [];

            }
            if(details.jsonExceptions.length > cap){

            }
          }
          if(Array.isArray(details.warnings) && details.warnings.length){
            lines.push('Warnings (' + details.warnings.length + '):');
            const cap = Math.min(details.warnings.length, 3);
            for(let i = 0; i < cap; i++){
              lines.push('Warning ' + (i + 1) + ': ' + details.warnings[i]);
            }
            if(details.warnings.length > cap){
              lines.push('...and ' + (details.warnings.length - cap) + ' more.');

          return lines.length ? '\n' + lines.join('\n') : '';
        }

        outputEl.textContent = '[Coq Server]\nSending code to server...';
        const serverResult = await requestCoqServer(code);
        const serverText = formatCoqServerResult(serverResult, closure);
        if(!serverResult.ok){
          setStatus('Coq validation failed', true);
          outputEl.textContent = serverText;
          const failureReason = serverResult && serverResult.error
            ? serverResult.error
            : 'Coq server validation failed.';
          return { status: 'rejected', proof_state: closure.proofState, reason: failureReason };
        }

        if(closure.proofState === 'NY'){
          setStatus('Coq proof accepted (NY)');
          outputEl.textContent = serverText + '\n\n[Coq Validation]\nProof ends with ' + closure.closer + ' (NY).';
          return { status: 'allowed', proof_state: 'NY', reason: 'Temporary acceptance (NY)' };
        }

        if(typeof checkProofText !== 'function'){
          setStatus('Coq proof verified (YY)');
          outputEl.textContent = serverText + '\n\n[CoqRunner]\nCoqRunner.js is not available (remaining goals: unknown).';
          return { status: 'allowed', proof_state: 'YY', reason: 'Coq server ok' };
        }

        try{
          const result = await checkProofText(code);
          if(result && result.ok){
            setStatus('Coq proof verified (YY)');
            const detailsText = formatCoqRunnerDetails(result.details);
            const runnerText = '[CoqRunner]\nProof verified by CoqRunner (' + closure.closer + ').' + detailsText;
            outputEl.textContent = serverText + '\n\n' + runnerText;
            return { status: 'allowed', proof_state: 'YY', reason: 'Valid closed proof' };
          }
          const err = result && result.error ? result.error : null;
          const detailsText = formatCoqRunnerDetails(result && result.details ? result.details : null);
          const remainingText = (err && typeof err.remaining === 'number' && err.remaining >= 0)
            ? String(err.remaining)
            : 'unknown';
          let summary = 'CoqRunner failed (remaining goals: ' + remainingText + ').';
          if(err){
            if(err.timeout){
              summary = 'CoqRunner timed out (remaining goals: ' + remainingText + ').';
            } else if(Array.isArray(err.summaries) && err.summaries.length > 0){
              summary = 'CoqRunner failed (remaining goals: ' + remainingText + '): ' + err.summaries.join(' | ');
            }
          }
          setStatus('Coq proof verified (YY)');
          outputEl.textContent = serverText + '\n\n[CoqRunner]\n' + summary + detailsText;
          return { status: 'allowed', proof_state: 'YY', reason: summary };
        } catch (err) {
          const errorMsg = err && err.message ? err.message : String(err);
          const summary = 'CoqRunner error: ' + errorMsg + ' (remaining goals: unknown).';
          setStatus('Coq proof verified (YY)');
          outputEl.textContent = serverText + '\n\n[CoqRunner]\n' + summary;
          return { status: 'allowed', proof_state: 'YY', reason: summary };
        }
      }

      async function requestCoqServer(code){

      async function validateLeanProof(code){
        setStatus('Validating Lean proof...');
        const normalized = stripLeanCommentsAndStrings(code);
        const libraryCatalog = buildLeanLibraryCatalog(initPayload);
        const libraryCheck = validateLeanLibraryUsage(normalized, libraryCatalog);
        if(!libraryCheck.ok){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\n' + libraryCheck.reason;
          return { status: 'rejected', proof_state: 'NN', reason: libraryCheck.reason };
        }
        const axiomConflict = detectLeanAxiomConflict(normalized, libraryCatalog);
        if(axiomConflict){
          const conflictLines = [
            'Library axiom conflicts with proof axiom: ' + axiomConflict.name
          ];
          if(axiomConflict.libraryStatement){
            conflictLines.push('Library axiom: ' + axiomConflict.libraryStatement);
          }
          if(axiomConflict.proofStatement){
            conflictLines.push('Proof axiom: ' + axiomConflict.proofStatement);
          }
          const conflictMessage = conflictLines.join('\n');
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\n' + conflictMessage;
          return { status: 'rejected', proof_state: 'NN', reason: conflictMessage };
        }

        const closure = analyzeLeanClosure(code);
        if(closure.proofState === 'NN'){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\n' + (closure.reason || 'Code is empty');
          return { status: 'rejected', proof_state: 'NN', reason: closure.reason || 'Lean code is empty' };
        }

        outputEl.textContent = '[Lean Server]\nSending code to server...';
        const serverResult = await requestLeanServer(code);
        outputEl.textContent = formatLeanServerResult(serverResult, closure);

        if(serverResult.ok){
          if(closure.proofState === 'NY'){
            setStatus('Lean proof accepted (NY)');
            return { status: 'allowed', proof_state: 'NY', reason: 'Temporary acceptance (NY)' };
          }
          setStatus('Lean validated');
          return { status: 'allowed', proof_state: 'YY', reason: 'Lean server ok' };
        }

        const failureReason = serverResult && serverResult.error
          ? serverResult.error
          : 'Lean server validation failed.';
        setStatus('Lean validation failed', true);
        return { status: 'rejected', proof_state: closure.proofState, reason: failureReason };
      }

      function analyzeLeanClosure(code){
        if(!code || typeof code !== 'string'){
          return { proofState: 'NN', closer: '', reason: 'Code is empty' };
        }

        const normalized = stripLeanCommentsAndStrings(code).trim();
        if(!normalized){
          return { proofState: 'NN', closer: '', reason: 'Code is empty' };
        }

        if(/\b(sorry|admit)\b/.test(normalized)){
          return { proofState: 'NY', closer: 'sorry/admit' };
        }

        if(/(^|\n)\s*(axiom|constant)\b/.test(normalized)){
          return { proofState: 'NY', closer: 'axiom/constant' };
        }

        return { proofState: 'YY', closer: 'Lean checked' };
      }

      function stripLeanCommentsAndStrings(input){
        let output = '';
        let i = 0;
        let blockCommentDepth = 0;
        let inString = false;
        let inLineComment = false;

        while(i < input.length){
          const ch = input[i];
          const next = input[i + 1];

          if(inString){
            if(ch === '\\'){
              i += 2;
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            i += 1;
            continue;
          }

          if(inLineComment){
            if(ch === '\n' || ch === '\r'){
              inLineComment = false;
              output += ch;
            }
            i += 1;
            continue;
          }

          if(blockCommentDepth > 0){
            if(ch === '/' && next === '-'){
              blockCommentDepth += 1;
              i += 2;
              continue;
            }
            if(ch === '-' && next === '/'){
              blockCommentDepth -= 1;
              i += 2;
              continue;
            }
            i += 1;
            continue;
          }

          if(ch === '-' && next === '-'){
            inLineComment = true;
            i += 2;
            continue;
          }

          if(ch === '/' && next === '-'){
            blockCommentDepth = 1;
            i += 2;
            continue;
          }

          if(ch === '"'){
            inString = true;
            i += 1;
            continue;
          }

          output += ch;
          i += 1;
        }

        return output;
      }

      function analyzeCoqClosure(code) {
        if(!code || typeof code !== 'string'){
          return { proofState: 'NN', reason: 'The proof must end with Qed. / Defined. / Admitted. / Conjecture.' };
        }

        const normalized = stripCoqCommentsAndStrings(code).trim();
        if(!normalized){
          return { proofState: 'NN', reason: 'The proof must end with Qed. / Defined. / Admitted. / Conjecture.' };
        }

        if(/Admitted\.\s*$/.test(normalized)){
          return { proofState: 'NY', closer: 'Admitted.' };
        }
        if(isConjectureTail(normalized)){
          return { proofState: 'NY', closer: 'Conjecture.' };
        }
        if(/Defined\.\s*$/.test(normalized)){
          return { proofState: 'YY', closer: 'Defined.' };
        }
        if(/Qed\.\s*$/.test(normalized)){
          return { proofState: 'YY', closer: 'Qed.' };
        }

        return { proofState: 'NN', reason: 'The proof must end with Qed. / Defined. / Admitted. / Conjecture.' };
      }

      function isConjectureTail(normalized){
        const matches = Array.from(normalized.matchAll(/\bConjecture\b/g));
        if(matches.length === 0) return false;
        const last = matches[matches.length - 1];
        const idx = typeof last.index === 'number' ? last.index : -1;
        if(idx < 0) return false;
        const tail = normalized.slice(idx).trim();
        if(!tail.endsWith('.')) return false;
        const dotCount = (tail.match(/\./g) || []).length;
        if(dotCount !== 1) return false;
        return true;
      }

      function stripCoqCommentsAndStrings(input){
        let output = '';
        let i = 0;
        let commentDepth = 0;
        let inString = false;

        while(i < input.length){
          const ch = input[i];
          const next = input[i + 1];

          if(inString){
            if(ch === '\\'){
              i += 2;
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            i += 1;
            continue;
          }

          if(commentDepth > 0){
            if(ch === '(' && next === '*'){
              commentDepth += 1;
              i += 2;
              continue;
            }
            if(ch === '*' && next === ')'){
              commentDepth -= 1;
              i += 2;
              continue;
            }
            i += 1;
            continue;
          }

          if(ch === '"'){
            inString = true;
            i += 1;
            continue;
          }
          if(ch === '(' && next === '*'){
            commentDepth = 1;
            i += 2;
            continue;
          }

          output += ch;
          i += 1;
        }

        return output;
      }

      function stringifyCoqPayload(payload){
        try {
          if(typeof payload === 'string') return payload;
          if(payload === null || payload === undefined) return String(payload);
          if(payload.toString){
            const str = payload.toString();
            if(str && str !== '[object Object]') return str;
          }
          const json = JSON.stringify(payload, safeJsonReplacer(), 2);
          if(typeof json === 'string') return json;
          return String(payload);
        } catch(e) {
          return String(payload);
        }
      }

      function sanitizeCoqMessage(msg){
        const trimmed = String(msg || '').trim();
        if(!trimmed) return '';
        if(trimmed === '[object Object]') return '';
        if(/^\[\s*\]$/.test(trimmed)) return '';
        if(/^\{\s*\}$/.test(trimmed)) return '';
        return trimmed;
      }

      async function resolveMaybePromise(fn){
        try {
          const res = fn();
          if(res && typeof res.then === 'function') return await res;
          return res;
        } catch(e) {
          return null;
        }
      }

      function normalizeGoalsResponse(res){
        if(!res || typeof res !== 'object') return res;
        if(res.data !== undefined) return res.data;
        if(res.answer !== undefined) return res.answer;
        if(res.result !== undefined) return res.result;
        if(res.value !== undefined) return res.value;
        if(res.msg !== undefined) return res.msg;
        if(res.message !== undefined) return res.message;
        if(res.payload !== undefined) return res.payload;
        return res;
      }

      function countGoalsSimple(res){
        if(res === null || res === undefined) return null;
        if(typeof res === 'string'){
          if(/no\s+more\s+goals/i.test(res)) return 0;
          if(/not\s+in\s+proof\s+mode/i.test(res)) return 0;
          if(/no\s+focused\s+proof/i.test(res)) return 0;
          return null;
        }
        if(Array.isArray(res)){
          if(res.length === 0) return 0;
          const first = res[0];
          if(first && typeof first === 'object'){
            if('goal' in first || 'hyp' in first || 'hyps' in first || 'type' in first) return res.length;
          }
          for(const item of res){
            const nested = countGoalsSimple(item);
            if(nested !== null) return nested;
          }
          return null;
        }
        if(typeof res === 'object'){
          if(Array.isArray(res.goals)) return res.goals.length;
          if(res.goals && typeof res.goals === 'object'){
            const nestedGoals = countGoalsSimple(res.goals);
            if(nestedGoals !== null) return nestedGoals;
          }
          if(Array.isArray(res.fg)) return res.fg.length;
          if(Array.isArray(res.fg_goals)) return res.fg_goals.length;
          if(Array.isArray(res.bg)) return res.bg.length;
          if(Array.isArray(res.bg_goals)) return res.bg_goals.length;
          if(Array.isArray(res.focused)) return res.focused.length;
          if(Array.isArray(res.shelf)) return res.shelf.length;
          if(Array.isArray(res.shelved)) return res.shelved.length;
          if(Array.isArray(res.given_up)) return res.given_up.length;
          if(Array.isArray(res.givenUp)) return res.givenUp.length;
          if(Array.isArray(res.stack)) return res.stack.length;
          if(typeof res.goals === 'number' && Number.isFinite(res.goals)) return res.goals;
        }
        return null;
      }

      async function getCoqGoalsCount(manager, options){
        const opts = options || {};
        const timeoutMs = pickNumber(opts.timeoutMs, 4000);
        const intervalMs = pickNumber(opts.intervalMs, 50);
        const maxWait = Number.isFinite(timeoutMs) && timeoutMs > 0 ? timeoutMs : 4000;
        const step = Number.isFinite(intervalMs) && intervalMs > 0 ? intervalMs : 50;

        const coq = (typeof window !== 'undefined' && window.jsCoq)
          || (manager && manager.coq)
          || (manager && manager.provider && manager.provider.coq);

        if(!coq) return null;

        const calls = [];
        if(typeof coq.goals === 'function') calls.push(() => coq.goals());
        if(typeof coq.goal === 'function') calls.push(() => coq.goal());
        if(typeof coq.Goals === 'function') calls.push(() => coq.Goals());
        if(typeof coq.getGoals === 'function') calls.push(() => coq.getGoals());
        if(typeof coq.getGoal === 'function') calls.push(() => coq.getGoal());
        if(typeof coq.query === 'function') {
          calls.push(() => coq.query('Goals'));
          calls.push(() => coq.query('Goals.'));
        }
        if(typeof coq.exec === 'function') {
          calls.push(() => coq.exec('Goals.'));
        }

        const start = Date.now();
        while(Date.now() - start < maxWait){
          for(let i = 0; i < calls.length; i += 1){
            const res = await resolveMaybePromise(calls[i]);
            if(res !== null && res !== undefined){
              const normalized = normalizeGoalsResponse(res);
              const count = countGoalsSimple(normalized);
              if(count !== null) return count;
            }
          }
          await sleep(step);
        }
        return null;
      }

      function safeJsonReplacer(){
        const seen = new WeakSet();
        return function(key, val){
          if(val && typeof val === 'object'){
            if(seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if(typeof val === 'function') return '[Function]';
          return val;
        };
      }

      function findCoqUnsoundToken(code){
        if(!code || typeof code !== 'string') return null;
        const tokenMessages = {
          Axiom: 'Axiom declaration is not allowed in YY proofs.',
          Axioms: 'Axiom declaration is not allowed in YY proofs.',
          Parameter: 'Parameter introduces an axiom; not allowed in YY proofs.',
          Parameters: 'Parameter introduces axioms; not allowed in YY proofs.',
          Variable: 'Variable introduces an assumption; not allowed in YY proofs.',
          Variables: 'Variable introduces assumptions; not allowed in YY proofs.',
          Hypothesis: 'Hypothesis introduces an assumption; not allowed in YY proofs.',
          Hypotheses: 'Hypothesis introduces assumptions; not allowed in YY proofs.',
          Assumption: 'Assumption introduces an axiom; not allowed in YY proofs.',
          Assumptions: 'Assumption introduces axioms; not allowed in YY proofs.',
          Context: 'Context introduces assumptions; not allowed in YY proofs.',
          Admitted: 'Admitted leaves the proof incomplete.',
          Admit: 'Admit leaves the proof incomplete.',
          admit: 'admit leaves the proof incomplete.',
          Conjecture: 'Conjecture leaves the proof unproven.'
        };

        let i = 0;
        let line = 1;
        let col = 1;
        let commentDepth = 0;
        let inString = false;
        let word = '';
        let wordLine = 1;
        let wordCol = 1;

        function flushWord(){
          if(!word) return null;
          const token = word;
          word = '';
          if(Object.prototype.hasOwnProperty.call(tokenMessages, token)){
            return {
              token,
              line: wordLine,
              col: wordCol,
              message: tokenMessages[token]
            };
          }
          return null;
        }

        function advanceChar(){
          const ch = code[i];
          if(ch === '\r'){
            if(code[i + 1] === '\n'){
              i += 2;
            }else{
              i += 1;
            }
            line += 1;
            col = 1;
            return;
          }
          if(ch === '\n'){
            i += 1;
            line += 1;
            col = 1;
            return;
          }
          i += 1;
          col += 1;
        }

        while(i < code.length){
          const ch = code[i];
          const next = code[i + 1];

          if(inString){
            if(ch === '\\'){
              advanceChar();
              if(i < code.length) advanceChar();
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            advanceChar();
            continue;
          }

          if(commentDepth > 0){
            if(ch === '(' && next === '*'){
              commentDepth += 1;
              advanceChar();
              advanceChar();
              continue;
            }
            if(ch === '*' && next === ')'){
              commentDepth -= 1;
              advanceChar();
              advanceChar();
              continue;
            }
            advanceChar();
            continue;
          }

          if(ch === '"'){
            inString = true;
            advanceChar();
            continue;
          }
          if(ch === '(' && next === '*'){
            commentDepth = 1;
            advanceChar();
            advanceChar();
            continue;
          }

          if(/[A-Za-z]/.test(ch)){
            if(word.length === 0){
              wordLine = line;
              wordCol = col;
            }
            word += ch;
            advanceChar();
            continue;
          }

          const hit = flushWord();
          if(hit) return hit;
          advanceChar();
        }

        const finalHit = flushWord();
        if(finalHit) return finalHit;
        return null;
      }

      function buildCoqLibraryCatalog(payload){
        const collected = collectCoqLibraryTables(payload);
        const tables = collected.tables;
        const allowedLibraries = new Set();
        const allowedTheorems = new Set();
        const libraryAxioms = new Map();

        tables.forEach((table)=>{
          extractLibraryNames(table).forEach((name)=>{
            if(name) allowedLibraries.add(name);
          });
          extractTheoremsFromTable(table).forEach((name)=>{
            if(name) allowedTheorems.add(name);
          });
          extractAxiomsFromTable(table).forEach((entry)=>{
            if(!entry || !entry.name) return;
            const normalizedStatement = normalizeCoqStatement(entry.statement);
            if(libraryAxioms.has(entry.name)) return;
            libraryAxioms.set(entry.name, normalizedStatement);
          });
        });

        return {
          tablesCount: tables.length,
          allowedLibraries,
          allowedTheorems,
          libraryAxioms,
          sourcePresent: collected.sourcePresent
        };
      }

      function collectCoqLibraryTables(payload){
        const out = [];
        const sources = [];
        let sourcePresent = false;
        if(payload && typeof payload === 'object'){
          const payloadKeys = [
            'coqLibraryTables',
            'coqLibraryTable',
            'libraryTables',
            'libraryTable',
            'coqLibraries',
            'library'
          ];
          payloadKeys.forEach((key)=>{
            if(Object.prototype.hasOwnProperty.call(payload, key)){
              sourcePresent = true;
              sources.push(payload[key]);
            }
          });
        }

        const stored = readStoredLibraryTables(['ivucxCoqLibraryTables', 'ivucxLibraryTables']);
        if(stored.found) sourcePresent = true;
        sources.push(...stored.values);

        sources.forEach((source)=>{
          normalizeLibraryTablesInput(source).forEach((table)=>{
            if(isCoqLibraryTable(table)) out.push(table);
          });
        });

        return { tables: out, sourcePresent };
      }

      function readStoredLibraryTables(keys){
        const values = [];
        let found = false;
        const storages = [localStorage, sessionStorage];
        keys.forEach((key)=>{
          storages.forEach((storage)=>{
            if(!safeStorageHas(storage, key)) return;
            found = true;
            const raw = safeStorageGet(storage, key);
            if(raw) values.push(raw);
          });
        });
        return { values, found };
      }

      function normalizeLibraryTablesInput(source){
        const out = [];
        if(!source) return out;
        if(typeof source === 'string'){
          const parsed = tryParseJson(source);
          if(parsed) return normalizeLibraryTablesInput(parsed);
          return out;
        }
        if(Array.isArray(source)){
          out.push(...source);
          return out;
        }
        if(typeof source === 'object'){
          if(Array.isArray(source.Coq)) out.push(...source.Coq);
          if(Array.isArray(source.coq)) out.push(...source.coq);
          if(Array.isArray(source.tables)) out.push(...source.tables);
          if(out.length === 0) out.push(source);
        }
        return out;
      }

      function isCoqLibraryTable(table){
        if(!table || typeof table !== 'object') return false;
        const lang = table.language || table.lang || table.assistant || table.proofAssistant;
        if(!lang) return true;
        return String(lang).trim().toLowerCase() === 'coq';
      }

      function extractLibraryNames(table){
        const names = [];
        if(!table || typeof table !== 'object') return names;
        const candidates = [
          table.library,
          table.libraryName,
          table.name,
          table.module,
          table.table,
          table.tableName
        ];
        candidates.forEach((value)=>{
          if(typeof value === 'string' && value.trim()){
            names.push(value.trim());
          }
        });
        if(Array.isArray(table.libraries)){
          table.libraries.forEach((value)=>{
            if(typeof value === 'string' && value.trim()){
              names.push(value.trim());
            }
          });
        }
        return names;
      }

      function extractTheoremsFromTable(table){
        const out = [];
        if(!table || typeof table !== 'object') return out;
        if(Array.isArray(table.theorems)){
          out.push(...extractNamesFromEntries(table.theorems));
        }
        if(Array.isArray(table.entries)){
          table.entries.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.type && String(entry.type).toLowerCase() !== 'theorem') return;
            const name = extractEntryName(entry);
            if(name) out.push(name);
          });
        }
        if(Array.isArray(table.items)){
          table.items.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'theorem') return;
            const name = extractEntryName(entry);
            if(name) out.push(name);
          });
        }
        if(Array.isArray(table.rows)){
          table.rows.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'theorem') return;
            const name = extractEntryName(entry);
            if(name) out.push(name);
          });
        }
        return out;
      }

      function extractAxiomsFromTable(table){
        const out = [];
        if(!table || typeof table !== 'object') return out;
        if(Array.isArray(table.axioms)){
          out.push(...normalizeAxiomEntries(table.axioms));
        }
        if(Array.isArray(table.entries)){
          table.entries.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.type && String(entry.type).toLowerCase() !== 'axiom') return;
            out.push(...normalizeAxiomEntries([entry]));
          });
        }
        if(Array.isArray(table.items)){
          table.items.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'axiom') return;
            out.push(...normalizeAxiomEntries([entry]));
          });
        }
        if(Array.isArray(table.rows)){
          table.rows.forEach((entry)=>{
            if(entry && typeof entry === 'object' && entry.kind && String(entry.kind).toLowerCase() !== 'axiom') return;
            out.push(...normalizeAxiomEntries([entry]));
          });
        }
        return out;
      }

      function extractNamesFromEntries(entries){
        const out = [];
        entries.forEach((entry)=>{
          const name = extractEntryName(entry);
          if(name) out.push(name);
        });
        return out;
      }

      function extractEntryName(entry){
        if(typeof entry === 'string') return entry.trim();
        if(entry && typeof entry === 'object'){
          const candidates = [entry.name, entry.theorem, entry.id, entry.symbol, entry.title, entry.label];
          for(const value of candidates){
            if(typeof value === 'string' && value.trim()) return value.trim();
          }
        }
        return '';
      }

      function normalizeAxiomEntries(entries){
        const out = [];
        entries.forEach((entry)=>{
          if(!entry) return;
          if(typeof entry === 'string'){
            out.push(...parseAxiomString(entry));
            return;
          }
          if(typeof entry === 'object'){
            const parsed = typeof entry.axiom === 'string' ? parseAxiomString(entry.axiom) : [];
            if(parsed.length){
              out.push(...parsed);
              return;
            }
            const name = extractEntryName(entry) || (typeof entry.axiom === 'string' ? entry.axiom.trim() : '');
            const statement = extractAxiomStatement(entry);
            if(name) out.push({ name, statement });
          }
        });
        return out;
      }

      function parseAxiomString(text){
        const out = [];
        const trimmed = String(text || '').trim();
        if(!trimmed) return out;
        const axiomMatch = trimmed.match(/Axioms?\b\s+([^:]+?)\s*:\s*(.+)\.?$/i);
        if(axiomMatch){
          const names = splitAxiomNames(axiomMatch[1]);
          const stmt = normalizeCoqStatement(axiomMatch[2]);
          names.forEach((name)=>{
            if(name) out.push({ name, statement: stmt });
          });
          return out;
        }
        const colonMatch = trimmed.match(/^([^:]+?)\s*:\s*(.+)$/);
        if(colonMatch){
          const names = splitAxiomNames(colonMatch[1]);
          const stmt = normalizeCoqStatement(colonMatch[2]);
          names.forEach((name)=>{
            if(name) out.push({ name, statement: stmt });
          });
          return out;
        }
        out.push({ name: trimmed, statement: '' });
        return out;
      }

      function splitAxiomNames(part){
        return String(part || '')
          .trim()
          .split(/\s+/)
          .map((name)=>name.trim())
          .filter((name)=>!!name);
      }

      function extractAxiomStatement(entry){
        if(!entry || typeof entry !== 'object') return '';
        const candidates = [entry.statement, entry.prop, entry.type, entry.signature, entry.formula];
        for(const value of candidates){
          if(typeof value === 'string' && value.trim()){
            return normalizeCoqStatement(value);
          }
        }
        return '';
      }

      function normalizeCoqStatement(statement){
        return String(statement || '').replace(/\s+/g, ' ').trim();
      }

      function validateCoqLibraryUsage(normalized, catalog){
        if(!catalog || !normalized) return { ok: true, invalid: [] };
        const used = extractCoqLibraryReferences(normalized);
        if(used.length === 0) return { ok: true, invalid: [] };
        if(catalog.allowedLibraries.size === 0){
          const baseMessage = catalog.sourcePresent
            ? 'Coq LibraryTable is empty.'
            : 'Coq LibraryTable is missing.';
          return {
            ok: false,
            invalid: used,
            reason: baseMessage + ' Imports are not allowed: ' + formatLibraryReferences(used)
          };
        }
        const invalid = used.filter((ref)=>!isAllowedCoqLibrary(ref, catalog.allowedLibraries));
        if(invalid.length === 0) return { ok: true, invalid: [] };
        return {
          ok: false,
          invalid,
          reason: 'Coq LibraryTable does not allow these libraries: ' + formatLibraryReferences(invalid)
        };
      }

      function extractCoqLibraryReferences(normalized){
        const refs = [];
        const requireRegex = /(^|\n)\s*(From\s+([A-Za-z0-9_.']+)\s+)?Require\s+((Import|Export)\s+)?([\s\S]*?)\.(?=\s|$)/g;
        let match;
        while((match = requireRegex.exec(normalized)) !== null){
          const prefix = match[3] ? match[3].trim() : '';
          const modulesPart = match[6] ? match[6].trim() : '';
          if(!modulesPart) continue;
          const quoted = extractQuotedStrings(modulesPart);
          quoted.forEach((value)=>{
            if(value) refs.push({ type: 'string', value });
          });
          const stripped = modulesPart.replace(/"[^"]*"/g, ' ');
          const modules = extractCoqModuleNames(stripped);
          modules.forEach((name)=>{
            if(!name) return;
            if(prefix){
              refs.push({ type: 'from', prefix, qualid: name });
            }else{
              refs.push({ type: 'qualid', name });
            }
          });
        }
        return refs;
      }

      function extractQuotedStrings(text){
        const out = [];
        const regex = /"([^"]*)"/g;
        let match;
        while((match = regex.exec(text)) !== null){
          if(match[1]) out.push(match[1]);
        }
        return out;
      }

      function extractCoqModuleNames(text){
        const out = [];
        const tokens = text.replace(/\s+/g, ' ').trim().split(' ').filter(Boolean);
        for(let i = 0; i < tokens.length; i += 1){
          const token = tokens[i];
          if(token === 'as'){
            i += 1;
            continue;
          }
          if(!/^[A-Za-z_][A-Za-z0-9_']*(?:\.[A-Za-z_][A-Za-z0-9_']*)*$/.test(token)) continue;
          out.push(token);
        }
        return out;
      }

      function isAllowedCoqLibrary(ref, allowed){
        if(!ref) return false;
        if(ref.type === 'string'){
          return matchesLibraryName(ref.value, allowed);
        }
        if(ref.type === 'from'){
          return matchesFromLibrary(ref.prefix, ref.qualid, allowed);
        }
        return matchesLibraryName(ref.name, allowed);
      }

      function isAllowedLeanLibrary(ref, allowed){
        if(!ref) return false;
        if(ref.type === 'string'){
          return matchesLibraryName(ref.value, allowed);
        }
        return matchesLibraryName(ref.name, allowed);
      }

      function matchesLibraryName(name, allowed){
        if(!name) return false;
        for(const entry of allowed){
          if(!entry) continue;
          const trimmed = String(entry).trim();
          if(!trimmed) continue;
          if(trimmed.endsWith('.*')){
            const base = trimmed.slice(0, -2);
            if(name === base || name.startsWith(base + '.')) return true;
            continue;
          }
          if(name === trimmed) return true;
          if(name.startsWith(trimmed + '.')) return true;
        }
        return false;
      }

      function matchesFromLibrary(prefix, qualid, allowed){
        if(!prefix || !qualid) return false;
        const suffix = '.' + qualid;
        for(const entry of allowed){
          if(!entry) continue;
          const trimmed = String(entry).trim();
          if(!trimmed) continue;
          if(trimmed.endsWith('.*')){
            const base = trimmed.slice(0, -2);
            if(base === prefix || base.startsWith(prefix + '.')) return true;
            continue;
          }
          if(trimmed === prefix) return true;
          if(trimmed.startsWith(prefix + '.') && trimmed.endsWith(suffix)) return true;
        }
        return false;
      }

      function formatLibraryReferences(refs){
        const labels = refs.map(formatLibraryReference).filter(Boolean);
        return Array.from(new Set(labels)).join(', ');
      }

      function formatLibraryReference(ref){
        if(!ref) return '';
        if(typeof ref === 'string') return ref;
        if(ref.type === 'from'){
          return 'From ' + ref.prefix + ' Require ' + ref.qualid;
        }
        if(ref.type === 'string'){
          return '"' + ref.value + '"';
        }
        return ref.name || '';
      }

      function detectCoqAxiomConflict(normalized, catalog){
        if(!catalog || catalog.libraryAxioms.size === 0) return null;
        const proofAxioms = extractCoqAxioms(normalized);
        for(const axiom of proofAxioms){
          const libStmt = catalog.libraryAxioms.get(axiom.name);
          if(!libStmt) continue;
          const proofStmt = normalizeCoqStatement(axiom.statement);
          if(!proofStmt || !libStmt) continue;
          if(proofStmt !== libStmt){
            return {
              name: axiom.name,
              libraryStatement: libStmt,
              proofStatement: proofStmt
            };
          }
        }
        return null;
      }

      function extractCoqAxioms(normalized){
        const axioms = [];
        const regex = /(^|\n)\s*Axioms?\b\s+([^:]+?)\s*:\s*([\s\S]*?)\.(?=\s|$)/g;
        let match;
        while((match = regex.exec(normalized)) !== null){
          const names = splitAxiomNames(match[2]);
          const statement = normalizeCoqStatement(match[3]);
          names.forEach((name)=>{
            if(!name) return;
            axioms.push({ name, statement });
          });
        }
        return axioms;
      }

      function buildLeanLibraryCatalog(payload){
        const collected = collectLeanLibraryTables(payload);
        const tables = collected.tables;
        const allowedLibraries = new Set();
        const allowedTheorems = new Set();
        const libraryAxioms = new Map();

        tables.forEach((table)=>{
          extractLibraryNames(table).forEach((name)=>{
            if(name) allowedLibraries.add(name);
          });
          extractTheoremsFromTable(table).forEach((name)=>{
            if(name) allowedTheorems.add(name);
          });
          extractAxiomsFromTable(table).forEach((entry)=>{
            if(!entry || !entry.name) return;
            const normalizedStatement = normalizeCoqStatement(entry.statement);
            if(libraryAxioms.has(entry.name)) return;
            libraryAxioms.set(entry.name, normalizedStatement);
          });
        });

        return {
          tablesCount: tables.length,
          allowedLibraries,
          allowedTheorems,
          libraryAxioms,
          sourcePresent: collected.sourcePresent
        };
      }

      function collectLeanLibraryTables(payload){
        const out = [];
        const sources = [];
        let sourcePresent = false;
        if(payload && typeof payload === 'object'){
          const payloadKeys = [
            'leanLibraryTables',
            'leanLibraryTable',
            'libraryTables',
            'libraryTable',
            'leanLibraries',
            'library'
          ];
          payloadKeys.forEach((key)=>{
            if(Object.prototype.hasOwnProperty.call(payload, key)){
              sourcePresent = true;
              sources.push(payload[key]);
            }
          });
        }

        const stored = readStoredLibraryTables(['ivucxLeanLibraryTables', 'ivucxLibraryTables']);
        if(stored.found) sourcePresent = true;
        sources.push(...stored.values);

        sources.forEach((source)=>{
          normalizeLibraryTablesInput(source).forEach((table)=>{
            if(isLeanLibraryTable(table)) out.push(table);
          });
        });

        return { tables: out, sourcePresent };
      }

      function isLeanLibraryTable(table){
        if(!table || typeof table !== 'object') return false;
        const lang = table.language || table.lang || table.assistant || table.proofAssistant;
        if(!lang) return true;
        return String(lang).trim().toLowerCase() === 'lean';
      }

      function validateLeanLibraryUsage(normalized, catalog){
        if(!catalog || !normalized) return { ok: true, invalid: [] };
        const used = extractLeanLibraryReferences(normalized);
        if(used.length === 0) return { ok: true, invalid: [] };
        if(catalog.allowedLibraries.size === 0){
          const baseMessage = catalog.sourcePresent
            ? 'Lean LibraryTable is empty.'
            : 'Lean LibraryTable is missing.';
          return {
            ok: false,
            invalid: used,
            reason: baseMessage + ' Imports are not allowed: ' + formatLibraryReferences(used)
          };
        }
        const invalid = used.filter((ref)=>!isAllowedLeanLibrary(ref, catalog.allowedLibraries));
        if(invalid.length === 0) return { ok: true, invalid: [] };
        return {
          ok: false,
          invalid,
          reason: 'Lean LibraryTable does not allow these libraries: ' + formatLibraryReferences(invalid)
        };
      }

      function extractLeanLibraryReferences(normalized){
        const refs = [];
        const lines = normalized.split(/\r?\n/);
        lines.forEach((line)=>{
          const trimmed = line.trim();
          if(!trimmed) return;
          const tokens = trimmed.split(/\s+/).filter(Boolean);
          if(tokens.length === 0) return;
          let idx = 0;
          while(tokens[idx] === 'public' || tokens[idx] === 'meta'){
            idx += 1;
          }
          if(tokens[idx] !== 'import') return;
          idx += 1;
          if(tokens[idx] === 'all') idx += 1;
          for(; idx < tokens.length; idx += 1){
            const token = tokens[idx];
            if(!token) continue;
            if(!/^[A-Za-z0-9_.']+$/.test(token)) break;
            refs.push({ type: 'qualid', name: token });
          }
        });
        return refs;
      }

      function detectLeanAxiomConflict(normalized, catalog){
        if(!catalog || catalog.libraryAxioms.size === 0) return null;
        const proofAxioms = extractLeanAxioms(normalized);
        for(const axiom of proofAxioms){
          const libStmt = catalog.libraryAxioms.get(axiom.name);
          if(!libStmt) continue;
          const proofStmt = normalizeCoqStatement(axiom.statement);
          if(!proofStmt || !libStmt) continue;
          if(proofStmt !== libStmt){
            return {
              name: axiom.name,
              libraryStatement: libStmt,
              proofStatement: proofStmt
            };
          }
        }
        return null;
      }

      function extractLeanAxioms(normalized){
        const axioms = [];
        const regex = /(^|\n)\s*axioms?\b\s+([^:]+?)\s*:\s*([^\n]+)/gi;
        let match;
        while((match = regex.exec(normalized)) !== null){
          const names = splitAxiomNames(match[2]);
          const statement = normalizeCoqStatement(match[3]);
          names.forEach((name)=>{
            if(!name) return;
            axioms.push({ name, statement });
          });
        }
        return axioms;
      }

      async function runProof(){
        if(running) return;

        running = true;
        runBtn.disabled = true;
        setStatus('Running...');

        const code = getEditorCode();

        let shouldResetCoq = false;
        try {
          if(selectedLanguage === 'Coq'){
            shouldResetCoq = true;
            await validateCoqProof(code);
          } else if(selectedLanguage === 'Lean'){
            await validateLeanProof(code);
          } else {
            setStatus('Runner disabled', true);
            outputEl.textContent = '[Configuration]\nOnly Coq and Lean validation are supported in this editor.';
            return;
          }
        } finally {
          if(shouldResetCoq){
            setStatus('Resetting Coq environment...');
            if(typeof CoqRunner !== 'undefined' && CoqRunner && typeof CoqRunner.resetEnvironment === 'function'){
              try{
                await CoqRunner.resetEnvironment({ timeoutMs: 15000 });
              }catch(err){
                console.warn('CoqRunner reset failed', err);
              }
            }
          }
          running = false;
          runBtn.disabled = false;
          setStatus('Ready');
        }
      }

            'where','by','match','with','if','then','else','let','in','have','show','fun','forall','exists'

            root: [
              { include: '@whitespace' },
              [/[A-Z][\w']*/, 'type.identifier'],

            whitespace: [
              [/[ \t\r\n]+/, ''],
              [/--.*$/, 'comment'],
              [/\/-/, 'comment', '@comment']
            ],
            comment: [
              [/[^-/]+/, 'comment'],
              [/\/-/, 'comment', '@push'],
              [/-\//, 'comment', '@pop'],
              [/[-/]/, 'comment']
            ]
          }
        });
      }
