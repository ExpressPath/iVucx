<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iVucx Editor</title>
  <style>
    :root{
      --bg:#f6f8fa;
      --panel:#ffffff;
      --ink:#1f2328;
      --muted:#656d76;
      --line:#d0d7de;
      --accent:#1f6feb;
      --accent-dark:#0f4aa6;
      --ok:#1a7f37;
      --warn:#cf222e;
      --header:#24292f;
      --header-ink:#f6f8fa;
    }

    *,*::before,*::after{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:56px;
      padding:10px 14px;
      background:var(--header);
      color:var(--header-ink);
      border-bottom:1px solid #1b1f24;
    }

    .left-cluster,
    .right-cluster{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .product{
      font-size:14px;
      font-weight:650;
      white-space:nowrap;
    }

    .lang-badge{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.28);
      font-size:12px;
      font-weight:650;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .file-name{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      color:#d0d7de;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }

    .btn{
      border:1px solid transparent;
      background:#ffffff;
      color:#24292f;
      border-radius:8px;
      height:34px;
      padding:0 12px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      transition:background-color .2s ease,color .2s ease,border-color .2s ease,transform .12s ease;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .btn-back{
      background:transparent;
      border-color:rgba(255,255,255,0.25);
      color:#f6f8fa;
      width:34px;
      min-width:34px;
      padding:0;
      border-radius:999px;
      font-size:24px;
      line-height:1;
    }

    .btn-back:hover{
      background:rgba(255,255,255,0.08);
    }

    .btn-run{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .btn-run:hover{
      background:var(--accent-dark);
      border-color:var(--accent-dark);
    }

    .runner-input{
      width:min(44vw, 380px);
      min-width:180px;
      height:34px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:12px;
      padding:0 10px;
      outline:none;
    }

    .runner-input::placeholder{
      color:#c3c9d0;
    }

    .workspace{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(360px, 1fr) minmax(280px, 36%);
      gap:10px;
      padding:10px;
    }

    .pane{
      min-height:0;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .pane-head{
      flex:0 0 38px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 12px;
      border-bottom:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
      background:linear-gradient(to bottom, #ffffff, #f8fafc);
    }

    .status{
      font-weight:650;
      color:var(--ok);
    }

    .status.error{
      color:var(--warn);
    }

    .editor-frame{
      flex:1;
      min-height:0;
      position:relative;
      background:#fff;
    }

    #editor{
      position:absolute;
      inset:0;
    }

    #fallbackEditor{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      outline:none;
      resize:none;
      padding:16px;
      font-size:14px;
      line-height:1.5;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      display:none;
    }

    #coq,
    #ide-wrapper{
      position:fixed;
      width:1px;
      height:1px;
      top:-10000px;
      left:-10000px;
      overflow:hidden;
      opacity:0;
      pointer-events:none;
      z-index:-1;
    }

    #outputPanel{
      flex:1;
      margin:0;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      padding:14px;
      font-size:13px;
      line-height:1.45;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      color:#24292f;
      background:#fbfdff;
    }

    @media (max-width:1020px){
      .workspace{
        grid-template-columns:1fr;
        grid-template-rows:minmax(300px, 1fr) minmax(180px, 42%);
      }

      .right-cluster{
        width:100%;
        justify-content:flex-end;
      }
    }

    @media (max-width:760px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .left-cluster,
      .right-cluster{
        width:100%;
      }

      .right-cluster{
        justify-content:space-between;
      }

      .runner-input{
        width:100%;
        min-width:0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="left-cluster">
      <button class="btn btn-back" id="backBtn" type="button" aria-label="Back to summary">×</button>
      <div class="product">iVucx Editor</div>
      <div class="lang-badge" id="langBadge">Lean</div>
      <div class="file-name" id="fileName">Main.lean</div>
    </div>
    <div class="right-cluster">
      <input
        class="runner-input"
        id="runnerEndpoint"
        type="text"
        placeholder="Runner endpoint (e.g. https://example.com/api/run)"
        autocomplete="off"
      />
      <button class="btn btn-run" id="runBtn" type="button">Run</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane">
      <div class="pane-head">
        <span>Editor</span>
        <span class="status" id="statusText">Ready</span>
      </div>
      <div class="editor-frame">
        <div id="editor"></div>
        <textarea id="fallbackEditor" spellcheck="false"></textarea>
      </div>
    </section>

    <section class="pane">
      <div class="pane-head">
        <span>Server Output</span>
        <span>Ctrl/Cmd + Enter to run</span>
      </div>
      <pre id="outputPanel"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script>
    (function(){
      const INIT_STORAGE_KEY = 'ivucxEditorInit';
      const EDITOR_RETURN_KEY = 'ivucxEditorReturn';
      const RUNNER_STORAGE_KEY = 'ivucxRunnerEndpoint';

      const langBadgeEl = document.getElementById('langBadge');
      const fileNameEl = document.getElementById('fileName');
      const outputEl = document.getElementById('outputPanel');
      const statusEl = document.getElementById('statusText');
      const runnerEndpointEl = document.getElementById('runnerEndpoint');
      const runBtn = document.getElementById('runBtn');
      const backBtn = document.getElementById('backBtn');
      const fallbackEditor = document.getElementById('fallbackEditor');
      const editorMount = document.getElementById('editor');

      const languageConfig = {
        Lean: {
          monacoId: 'ivucx-lean',
          fileName: 'Main.lean',
          extension: '.lean',
          starter: [
            'theorem hello : True := by',
            '  trivial'
          ].join('\n')
        },
        Coq: {
          monacoId: 'ivucx-coq',
          fileName: 'Main.v',
          extension: '.v',
          starter: [
            'Theorem hello : True.',
            'Proof.',
            '  exact I.',
            'Qed.'
          ].join('\n')
        },
        Isabelle: {
          monacoId: 'ivucx-isabelle',
          fileName: 'Main.thy',
          extension: '.thy',
          starter: [
            'theory Main',
            '  imports Main',
            'begin',
            '',
            'lemma hello: "True"',
            '  by simp',
            '',
            'end'
          ].join('\n')
        },
        Agda: {
          monacoId: 'ivucx-agda',
          fileName: 'Main.agda',
          extension: '.agda',
          starter: [
            'module Main where',
            '',
            'data True : Set where',
            '  triv : True',
            '',
            'hello : True',
            'hello = triv'
          ].join('\n')
        }
      };

      const initPayload = readInitPayload();
      const params = new URLSearchParams(window.location.search);
      const selectedLanguage = resolveLanguage(params.get('lang') || initPayload.proofAssistant || 'Lean');
      const selectedConfig = languageConfig[selectedLanguage];
      window.__ivucxNeedsJsCoq = selectedLanguage === 'Coq';
      window.__ivucxNeedsLean4 = selectedLanguage === 'Lean';

      langBadgeEl.textContent = selectedLanguage;
      fileNameEl.textContent = selectedConfig.fileName;

      updateRunnerInputVisibility(selectedLanguage);

      const restoredRunner = params.get('runner') || safeStorageGet(localStorage, RUNNER_STORAGE_KEY);
      runnerEndpointEl.value = restoredRunner;

      const summaryText = typeof initPayload.summary === 'string'
        ? initPayload.summary
        : (typeof initPayload.draft === 'string' ? initPayload.draft : '');
      const initialDraft = initPayload.keepSummaryBackground
        ? ''
        : (typeof initPayload.draft === 'string'
          ? initPayload.draft
          : summaryText);


      let editorInstance = null;
      let useFallbackEditor = false;
      let monacoRef = null;
      let running = false;
      let jscoqReady = false;
      let jscoqInitPromise = null;
      let jscoqInitError = '';
      let lean4Ready = false;
      let lean4InitPromise = null;
      let lean4InitError = '';


      setStatus('Ready');
      setInitialOutputMessage(selectedLanguage, selectedConfig.fileName, initPayload, restoredRunner, summaryText);

      // Coqの場合はjsCoq初期化完了までRunボタンを無効化
      if(selectedLanguage === 'Coq') {
        initializeCoqRuntime();
      }
      if(selectedLanguage === 'Lean') {
        initializeLeanRuntime();
      }

      backBtn.addEventListener('click', ()=>{
        handleBackNavigation();
      });

      runnerEndpointEl.addEventListener('change', ()=>{
        safeStorageSet(localStorage, RUNNER_STORAGE_KEY, runnerEndpointEl.value.trim());
      });

      runBtn.addEventListener('click', ()=>{
        runProof();
      });

      initializeEditor(initialDraft, selectedLanguage);
      window.addEventListener('paste', handleProofFilePaste, true);

      function readInitPayload(){
        try{
          const raw = sessionStorage.getItem(INIT_STORAGE_KEY);
          if(!raw) return {};
          sessionStorage.removeItem(INIT_STORAGE_KEY);
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : {};
        }catch(err){
          return {};
        }
      }

      function resolveLanguage(value){
        const input = String(value || '').trim().toLowerCase();
        if(input === 'coq') return 'Coq';
        if(input === 'isabelle') return 'Isabelle';
        if(input === 'agda') return 'Agda';
        return 'Lean';
      }

      function safeStorageGet(storage, key){
        try{
          return storage.getItem(key) || '';
        }catch(err){
          return '';
        }
      }

      function safeStorageSet(storage, key, value){
        try{
          storage.setItem(key, value);
          return true;
        }catch(err){
          return false;
        }
      }

      function setStatus(text, isError){
        statusEl.textContent = text;
        statusEl.classList.toggle('error', !!isError);
      }

      function updateRunnerInputVisibility(language){
        const isLocalValidationMode = language === 'Coq' || language === 'Lean';
        runnerEndpointEl.style.display = isLocalValidationMode ? 'none' : 'block';
      }

      function waitForAutoInitJsCoq(timeoutMs = 20000){
        if(typeof autoInitJsCoq === 'function') return Promise.resolve();
        return new Promise((resolve, reject)=>{
          const started = Date.now();
          function check(){
            if(typeof autoInitJsCoq === 'function'){
              resolve();
              return;
            }
            if(Date.now() - started > timeoutMs){
              reject(new Error('autoInitJsCoq is not available'));
              return;
            }
            setTimeout(check, 50);
          }
          check();
        });
      }

      function initializeCoqRuntime(forceRetry = false){
        if(jscoqInitPromise && !forceRetry){
          return jscoqInitPromise;
        }
        jscoqReady = false;
        runBtn.disabled = true;
        jscoqInitPromise = waitForAutoInitJsCoq()
          .then(()=>{
            if(typeof autoInitJsCoq !== 'function'){
              throw new Error('autoInitJsCoq is not defined');
            }
            return autoInitJsCoq();
          })
          .then(()=>{
            jscoqInitError = '';
            jscoqReady = true;
            runBtn.disabled = false;
          })
          .catch((err)=>{
            jscoqInitError = err && err.message ? err.message : String(err);
            setStatus('jsCoq初期化失敗', true);
            runBtn.disabled = true;
          });
        return jscoqInitPromise;
      }

      function waitForAutoInitLean4(timeoutMs = 20000){
        if(typeof autoInitLean4 === 'function') return Promise.resolve();
        return new Promise((resolve, reject)=>{
          const started = Date.now();
          function check(){
            if(typeof autoInitLean4 === 'function'){
              resolve();
              return;
            }
            if(Date.now() - started > timeoutMs){
              reject(new Error('autoInitLean4 is not available'));
              return;
            }
            setTimeout(check, 50);
          }
          check();
        });
      }

      function initializeLeanRuntime(forceRetry = false){
        if(lean4InitPromise && !forceRetry){
          return lean4InitPromise;
        }
        lean4Ready = false;
        runBtn.disabled = true;
        lean4InitPromise = waitForAutoInitLean4()
          .then(()=>{
            if(typeof autoInitLean4 !== 'function'){
              throw new Error('autoInitLean4 is not defined');
            }
            return autoInitLean4();
          })
          .then(()=>{
            lean4InitError = '';
            lean4Ready = true;
            runBtn.disabled = false;
          })
          .catch((err)=>{
            lean4InitError = err && err.message ? err.message : String(err);
            setStatus('Lean 4初期化失敗', true);
            runBtn.disabled = true;
          });
        return lean4InitPromise;
      }

      function setInitialOutputMessage(language, fileName, payload, runnerEndpoint, summary){
        const lines = [
          'Editor initialized.',
          'Language: ' + language,
          'File: ' + fileName
        ];

        if(typeof summary === 'string'){
          lines.push('Summary is stored separately (' + summary.length + ' chars).');
        }

        // files変数は未定義のため削除

        if(language === 'Coq' || language === 'Lean'){
          lines.push('Local runtime validation mode is enabled.');
        } else if(runnerEndpoint){
          lines.push('Runner endpoint: ' + runnerEndpoint);
        } else {
          lines.push('Runner endpoint is empty. Set endpoint and press Run.');
        }

        lines.push('Shortcut: Ctrl/Cmd + Enter');
        outputEl.textContent = lines.join('\n');
      }

      function initializeEditor(initialText, language){
        if(typeof window.require !== 'function'){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco could not be loaded. Fallback textarea is active.';
          return;
        }

        window.require.config({
          paths: {
            vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
          }
        });

        window.require(['vs/editor/editor.main'], function(){
          monacoRef = window.monaco;
          registerCustomLanguages(monacoRef);
          defineEditorTheme(monacoRef);

          editorInstance = monacoRef.editor.create(editorMount, {
            value: initialText,
            language: selectedConfig.monacoId,
            theme: 'ivucx-github-light',
            automaticLayout: true,
            minimap: { enabled: false },
            smoothScrolling: true,
            scrollBeyondLastLine: false,
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 14,
            lineNumbersMinChars: 3,
            tabSize: 2
          });

          editorInstance.addCommand(monacoRef.KeyMod.CtrlCmd | monacoRef.KeyCode.Enter, function(){
            runProof();
          });
        }, function(){
          activateFallbackEditor(initialText);
          outputEl.textContent += '\nMonaco loading failed. Fallback textarea is active.';
        });
      }

      function activateFallbackEditor(initialText){
        useFallbackEditor = true;
        editorMount.style.display = 'none';
        fallbackEditor.style.display = 'block';
        fallbackEditor.value = initialText;
        fallbackEditor.addEventListener('keydown', function(e){
          const isRunShortcut = (e.ctrlKey || e.metaKey) && e.key === 'Enter';
          if(!isRunShortcut) return;
          e.preventDefault();
          runProof();
        });
      }

      function getEditorCode(){
        if(useFallbackEditor) return fallbackEditor.value;
        if(editorInstance) return editorInstance.getValue();
        return '';
      }

      function handleBackNavigation(){
        const currentCode = getEditorCode();
        if(currentCode.length >= 30){
          const shouldReturn = window.confirm('エディタに30文字以上の内容があります。戻るとコード編集内容は破棄されます。戻りますか？');
          if(!shouldReturn) return;
        }

        const returnPayload = {
          summary: summaryText,
          proofAssistant: selectedLanguage,
          returnedAt: new Date().toISOString()
        };

        try{
          sessionStorage.setItem(EDITOR_RETURN_KEY, JSON.stringify(returnPayload));
        }catch(err){
          // Ignore storage failures and continue navigation.
        }

        window.location.href = 'index.html';
      }

      function isEditorFocused(){
        if(useFallbackEditor){
          return document.activeElement === fallbackEditor;
        }

        if(editorInstance && typeof editorInstance.hasTextFocus === 'function'){
          if(editorInstance.hasTextFocus()) return true;
        }

        const active = document.activeElement;
        return !!(active && editorMount.contains(active));
      }

      function insertCodeAtCursor(text){
        if(useFallbackEditor){
          const start = fallbackEditor.selectionStart ?? fallbackEditor.value.length;
          const end = fallbackEditor.selectionEnd ?? fallbackEditor.value.length;
          const before = fallbackEditor.value.slice(0, start);
          const after = fallbackEditor.value.slice(end);
          fallbackEditor.value = before + text + after;
          const nextPos = start + text.length;
          fallbackEditor.selectionStart = nextPos;
          fallbackEditor.selectionEnd = nextPos;
          fallbackEditor.focus();
          return;
        }

        if(editorInstance && monacoRef){
          const range = editorInstance.getSelection();
          editorInstance.executeEdits('proof-file-paste', [{
            range: range,
            text: text,
            forceMoveMarkers: true
          }]);
          editorInstance.pushUndoStop();
          editorInstance.focus();
        }
      }

      async function handleProofFilePaste(e){
        if(!isEditorFocused()) return;

        const clipboard = e.clipboardData;
        if(!clipboard || !clipboard.items) return;

        const files = [];
        for(const item of clipboard.items){
          if(item.kind !== 'file') continue;
          const file = item.getAsFile();
          if(file) files.push(file);
        }

        if(files.length === 0) return;

        const expectedExt = selectedConfig.extension.toLowerCase();
        const matchedFiles = files.filter(file=>{
          const name = (file.name || '').toLowerCase();
          return name.endsWith(expectedExt);
        });

        if(matchedFiles.length === 0) return;

        e.preventDefault();

        const chunks = [];
        for(const file of matchedFiles){
          try{
            const text = await file.text();
            chunks.push(text);
          }catch(err){
            // Skip unreadable files and continue.
          }
        }

        if(chunks.length === 0){
          setStatus('Paste failed', true);
          outputEl.textContent = '[Paste Error]\nThe selected file could not be read from clipboard.';
          return;
        }

        const pasted = chunks.join('\n\n');
        const lineCount = pasted.length === 0 ? 0 : pasted.split(/\r?\n/).length;
        if(lineCount >= 30){
          const shouldPaste = window.confirm('貼り付け内容は ' + lineCount + ' 行です。エディタに挿入しますか？');
          if(!shouldPaste) return;
        }

        insertCodeAtCursor(pasted);
        setStatus('File pasted');
      }


      async function waitJsCoqReady(timeoutMs = 10000) {
        // jscoqInstanceがセットされるまで待つ
        return new Promise((resolve, reject) => {
          const start = Date.now();
          function check() {
            if(jscoqInstance) return resolve();
            if(Date.now() - start > timeoutMs) return reject(new Error('jsCoq初期化タイムアウト'));
            setTimeout(check, 100);
          }
          check();
        });
      }

      async function validateCoqProof(code){
        setStatus('Validating Coq proof...');
        outputEl.textContent = 'jsCoqで証明を検証中...\n';
        const closure = analyzeCoqClosure(code);
        if(closure.proofState === 'NN'){
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n' + closure.reason;
          return { status: 'rejected', proof_state: 'NN', reason: closure.reason };
        }

        // jsCoq初期化を確実に待つ
        try {
          if(!jscoqInstance) {
            await waitJsCoqReady();
          }
        } catch(e) {
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\njsCoqが初期化されていません（タイムアウト）。ページをリロードしてください。';
          return { status: 'error', proof_state: 'NN', reason: 'jsCoq not initialized' };
        }

        if (!jscoqInstance) {
          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\njsCoqが初期化されていません。ページをリロードしてください。';
          return { status: 'error', proof_state: 'NN', reason: 'jsCoq not initialized' };
        }

        try {
          // 実行ごとに環境をリセットして前回の定義を残さない。
          await jscoqInstance.execute('Reset Initial.\n' + code);

          if (closure.proofState === 'YY') {
            setStatus('Coq proof verified (YY)');
            outputEl.textContent = '[Coq Validation Success]\n証明は ' + closure.closer + ' で完成しています (YY状態)';
            return { status: 'allowed', proof_state: 'YY', reason: 'Valid closed proof' };
          }
          if (closure.proofState === 'NY') {
            setStatus('Coq proof accepted (NY)');
            outputEl.textContent = '[Coq Validation Success]\n証明は ' + closure.closer + ' で暫定受け入れです (NY状態)';
            return { status: 'allowed', proof_state: 'NY', reason: 'Temporary acceptance (NY)' };
          }

          setStatus('Coq validation failed', true);
          outputEl.textContent = '[Coq Validation]\n証明が Qed. / Defined. / Admitted. / Conjecture で終わっていません';
          return { status: 'rejected', proof_state: 'NN', reason: 'Proof not closed' };
        } catch (err) {
          setStatus('Coq validation failed', true);
          const errorMsg = err && err.message ? err.message : String(err);
          outputEl.textContent = '[Coq Validation]\njsCoq実行エラー:\n' + errorMsg;
          const proofState = closure.proofState === 'YY' ? 'YN' : 'NN';
          return { status: 'rejected', proof_state: proofState, reason: 'Coq execution error: ' + errorMsg };
        }
      }

      async function waitLean4Ready(timeoutMs = 15000){
        return new Promise((resolve, reject)=>{
          const start = Date.now();
          function check(){
            if(lean4Instance) return resolve();
            if(Date.now() - start > timeoutMs) return reject(new Error('Lean 4 initialization timeout'));
            setTimeout(check, 100);
          }
          check();
        });
      }

      async function validateLeanProof(code){
        setStatus('Validating Lean 4 proof...');
        outputEl.textContent = 'Lean 4で証明を検証中...\n';

        try{
          if(!lean4Instance){
            await waitLean4Ready();
          }
        }catch(err){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\nLean 4が初期化されていません（タイムアウト）。';
          return { status: 'error', proof_state: 'NN', reason: 'Lean 4 not initialized' };
        }

        if(!lean4Instance){
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\nLean 4が初期化されていません。';
          return { status: 'error', proof_state: 'NN', reason: 'Lean 4 not initialized' };
        }

        try{
          const diagnostics = await lean4Instance.execute(code);
          const errors = Array.isArray(diagnostics)
            ? diagnostics.filter((item)=>item && Number(item.severity || 0) === 1)
            : [];

          if(errors.length > 0){
            const first = errors[0] || {};
            const range = first.range || {};
            const start = range.start || {};
            const line = Number.isFinite(start.line) ? String(start.line + 1) : '?';
            const col = Number.isFinite(start.character) ? String(start.character + 1) : '?';
            const msg = first.message || 'Lean 4 reported an error';
            setStatus('Lean validation failed', true);
            outputEl.textContent = '[Lean Validation]\n' + line + ':' + col + ' ' + msg;
            return { status: 'rejected', proof_state: 'NN', reason: msg };
          }

          const closure = analyzeLeanClosure(code);
          if(closure.proofState === 'NN'){
            setStatus('Lean validation failed', true);
            outputEl.textContent = '[Lean Validation]\n' + (closure.reason || 'Code is empty');
            return { status: 'rejected', proof_state: 'NN', reason: closure.reason || 'Lean code is empty' };
          }
          if(closure.proofState === 'NY'){
            setStatus('Lean proof accepted (NY)');
            outputEl.textContent = '[Lean Validation Success]\n証明は ' + closure.closer + ' を含むため暫定受け入れです (NY状態)';
            return { status: 'allowed', proof_state: 'NY', reason: 'Temporary acceptance (NY)' };
          }

          setStatus('Lean proof verified (YY)');
          outputEl.textContent = '[Lean Validation Success]\nLean 4でエラーなく検証できました (YY状態)';
          return { status: 'allowed', proof_state: 'YY', reason: 'Lean 4 verified' };
        }catch(err){
          const errorMsg = err && err.message ? err.message : String(err);
          setStatus('Lean validation failed', true);
          outputEl.textContent = '[Lean Validation]\nLean 4実行エラー:\n' + errorMsg;
          return { status: 'error', proof_state: 'NN', reason: 'Lean 4 execution error: ' + errorMsg };
        }
      }

      function analyzeLeanClosure(code){
        if(!code || typeof code !== 'string'){
          return { proofState: 'NN', closer: '', reason: 'Code is empty' };
        }

        const normalized = stripLeanCommentsAndStrings(code).trim();
        if(!normalized){
          return { proofState: 'NN', closer: '', reason: 'Code is empty' };
        }

        if(/\b(sorry|admit)\b/.test(normalized)){
          return { proofState: 'NY', closer: 'sorry/admit' };
        }

        if(/(^|\n)\s*(axiom|constant)\b/.test(normalized)){
          return { proofState: 'NY', closer: 'axiom/constant' };
        }

        return { proofState: 'YY', closer: 'Lean checked' };
      }

      function stripLeanCommentsAndStrings(input){
        let output = '';
        let i = 0;
        let blockCommentDepth = 0;
        let inString = false;
        let inLineComment = false;

        while(i < input.length){
          const ch = input[i];
          const next = input[i + 1];

          if(inString){
            if(ch === '\\'){
              i += 2;
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            i += 1;
            continue;
          }

          if(inLineComment){
            if(ch === '\n' || ch === '\r'){
              inLineComment = false;
              output += ch;
            }
            i += 1;
            continue;
          }

          if(blockCommentDepth > 0){
            if(ch === '/' && next === '-'){
              blockCommentDepth += 1;
              i += 2;
              continue;
            }
            if(ch === '-' && next === '/'){
              blockCommentDepth -= 1;
              i += 2;
              continue;
            }
            i += 1;
            continue;
          }

          if(ch === '-' && next === '-'){
            inLineComment = true;
            i += 2;
            continue;
          }

          if(ch === '/' && next === '-'){
            blockCommentDepth = 1;
            i += 2;
            continue;
          }

          if(ch === '"'){
            inString = true;
            i += 1;
            continue;
          }

          output += ch;
          i += 1;
        }

        return output;
      }

      function analyzeCoqClosure(code) {
        if(!code || typeof code !== 'string'){
          return { proofState: 'NN', reason: 'Code is empty' };
        }

        const normalized = stripCoqCommentsAndStrings(code).trim();
        if(!normalized){
          return { proofState: 'NN', reason: 'Code is empty' };
        }

        if(/Admitted\.\s*$/.test(normalized)){
          return { proofState: 'NY', closer: 'Admitted.' };
        }
        if(isConjectureTail(normalized)){
          return { proofState: 'NY', closer: 'Conjecture.' };
        }
        if(/Defined\.\s*$/.test(normalized)){
          return { proofState: 'YY', closer: 'Defined.' };
        }
        if(/Qed\.\s*$/.test(normalized)){
          return { proofState: 'YY', closer: 'Qed.' };
        }

        return { proofState: 'NN', reason: '証明は最後を Qed. / Defined. / Admitted. / Conjecture で閉じてください。' };
      }

      function isConjectureTail(normalized){
        const matches = Array.from(normalized.matchAll(/\bConjecture\b/g));
        if(matches.length === 0) return false;
        const last = matches[matches.length - 1];
        const idx = typeof last.index === 'number' ? last.index : -1;
        if(idx < 0) return false;
        const tail = normalized.slice(idx).trim();
        if(!tail.endsWith('.')) return false;
        const dotCount = (tail.match(/\./g) || []).length;
        if(dotCount !== 1) return false;
        return true;
      }

      function stripCoqCommentsAndStrings(input){
        let output = '';
        let i = 0;
        let commentDepth = 0;
        let inString = false;

        while(i < input.length){
          const ch = input[i];
          const next = input[i + 1];

          if(inString){
            if(ch === '\\'){
              i += 2;
              continue;
            }
            if(ch === '"'){
              inString = false;
            }
            i += 1;
            continue;
          }

          if(commentDepth > 0){
            if(ch === '(' && next === '*'){
              commentDepth += 1;
              i += 2;
              continue;
            }
            if(ch === '*' && next === ')'){
              commentDepth -= 1;
              i += 2;
              continue;
            }
            i += 1;
            continue;
          }

          if(ch === '"'){
            inString = true;
            i += 1;
            continue;
          }
          if(ch === '(' && next === '*'){
            commentDepth = 1;
            i += 2;
            continue;
          }

          output += ch;
          i += 1;
        }

        return output;
      }

      async function runProof(){
        if(running) return;

        const isCoqMode = selectedLanguage === 'Coq';
        const isLeanMode = selectedLanguage === 'Lean';
        const isLocalValidationMode = isCoqMode || isLeanMode;
        const endpoint = isLocalValidationMode ? '' : runnerEndpointEl.value.trim();
        if (!isLocalValidationMode) {
          safeStorageSet(localStorage, RUNNER_STORAGE_KEY, endpoint);
        }

        if(!isLocalValidationMode && !endpoint){
          setStatus('Runner endpoint required', true);
          outputEl.textContent = [
            '[Configuration]',
            'Runner endpoint is empty.',
            'Set the endpoint URL in the top input and run again.'
          ].join('\n');
          return;
        }

        running = true;
        runBtn.disabled = true;
        setStatus('Running...');

        const code = getEditorCode();
        const isCoqInScrolledMode = selectedLanguage === 'Coq' && initPayload.sourceState === 1;

        if (isCoqMode) {
          // jsCoq初期化を確実に待つ
          if(jscoqInitPromise) {
            try { await jscoqInitPromise; } catch(e) {}
          }
          if(!jscoqReady){
            try{
              await initializeCoqRuntime(true);
            }catch(e){
              // handled by initializeCoqRuntime status update
            }
          }
          if(!jscoqReady) {
            setStatus('jsCoq未初期化', true);
            outputEl.textContent = '[Coq Validation]\njsCoqの初期化に失敗しました。\n詳細: ' + (jscoqInitError || '(unknown)');
            running = false;
            runBtn.disabled = false;
            return;
          }
          // Coqモードの場合、jsCoqで判定のみ
          await validateCoqProof(code);
          running = false;
          runBtn.disabled = false;
          return;
        }

        if (isLeanMode) {
          if(lean4InitPromise){
            try { await lean4InitPromise; } catch(e) {}
          }
          if(!lean4Ready){
            try{
              await initializeLeanRuntime(true);
            }catch(e){
              // handled by initializeLeanRuntime status update
            }
          }
          if(!lean4Ready){
            setStatus('Lean 4未初期化', true);
            outputEl.textContent = '[Lean Validation]\nLean 4の初期化に失敗しました。\n詳細: ' + (lean4InitError || '(unknown)');
            running = false;
            runBtn.disabled = false;
            return;
          }

          await validateLeanProof(code);
          running = false;
          runBtn.disabled = false;
          return;
        }

        if (isCoqInScrolledMode) {
          const validation = await validateCoqProof(code);
          if (validation.status !== 'allowed') {
            running = false;
            runBtn.disabled = false;
            return;
          }
        }

        const payload = {
          proofAssistant: selectedLanguage,
          language: selectedLanguage.toLowerCase(),
          fileName: selectedConfig.fileName,
          summary: summaryText,
          code: code,
          context: {
            draftCreatedAt: initPayload.createdAt || null,
            attachedFileNames: Array.isArray(initPayload.attachedFileNames) ? initPayload.attachedFileNames : [],
            summaryLength: summaryText.length
          }
        };

        if (isCoqInScrolledMode) {
          payload.proof_state = 'YY';
        }

        try{
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          const raw = await response.text();
          if(!response.ok){
            throw new Error('HTTP ' + response.status + ' ' + response.statusText + '\n' + raw.slice(0, 1200));
          }

          let result = null;
          const contentType = response.headers.get('content-type') || '';
          if(contentType.includes('application/json')){
            try{
              result = JSON.parse(raw);
            }catch(err){
              result = { stdout: raw };
            }
          } else {
            result = { stdout: raw };
          }

          outputEl.textContent = formatRunResponse(result);
          setStatus('Run completed');
        }catch(err){
          const msg = err && err.message ? err.message : String(err);
          outputEl.textContent = '[Run Error]\n' + msg;
          setStatus('Run failed', true);
        }finally{
          running = false;
          runBtn.disabled = false;
        }
      }

      function formatRunResponse(data){
        if(typeof data === 'string') return data;
        if(!data || typeof data !== 'object') return String(data);

        const sections = [];

        if(typeof data.stdout === 'string' && data.stdout.length > 0){
          sections.push('[stdout]\n' + data.stdout);
        }

        if(typeof data.stderr === 'string' && data.stderr.length > 0){
          sections.push('[stderr]\n' + data.stderr);
        }

        if(Array.isArray(data.diagnostics) && data.diagnostics.length > 0){
          const diagnosticLines = data.diagnostics.map(function(item, index){
            if(typeof item === 'string') return (index + 1) + '. ' + item;
            const file = item.file ? item.file + ':' : '';
            const line = item.line ? String(item.line) : '?';
            const col = item.column ? String(item.column) : '?';
            const message = item.message || JSON.stringify(item);
            return (index + 1) + '. ' + file + line + ':' + col + ' ' + message;
          });
          sections.push('[diagnostics]\n' + diagnosticLines.join('\n'));
        }

        if(typeof data.result === 'string' && data.result.length > 0){
          sections.push('[result]\n' + data.result);
        }

        if(sections.length === 0){
          sections.push(JSON.stringify(data, null, 2));
        }

        return sections.join('\n\n');
      }

  <script>
    // jsCoq initialization for Coq validation（自動化＆Promise管理）
    const JSCOQ_VERSION = '0.17.1';
    const hasHttpOrigin = !!(window.location && window.location.origin && window.location.origin !== 'null');
    const PROXY_BASE = hasHttpOrigin ? new URL('/api/jscoq/', window.location.origin).toString() : null;
    const CDN_BASE = 'https://cdn.jsdelivr.net/npm/jscoq@' + JSCOQ_VERSION + '/';
    const UNPKG_BASE = 'https://unpkg.com/jscoq@' + JSCOQ_VERSION + '/';
    const JSCOQ_CANDIDATES = (function(){
      const list = [];
      if(PROXY_BASE){
        list.push({
          id: 'proxy',
          moduleUrl: PROXY_BASE + 'jscoq.js',
          basePath: PROXY_BASE
        });
      }
      list.push({
        id: 'jsdelivr',
        moduleUrl: CDN_BASE + 'jscoq.js',
        basePath: CDN_BASE
      });
      list.push({
        id: 'unpkg',
        moduleUrl: UNPKG_BASE + 'jscoq.js',
        basePath: UNPKG_BASE
      });
      return list;
    })();

    let jscoqInstance = null;
    let jscoqManager = null;
    let jscoqInitGlobalPromise = null;
    let jscoqModulePromise = null;
    let jscoqResolvedBasePath = PROXY_BASE || CDN_BASE;
    let jscoqWorkerShimInstalled = false;
    let jscoqWorkerBlobMap = new Map();
    const LEAN4_WEBSOCKET_URL = 'wss://live.lean-lang.org/websocket/MathlibDemo';
    const LEAN4_DOCUMENT_URI = 'file:///MathlibDemo/Main.lean';
    let lean4Instance = null;
    let lean4InitGlobalPromise = null;

    async function autoInitJsCoq() {
      if (!window.__ivucxNeedsJsCoq) return null;
      if (jscoqInitGlobalPromise) return jscoqInitGlobalPromise;

      jscoqInitGlobalPromise = (async () => {
        const mod = await loadJsCoqModule();
        const JsCoqApi = mod && mod.JsCoq;
        if (!JsCoqApi || typeof JsCoqApi.start !== 'function') {
          throw new Error('JsCoq.start が見つかりません');
        }

        jscoqManager = await JsCoqApi.start(['coq'], {
          wrapper_id: 'ide-wrapper',
          base_path: jscoqResolvedBasePath,
          prelaunch: true,
          show: false,
          focus: false,
          replace: false,
          prelude: true,
          implicit_libs: true,
          init_pkgs: ['init'],
          all_pkgs: ['coq']
        });

        await waitForManagerReady(jscoqManager);
        jscoqInstance = createJsCoqExecutor(jscoqManager);
        return jscoqInstance;
      })().catch((err) => {
        jscoqInitGlobalPromise = null;
        throw err;
      });

      return jscoqInitGlobalPromise;
    }

    async function autoInitLean4() {
      if (!window.__ivucxNeedsLean4) return null;
      if (lean4InitGlobalPromise) return lean4InitGlobalPromise;

      lean4InitGlobalPromise = (async () => {
        const executor = createLean4Executor({
          websocketUrl: LEAN4_WEBSOCKET_URL,
          documentUri: LEAN4_DOCUMENT_URI
        });
        await executor.initialize();
        lean4Instance = executor;
        return lean4Instance;
      })().catch((err) => {
        lean4InitGlobalPromise = null;
        throw err;
      });

      return lean4InitGlobalPromise;
    }

    async function loadJsCoqModule() {
      if (jscoqModulePromise) return jscoqModulePromise;

      jscoqModulePromise = (async () => {
        let lastError = null;
        for (const candidate of JSCOQ_CANDIDATES) {
          try {
            const mod = await import(candidate.moduleUrl);
            await prepareJsCoqWorkerRuntime(candidate.basePath);
            jscoqResolvedBasePath = candidate.basePath;
            return mod;
          } catch (err) {
            const detail = err && err.message ? err.message : String(err);
            lastError = new Error('[' + candidate.id + '] ' + detail);
          }
        }
        throw lastError || new Error('jsCoqモジュールを読み込めませんでした');
      })();

      return jscoqModulePromise;
    }

    async function prepareJsCoqWorkerRuntime(basePath) {
      const workerEntries = [
        'backend/jsoo/jscoq_worker.bc.js',
        'dist/wacoq_worker.js'
      ];

      for (const entry of workerEntries) {
        const absolute = new URL(entry, basePath).href;
        if (!isCrossOriginUrl(absolute)) continue;
        if (jscoqWorkerBlobMap.has(absolute)) continue;

        const response = await fetch(absolute, { method: 'GET', mode: 'cors' });
        if (!response.ok) {
          throw new Error('worker fetch failed: ' + response.status + ' ' + absolute);
        }

        const source = await response.text();
        const blob = new Blob([source + '\n//# sourceURL=' + absolute], { type: 'text/javascript' });
        const blobUrl = URL.createObjectURL(blob);
        jscoqWorkerBlobMap.set(absolute, blobUrl);
      }

      installWorkerShim();
    }

    function isCrossOriginUrl(url) {
      try {
        const target = new URL(url, window.location.href);
        return target.origin !== window.location.origin;
      } catch (err) {
        return false;
      }
    }

    function installWorkerShim() {
      if (jscoqWorkerShimInstalled) return;
      if (typeof window.Worker !== 'function') return;

      const NativeWorker = window.Worker;
      const WrappedWorker = function(scriptURL, options) {
        let resolvedURL = scriptURL;
        try {
          const absolute = new URL(String(scriptURL), window.location.href).href;
          if (jscoqWorkerBlobMap.has(absolute)) {
            resolvedURL = jscoqWorkerBlobMap.get(absolute);
          }
        } catch (err) {
          // Keep original URL if normalization fails.
        }

        return new NativeWorker(resolvedURL, options);
      };

      WrappedWorker.prototype = NativeWorker.prototype;
      Object.setPrototypeOf(WrappedWorker, NativeWorker);
      window.Worker = WrappedWorker;
      jscoqWorkerShimInstalled = true;
    }

    async function waitForManagerReady(manager, timeoutMs = 45000) {
      if (!manager) {
        throw new Error('jsCoq manager is unavailable');
      }

      const whenReady = manager.when_ready && manager.when_ready.promise
        ? manager.when_ready.promise
        : null;

      if (whenReady && typeof whenReady.then === 'function') {
        await Promise.race([
          whenReady,
          sleep(timeoutMs).then(() => {
            throw new Error('jsCoq manager ready timeout');
          })
        ]);
      } else {
        const start = Date.now();
        while (true) {
          const sid = manager && manager.doc && manager.doc.sentences && manager.doc.sentences[0] && manager.doc.sentences[0].coq_sid;
          const isReady = !!(manager.navEnabled && sid && Number(sid) > 1);
          if (isReady) break;
          if (Date.now() - start > timeoutMs) {
            throw new Error('jsCoq manager ready timeout');
          }
          await sleep(100);
        }
      }

      return manager && manager.doc && manager.doc.sentences && manager.doc.sentences[0]
        ? manager.doc.sentences[0].coq_sid
        : null;
    }

    function createJsCoqExecutor(manager) {
      return {
        execute: async function(code) {
          manager.provider.load(String(code || ''), 'Main.v', true);
          manager.provider.focus();

          const started = Date.now();
          while (true) {
            const advanced = manager.goNext(false);
            await waitForManagerIdle(manager, started);

            if (manager.error && manager.error.length > 0) {
              throw new Error(extractCoqError(manager));
            }

            if (!advanced) break;
          }

          return true;
        }
      };
    }

    async function waitForManagerIdle(manager, startedAt, timeoutMs = 45000) {
      while (true) {
        if (manager.error && manager.error.length > 0) return;

        const hasBusy = !!(manager.doc && Array.isArray(manager.doc.sentences) && manager.doc.sentences.some((stm) => {
          if (!stm || !stm.phase) return false;
          return stm.phase === 'pending' || stm.phase === 'adding' || stm.phase === 'added' || stm.phase === 'processing';
        }));

        if (!hasBusy) return;
        if (Date.now() - startedAt > timeoutMs) {
          throw new Error('jsCoq execution timeout');
        }
        await sleep(60);
      }
    }

    function extractCoqError(manager) {
      try {
        const stm = manager.error && manager.error[0];
        if (!stm) return 'Coq validation error';

        const feedback = Array.isArray(stm.feedback)
          ? stm.feedback.find((item) => item && item.level === 'Error')
          : null;

        if (feedback && manager.pprint && typeof manager.pprint.pp2Text === 'function') {
          const text = manager.pprint.pp2Text(feedback.msg);
          if (text) return text;
        }

        if (feedback && feedback.msg) {
          return JSON.stringify(feedback.msg);
        }
      } catch (err) {
        // fall through to generic message
      }

      return 'Coq validation error';
    }

    function createLean4Executor(options) {
      const websocketUrl = options.websocketUrl;
      const documentUri = options.documentUri;

      let socket = null;
      let nextId = 1;
      let version = 0;
      let initialized = false;
      let opened = false;
      let lastDiagnostics = {
        version: -1,
        diagnostics: [],
        receivedAt: 0
      };
      let closedError = null;
      const pending = new Map();

      function ensureOpenSocket() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          throw new Error('Lean 4 WebSocket is not connected');
        }
      }

      function rejectAllPending(error) {
        const err = error instanceof Error ? error : new Error(String(error || 'Lean 4 request failed'));
        for (const entry of pending.values()) {
          entry.reject(err);
        }
        pending.clear();
      }

      function sendRaw(message) {
        ensureOpenSocket();
        socket.send(JSON.stringify(message));
      }

      function sendNotification(method, params) {
        sendRaw({
          jsonrpc: '2.0',
          method: method,
          params: params || {}
        });
      }

      function sendRequest(method, params, timeoutMs = 15000) {
        return new Promise((resolve, reject) => {
          ensureOpenSocket();
          const id = nextId++;
          const timer = setTimeout(() => {
            if (!pending.has(id)) return;
            pending.delete(id);
            reject(new Error('Lean 4 request timeout: ' + method));
          }, timeoutMs);

          pending.set(id, {
            resolve: (result) => {
              clearTimeout(timer);
              resolve(result);
            },
            reject: (error) => {
              clearTimeout(timer);
              reject(error);
            }
          });

          sendRaw({
            jsonrpc: '2.0',
            id: id,
            method: method,
            params: params || {}
          });
        });
      }

      function handleServerMessage(message) {
        if (!message || typeof message !== 'object') return;

        if (typeof message.id !== 'undefined' && pending.has(message.id)) {
          const deferred = pending.get(message.id);
          pending.delete(message.id);
          if (Object.prototype.hasOwnProperty.call(message, 'error')) {
            deferred.reject(new Error(formatLeanRpcError(message.error)));
          } else {
            deferred.resolve(message.result);
          }
          return;
        }

        if (message.method === 'textDocument/publishDiagnostics') {
          const params = message.params || {};
          if (params.uri === documentUri) {
            lastDiagnostics = {
              version: typeof params.version === 'number' ? params.version : version,
              diagnostics: Array.isArray(params.diagnostics) ? params.diagnostics : [],
              receivedAt: Date.now()
            };
          }
          return;
        }

        // Reply to server requests we do not actively handle.
        if (typeof message.id !== 'undefined' && typeof message.method === 'string') {
          try {
            sendRaw({
              jsonrpc: '2.0',
              id: message.id,
              result: null
            });
          } catch (err) {
            // Ignore response failures on shutdown.
          }
        }
      }

      function handleIncoming(payloadText) {
        let parsed = null;
        try {
          parsed = JSON.parse(payloadText);
        } catch (err) {
          return;
        }

        if (Array.isArray(parsed)) {
          for (const entry of parsed) {
            handleServerMessage(entry);
          }
        } else {
          handleServerMessage(parsed);
        }
      }

      async function connect(timeoutMs = 15000) {
        if (socket && socket.readyState === WebSocket.OPEN) return;

        await new Promise((resolve, reject) => {
          const ws = new WebSocket(websocketUrl);
          let settled = false;
          const timer = setTimeout(() => {
            if (settled) return;
            settled = true;
            try { ws.close(); } catch (err) {}
            reject(new Error('Lean 4 WebSocket connection timeout'));
          }, timeoutMs);

          ws.addEventListener('open', () => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            socket = ws;

            ws.addEventListener('message', (event) => {
              const data = typeof event.data === 'string' ? event.data : '';
              if (!data) return;
              handleIncoming(data);
            });
            ws.addEventListener('error', () => {
              if (!closedError) {
                closedError = new Error('Lean 4 WebSocket error');
              }
            });
            ws.addEventListener('close', (event) => {
              if (!closedError) {
                closedError = new Error('Lean 4 WebSocket closed: ' + String(event.code || 'unknown'));
              }
              rejectAllPending(closedError);
            });

            resolve();
          });

          ws.addEventListener('error', () => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            reject(new Error('Lean 4 WebSocket connection failed'));
          });
        });
      }

      async function initialize() {
        if (initialized) return true;
        await connect();

        await sendRequest('initialize', {
          processId: null,
          rootUri: 'file:///',
          capabilities: {},
          workspaceFolders: null,
          clientInfo: {
            name: 'ivucx',
            version: '1.0'
          },
          trace: 'off'
        }, 20000);

        sendNotification('initialized', {});
        initialized = true;
        return true;
      }

      async function waitForDiagnostics(targetVersion, timeoutMs = 20000) {
        const started = Date.now();
        while (true) {
          if (closedError) throw closedError;

          if (lastDiagnostics.version >= targetVersion) {
            await sleep(120);
            if (lastDiagnostics.version >= targetVersion) {
              return lastDiagnostics.diagnostics;
            }
          }

          if (Date.now() - started > timeoutMs) {
            throw new Error('Lean 4 diagnostics timeout');
          }

          await sleep(80);
        }
      }

      async function execute(code) {
        await initialize();
        version += 1;
        const text = String(code || '');

        if (!opened) {
          sendNotification('textDocument/didOpen', {
            textDocument: {
              uri: documentUri,
              languageId: 'lean',
              version: version,
              text: text
            }
          });
          opened = true;
        } else {
          sendNotification('textDocument/didChange', {
            textDocument: {
              uri: documentUri,
              version: version
            },
            contentChanges: [
              { text: text }
            ]
          });
        }

        return waitForDiagnostics(version, 25000);
      }

      return {
        initialize,
        execute
      };
    }

    function formatLeanRpcError(error) {
      if (!error) return 'Lean 4 RPC error';
      if (typeof error === 'string') return error;
      if (typeof error.message === 'string' && error.message.length > 0) return error.message;
      try {
        return JSON.stringify(error);
      } catch (err) {
        return String(error);
      }
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    if (window.__ivucxNeedsJsCoq) {
      autoInitJsCoq().catch(() => {
        // Initialization errors are surfaced via status/output panel.
      });
    }
    if (window.__ivucxNeedsLean4) {
      autoInitLean4().catch(() => {
        // Initialization errors are surfaced via status/output panel.
      });
    }
  </script>
</body>
