      function isAllowedLeanLibrary(ref, allowed){
        if(!ref) return false;
        if(ref.type === 'string'){
          return matchesLibraryName(ref.value, allowed);
        }
        return matchesLibraryName(ref.name, allowed);
      }

      function matchesLibraryName(name, allowed){
        if(!name) return false;
        for(const entry of allowed){
          if(!entry) continue;
          const trimmed = String(entry).trim();
          if(!trimmed) continue;
          if(trimmed.endsWith('.*')){
            const base = trimmed.slice(0, -2);
            if(name === base || name.startsWith(base + '.')) return true;
            continue;
          }
          if(name === trimmed) return true;
          if(name.startsWith(trimmed + '.')) return true;
        }
        return false;
      }

      function matchesFromLibrary(prefix, qualid, allowed){
        if(!prefix || !qualid) return false;
        const suffix = '.' + qualid;
        for(const entry of allowed){
          if(!entry) continue;
          const trimmed = String(entry).trim();
          if(!trimmed) continue;
          if(trimmed.endsWith('.*')){
            const base = trimmed.slice(0, -2);
            if(base === prefix || base.startsWith(prefix + '.')) return true;
            continue;
          }
          if(trimmed === prefix) return true;
          if(trimmed.startsWith(prefix + '.') && trimmed.endsWith(suffix)) return true;
        }
        return false;
      }

      function formatLibraryReferences(refs){
        const labels = refs.map(formatLibraryReference).filter(Boolean);
        return Array.from(new Set(labels)).join(', ');
      }

      function formatLibraryReference(ref){
        if(!ref) return '';
        if(typeof ref === 'string') return ref;
        if(ref.type === 'from'){
          return 'From ' + ref.prefix + ' Require ' + ref.qualid;
        }
        if(ref.type === 'string'){
          return '"' + ref.value + '"';
        }
        return ref.name || '';
      }

      function detectCoqAxiomConflict(normalized, catalog){
        if(!catalog || catalog.libraryAxioms.size === 0) return null;
        const proofAxioms = extractCoqAxioms(normalized);
        for(const axiom of proofAxioms){
          const libStmt = catalog.libraryAxioms.get(axiom.name);
          if(!libStmt) continue;
          const proofStmt = normalizeCoqStatement(axiom.statement);
          if(!proofStmt || !libStmt) continue;
          if(proofStmt !== libStmt){
            return {
              name: axiom.name,
              libraryStatement: libStmt,
              proofStatement: proofStmt
            };
          }
        }
        return null;
      }

      function extractCoqAxioms(normalized){
        const axioms = [];
        const regex = /(^|\n)\s*Axioms?\b\s+([^:]+?)\s*:\s*([\s\S]*?)\.(?=\s|$)/g;
        let match;
        while((match = regex.exec(normalized)) !== null){
          const names = splitAxiomNames(match[2]);
          const statement = normalizeCoqStatement(match[3]);
          names.forEach((name)=>{
            if(!name) return;
            axioms.push({ name, statement });
          });
        }
        return axioms;
      }

      function buildLeanLibraryCatalog(payload){
        const collected = collectLeanLibraryTables(payload);
        const tables = collected.tables;
        const allowedLibraries = new Set();
        const allowedTheorems = new Set();
        const libraryAxioms = new Map();

        tables.forEach((table)=>{
          extractLibraryNames(table).forEach((name)=>{
            if(name) allowedLibraries.add(name);
          });
          extractTheoremsFromTable(table).forEach((name)=>{
            if(name) allowedTheorems.add(name);
          });
          extractAxiomsFromTable(table).forEach((entry)=>{
            if(!entry || !entry.name) return;
            const normalizedStatement = normalizeCoqStatement(entry.statement);
            if(libraryAxioms.has(entry.name)) return;
            libraryAxioms.set(entry.name, normalizedStatement);
          });
        });

        return {
          tablesCount: tables.length,
          allowedLibraries,
          allowedTheorems,
          libraryAxioms,
          sourcePresent: collected.sourcePresent
        };
      }

      function collectLeanLibraryTables(payload){
        const out = [];
        const sources = [];
        let sourcePresent = false;
        if(payload && typeof payload === 'object'){
          const payloadKeys = [
            'leanLibraryTables',
            'leanLibraryTable',
            'libraryTables',
            'libraryTable',
            'leanLibraries',
            'library'
          ];
          payloadKeys.forEach((key)=>{
            if(Object.prototype.hasOwnProperty.call(payload, key)){
              sourcePresent = true;
              sources.push(payload[key]);
            }
          });
        }

        const stored = readStoredLibraryTables(['ivucxLeanLibraryTables', 'ivucxLibraryTables']);
        if(stored.found) sourcePresent = true;
        sources.push(...stored.values);

        sources.forEach((source)=>{
          normalizeLibraryTablesInput(source).forEach((table)=>{
            if(isLeanLibraryTable(table)) out.push(table);
          });
        });

        return { tables: out, sourcePresent };
      }

      function isLeanLibraryTable(table){
        if(!table || typeof table !== 'object') return false;
        const lang = table.language || table.lang || table.assistant || table.proofAssistant;
        if(!lang) return true;
        return String(lang).trim().toLowerCase() === 'lean';
      }

      function validateLeanLibraryUsage(normalized, catalog){
        if(!catalog || !normalized) return { ok: true, invalid: [] };
        const used = extractLeanLibraryReferences(normalized);
        if(used.length === 0) return { ok: true, invalid: [] };
        if(catalog.allowedLibraries.size === 0){
          const baseMessage = catalog.sourcePresent
            ? 'Lean LibraryTable is empty.'
            : 'Lean LibraryTable is missing.';
          return {
            ok: false,
            invalid: used,
            reason: baseMessage + ' Imports are not allowed: ' + formatLibraryReferences(used)
          };
        }
        const invalid = used.filter((ref)=>!isAllowedLeanLibrary(ref, catalog.allowedLibraries));
        if(invalid.length === 0) return { ok: true, invalid: [] };
        return {
          ok: false,
          invalid,
          reason: 'Lean LibraryTable does not allow these libraries: ' + formatLibraryReferences(invalid)
        };
      }

      function extractLeanLibraryReferences(normalized){
        const refs = [];
        const lines = normalized.split(/\r?\n/);
        lines.forEach((line)=>{
          const trimmed = line.trim();
          if(!trimmed) return;
          const tokens = trimmed.split(/\s+/).filter(Boolean);
          if(tokens.length === 0) return;
          let idx = 0;
          while(tokens[idx] === 'public' || tokens[idx] === 'meta'){
            idx += 1;
          }
          if(tokens[idx] !== 'import') return;
          idx += 1;
          if(tokens[idx] === 'all') idx += 1;
          for(; idx < tokens.length; idx += 1){
            const token = tokens[idx];
            if(!token) continue;
            if(!/^[A-Za-z0-9_.']+$/.test(token)) break;
            refs.push({ type: 'qualid', name: token });
          }
        });
        return refs;
      }

      function detectLeanAxiomConflict(normalized, catalog){
        if(!catalog || catalog.libraryAxioms.size === 0) return null;
        const proofAxioms = extractLeanAxioms(normalized);
        for(const axiom of proofAxioms){
          const libStmt = catalog.libraryAxioms.get(axiom.name);
          if(!libStmt) continue;
          const proofStmt = normalizeCoqStatement(axiom.statement);
          if(!proofStmt || !libStmt) continue;
          if(proofStmt !== libStmt){
            return {
              name: axiom.name,
              libraryStatement: libStmt,
              proofStatement: proofStmt
            };
          }
        }
        return null;
      }

      function extractLeanAxioms(normalized){
        const axioms = [];
        const regex = /(^|\n)\s*axioms?\b\s+([^:]+?)\s*:\s*([^\n]+)/gi;
        let match;
        while((match = regex.exec(normalized)) !== null){
          const names = splitAxiomNames(match[2]);
          const statement = normalizeCoqStatement(match[3]);
          names.forEach((name)=>{
            if(!name) return;
            axioms.push({ name, statement });
          });
        }
        return axioms;
      }

      async function runProof(){
        if(running) return;

        const isCoqMode = selectedLanguage === 'Coq';
        const isLeanMode = selectedLanguage === 'Lean';
        const isLocalValidationMode = isCoqMode || isLeanMode;
        const endpoint = isLocalValidationMode ? '' : runnerEndpointEl.value.trim();
        if (!isLocalValidationMode) {
          safeStorageSet(localStorage, RUNNER_STORAGE_KEY, endpoint);
        }

        if(!isLocalValidationMode && !endpoint){
          setStatus('Runner endpoint required', true);
          outputEl.textContent = [
            '[Configuration]',
            'Runner endpoint is empty.',
            'Set the endpoint URL in the top input and run again.'
          ].join('\n');
          return;
        }

        running = true;
        runBtn.disabled = true;
        setStatus('Running...');

        const code = getEditorCode();
        const isCoqInScrolledMode = selectedLanguage === 'Coq' && initPayload.sourceState === 1;

        if (isCoqMode) {
          // jsCoq初期化を確実に待つ
          if(jscoqInitPromise) {
            try { await jscoqInitPromise; } catch(e) {}
          }
          if(!jscoqReady){
            try{
              await initializeCoqRuntime(true);
            }catch(e){
              // handled by initializeCoqRuntime status update
            }
          }
          if(!jscoqReady) {
            setStatus('jsCoq未初期化', true);
            outputEl.textContent = '[Coq Validation]\njsCoqの初期化に失敗しました。\n詳細: ' + (jscoqInitError || '(unknown)');
            running = false;
            runBtn.disabled = false;
            return;
          }
          // Coqモードの場合、jsCoqで判定のみ
          await validateCoqProof(code);
          running = false;
          runBtn.disabled = false;
          return;
        }

        if (isLeanMode) {
          if(lean4InitPromise){
            try { await lean4InitPromise; } catch(e) {}
          }
          if(!lean4Ready){
            try{
              await initializeLeanRuntime(true);
            }catch(e){
              // handled by initializeLeanRuntime status update
            }
          }
          if(!lean4Ready){
            setStatus('Lean 4未初期化', true);
            outputEl.textContent = '[Lean Validation]\nLean 4の初期化に失敗しました。\n詳細: ' + (lean4InitError || '(unknown)');
            running = false;
            runBtn.disabled = false;
            return;
          }

          await validateLeanProof(code);
          running = false;
          runBtn.disabled = false;
          return;
        }

        if (isCoqInScrolledMode) {
          const validation = await validateCoqProof(code);
          if (validation.status !== 'allowed') {
            running = false;
            runBtn.disabled = false;
            return;
          }
        }

        const payload = {
          proofAssistant: selectedLanguage,
          language: selectedLanguage.toLowerCase(),
          fileName: selectedConfig.fileName,
          summary: summaryText,
          code: code,
          context: {
            draftCreatedAt: initPayload.createdAt || null,
            attachedFileNames: Array.isArray(initPayload.attachedFileNames) ? initPayload.attachedFileNames : [],
            summaryLength: summaryText.length
          }
        };

        if (isCoqInScrolledMode) {
          payload.proof_state = 'YY';
        }

        try{
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          const raw = await response.text();
          if(!response.ok){
            throw new Error('HTTP ' + response.status + ' ' + response.statusText + '\n' + raw.slice(0, 1200));
          }

          let result = null;
          const contentType = response.headers.get('content-type') || '';
          if(contentType.includes('application/json')){
            try{
              result = JSON.parse(raw);
            }catch(err){
              result = { stdout: raw };
            }
          } else {
            result = { stdout: raw };
          }

          outputEl.textContent = formatRunResponse(result);
          setStatus('Run completed');
        }catch(err){
          const msg = err && err.message ? err.message : String(err);
          outputEl.textContent = '[Run Error]\n' + msg;
          setStatus('Run failed', true);
        }finally{
          running = false;
          runBtn.disabled = false;
        }
      }

      function formatRunResponse(data){
        if(typeof data === 'string') return data;
        if(!data || typeof data !== 'object') return String(data);

        const sections = [];

        if(typeof data.stdout === 'string' && data.stdout.length > 0){
          sections.push('[stdout]\n' + data.stdout);
        }

        if(typeof data.stderr === 'string' && data.stderr.length > 0){
          sections.push('[stderr]\n' + data.stderr);
        }

        if(Array.isArray(data.diagnostics) && data.diagnostics.length > 0){
          const diagnosticLines = data.diagnostics.map(function(item, index){
            if(typeof item === 'string') return (index + 1) + '. ' + item;
            const file = item.file ? item.file + ':' : '';
            const line = item.line ? String(item.line) : '?';
            const col = item.column ? String(item.column) : '?';
            const message = item.message || JSON.stringify(item);
            return (index + 1) + '. ' + file + line + ':' + col + ' ' + message;
          });
          sections.push('[diagnostics]\n' + diagnosticLines.join('\n'));
        }

        if(typeof data.result === 'string' && data.result.length > 0){
          sections.push('[result]\n' + data.result);
        }

        if(sections.length === 0){
          sections.push(JSON.stringify(data, null, 2));
        }

        return sections.join('\n\n');
      }

  <script>
    // jsCoq initialization for Coq validation（自動化＆Promise管理）
    const JSCOQ_VERSION = '0.17.1';

    const CDN_BASE = 'https://cdn.jsdelivr.net/npm/jscoq@' + JSCOQ_VERSION + '/';
    const UNPKG_BASE = 'https://unpkg.com/jscoq@' + JSCOQ_VERSION + '/';
    const JSCOQ_CANDIDATES = (function(){
      const list = [];
      if(PROXY_BASE){
        list.push({
          id: 'proxy',
          moduleUrl: PROXY_BASE + 'jscoq.js',
          basePath: PROXY_BASE
        });

        moduleUrl: UNPKG_BASE + 'jscoq.js',
        basePath: UNPKG_BASE
      });
      return list;
    })();

    let jscoqInstance = null;
    let jscoqManager = null;
    let jscoqInitGlobalPromise = null;
    let jscoqModulePromise = null;

    async function autoInitJsCoq() {
      if (!window.__ivucxNeedsJsCoq) return null;
      if (jscoqInitGlobalPromise) return jscoqInitGlobalPromise;

      jscoqInitGlobalPromise = (async () => {
        const mod = await loadJsCoqModule();
        const JsCoqApi = mod && mod.JsCoq;
        if (!JsCoqApi || typeof JsCoqApi.start !== 'function') {
          throw new Error('JsCoq.start が見つかりません');

          init_pkgs: ['init'],

        });

        await waitForManagerReady(jscoqManager);
        if (typeof window !== 'undefined') {
          if (!window.jsCoq && jscoqManager && jscoqManager.coq) {
            window.jsCoq = jscoqManager.coq;

    async function autoInitLean4() {

    async function loadJsCoqModule() {
      if (jscoqModulePromise) return jscoqModulePromise;

      jscoqModulePromise = (async () => {
        let lastError = null;
        for (const candidate of JSCOQ_CANDIDATES) {
          try {
            const mod = await import(candidate.moduleUrl);
            await prepareJsCoqWorkerRuntime(candidate.basePath);
            jscoqResolvedBasePath = candidate.basePath;
            return mod;
          } catch (err) {
            const detail = err && err.message ? err.message : String(err);
            lastError = new Error('[' + candidate.id + '] ' + detail);
          }

        throw lastError || new Error('jsCoqモジュールを読み込めませんでした');
      })();

      return jscoqModulePromise;
    }

    async function prepareJsCoqWorkerRuntime(basePath) {
      const workerEntries = [
        'backend/jsoo/jscoq_worker.bc.js',
        'dist/wacoq_worker.js'
      ];

      for (const entry of workerEntries) {
        const absolute = new URL(entry, basePath).href;
        if (!isCrossOriginUrl(absolute)) continue;
        if (jscoqWorkerBlobMap.has(absolute)) continue;

        const response = await fetch(absolute, { method: 'GET', mode: 'cors' });
        if (!response.ok) {
          throw new Error('worker fetch failed: ' + response.status + ' ' + absolute);
        }

        const source = await response.text();
        const blob = new Blob([source + '\n//# sourceURL=' + absolute], { type: 'text/javascript' });
        const blobUrl = URL.createObjectURL(blob);
        jscoqWorkerBlobMap.set(absolute, blobUrl);
      }

      installWorkerShim();
    }

    function isCrossOriginUrl(url) {
      try {
        const target = new URL(url, window.location.href);
        return target.origin !== window.location.origin;
      } catch (err) {
        return false;
      }
    }

    function installWorkerShim() {
      if (jscoqWorkerShimInstalled) return;
      if (typeof window.Worker !== 'function') return;

      const NativeWorker = window.Worker;
      const WrappedWorker = function(scriptURL, options) {
        let resolvedURL = scriptURL;
        try {
          const absolute = new URL(String(scriptURL), window.location.href).href;
          if (jscoqWorkerBlobMap.has(absolute)) {
            resolvedURL = jscoqWorkerBlobMap.get(absolute);
          }
        } catch (err) {
          // Keep original URL if normalization fails.
        }

        return new NativeWorker(resolvedURL, options);
      };

      WrappedWorker.prototype = NativeWorker.prototype;
      Object.setPrototypeOf(WrappedWorker, NativeWorker);
      window.Worker = WrappedWorker;
      jscoqWorkerShimInstalled = true;
    }

    async function waitForManagerReady(manager, timeoutMs = 45000) {
      if (!manager) {
        throw new Error('jsCoq manager is unavailable');
      }

      const whenReady = manager.when_ready && manager.when_ready.promise
        ? manager.when_ready.promise
        : null;

      if (whenReady && typeof whenReady.then === 'function') {
        await Promise.race([
          whenReady,
          sleep(timeoutMs).then(() => {
            throw new Error('jsCoq manager ready timeout');
          })
        ]);
      } else {
        const start = Date.now();
        while (true) {
          const sid = manager && manager.doc && manager.doc.sentences && manager.doc.sentences[0] && manager.doc.sentences[0].coq_sid;
          const isReady = !!(manager.navEnabled && sid && Number(sid) > 1);
          if (isReady) break;
          if (Date.now() - start > timeoutMs) {
            throw new Error('jsCoq manager ready timeout');
          }
          await sleep(100);
        }
      }

      return manager && manager.doc && manager.doc.sentences && manager.doc.sentences[0]
        ? manager.doc.sentences[0].coq_sid
        : null;
    }

    function createJsCoqExecutor(manager) {
      return {
        execute: async function(code) {
          if(!manager || !manager.provider || typeof manager.provider.load !== 'function') {
            throw new Error('jsCoq manager provider is unavailable');
          }
          manager.provider.load(String(code || ''), 'Main.v', true);
          if(typeof manager.provider.focus === 'function') {
            manager.provider.focus();
          }

          const started = Date.now();
          while (true) {
            const advanced = typeof manager.goNext === 'function' ? manager.goNext(false) : false;
            await waitForManagerIdle(manager, started);

            if (manager.error && manager.error.length > 0) {
              throw new Error(extractCoqError(manager, code));
            }

            if (!advanced) break;
          }

          return true;
        }
      };
    }

    async function waitForManagerIdle(manager, startedAt, timeoutMs = 45000) {
      while (true) {
        if (manager.error && manager.error.length > 0) return;

        const hasBusy = !!(manager.doc && Array.isArray(manager.doc.sentences) && manager.doc.sentences.some((stm) => {
          if (!stm || !stm.phase) return false;
          return stm.phase === 'pending' || stm.phase === 'adding' || stm.phase === 'added' || stm.phase === 'processing';
        }));

        if (!hasBusy) return;
        if (Date.now() - startedAt > timeoutMs) {
          throw new Error('jsCoq execution timeout');
        }
        await sleep(60);
      }
    }

    function extractCoqError(manager, sourceText) {
      try {
        const stm = manager.error && manager.error[0];
        if (!stm) return 'Coq validation error';

        const feedback = Array.isArray(stm.feedback)
          ? stm.feedback.find((item) => item && item.level === 'Error')
          : null;

        let message = '';
        if (feedback && manager.pprint && typeof manager.pprint.pp2Text === 'function') {
          const text = manager.pprint.pp2Text(feedback.msg);
          if (text) message = text;
        }

        if (!message && feedback && feedback.msg) {
          message = stringifyCoqPayload(feedback.msg);
        }

        if (!message && stm && stm.msg) {
          message = typeof stm.msg === 'string' ? stm.msg : stringifyCoqPayload(stm.msg);
        }

        message = sanitizeCoqMessage(message);

        const location = resolveCoqErrorLocation(stm, feedback, sourceText);
        if (location) {
          return location.line + ':' + location.col + ' ' + (message || 'Coq validation error');
        }

        if (message) return message;
      } catch (err) {
        // fall through to generic message
      }

      return 'Coq validation error';
    }

    function resolveCoqErrorLocation(stm, feedback, sourceText) {
      const candidates = [];
      if (feedback && feedback.loc) candidates.push(feedback.loc);
      if (feedback && feedback.location) candidates.push(feedback.location);
      if (stm && stm.loc) candidates.push(stm.loc);
      if (stm && stm.location) candidates.push(stm.location);
      if (stm && stm.pploc) candidates.push(stm.pploc);

      for (const loc of candidates) {
        const resolved = normalizeCoqLocation(loc, sourceText);
        if (resolved) return resolved;
      }
      return null;
    }

    function normalizeCoqLocation(loc, sourceText) {
      if (!loc || typeof loc !== 'object') return null;

      if (Array.isArray(loc)) {
        if (loc.length > 0 && typeof loc[0] === 'object') {
          return normalizeCoqLocation(loc[0], sourceText);
        }
        if (loc.length >= 2 && Number.isFinite(loc[0]) && typeof sourceText === 'string') {
          return indexToLineCol(sourceText, loc[0]);
        }
      }

      const lineRaw = pickNumber(loc.line, loc.lineno, loc.startLine);
      const colRaw = pickNumber(loc.column, loc.col, loc.character, loc.char, loc.startCol);
      if (Number.isFinite(lineRaw) && Number.isFinite(colRaw)) {
        return {
          line: lineRaw <= 0 ? lineRaw + 1 : lineRaw,
          col: colRaw <= 0 ? colRaw + 1 : colRaw
        };
      }

      const start = loc.start && typeof loc.start === 'object' ? loc.start : null;
      if (start) {
        const sLine = pickNumber(start.line, start.lineno);
        const sCol = pickNumber(start.column, start.col, start.character, start.char);
        if (Number.isFinite(sLine) && Number.isFinite(sCol)) {
          return {
            line: sLine <= 0 ? sLine + 1 : sLine,
            col: sCol <= 0 ? sCol + 1 : sCol
          };
        }
      }

      const bp = pickNumber(loc.bp, loc.startPos, loc.startOffset);
      if (Number.isFinite(bp) && typeof sourceText === 'string') {
        return indexToLineCol(sourceText, bp);
      }

      return null;
    }

    function pickNumber() {
      for (let i = 0; i < arguments.length; i += 1) {
        const value = arguments[i];
        if (Number.isFinite(value)) return value;
        if (typeof value === 'string') {
          const trimmed = value.trim();
          if (!trimmed) continue;
          const num = Number(trimmed);
          if (Number.isFinite(num)) return num;
        }
      }
      return null;
    }

    function indexToLineCol(text, index) {
      if (!text || !Number.isFinite(index) || index < 0) return null;
      let line = 1;
      let col = 1;
      const limit = Math.min(text.length, index);
      for (let i = 0; i < limit; i += 1) {
        const ch = text[i];
        if (ch === '\n') {
          line += 1;
          col = 1;
          continue;
        }
        if (ch === '\r') {
          if (text[i + 1] === '\n') {
            i += 1;
          }
          line += 1;
          col = 1;
          continue;
        }
        col += 1;
      }
      return { line, col };
    }

      function createLean4Executor(options) {
      const websocketUrl = options.websocketUrl;
      const documentUri = options.documentUri;

      let socket = null;
      let nextId = 1;
      let version = 0;
      let initialized = false;
      let opened = false;
      let lastDiagnostics = {
        version: -1,
        diagnostics: [],
        receivedAt: 0
      };
      let closedError = null;
      const pending = new Map();

      function ensureOpenSocket() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          throw new Error('Lean 4 WebSocket is not connected');
        }
      }

      function rejectAllPending(error) {
        const err = error instanceof Error ? error : new Error(String(error || 'Lean 4 request failed'));
        for (const entry of pending.values()) {
          entry.reject(err);
        }
        pending.clear();
      }

      function sendRaw(message) {
        ensureOpenSocket();
        socket.send(JSON.stringify(message));
      }

      function sendNotification(method, params) {
        sendRaw({
          jsonrpc: '2.0',
          method: method,
          params: params || {}
        });
      }

      function sendRequest(method, params, timeoutMs = 15000) {
        return new Promise((resolve, reject) => {
          ensureOpenSocket();
          const id = nextId++;
          const timer = setTimeout(() => {
            if (!pending.has(id)) return;
            pending.delete(id);
            reject(new Error('Lean 4 request timeout: ' + method));
          }, timeoutMs);

          pending.set(id, {
            resolve: (result) => {
              clearTimeout(timer);
              resolve(result);
            },
            reject: (error) => {
              clearTimeout(timer);
              reject(error);
            }
          });

          sendRaw({
            jsonrpc: '2.0',
            id: id,
            method: method,
            params: params || {}
          });
        });
      }

      function handleServerMessage(message) {
        if (!message || typeof message !== 'object') return;

        if (typeof message.id !== 'undefined' && pending.has(message.id)) {
          const deferred = pending.get(message.id);
          pending.delete(message.id);
          if (Object.prototype.hasOwnProperty.call(message, 'error')) {
            deferred.reject(new Error(formatLeanRpcError(message.error)));
          } else {
            deferred.resolve(message.result);
          }
          return;
        }

        if (message.method === 'textDocument/publishDiagnostics') {
          const params = message.params || {};
          if (params.uri === documentUri) {
            lastDiagnostics = {
              version: typeof params.version === 'number' ? params.version : version,
              diagnostics: Array.isArray(params.diagnostics) ? params.diagnostics : [],
              receivedAt: Date.now()
            };
          }
          return;
        }

        // Reply to server requests we do not actively handle.
        if (typeof message.id !== 'undefined' && typeof message.method === 'string') {
          try {
            sendRaw({
              jsonrpc: '2.0',
              id: message.id,
              result: null
            });
          } catch (err) {
            // Ignore response failures on shutdown.
          }
        }
      }

      function handleIncoming(payloadText) {
        let parsed = null;
        try {
          parsed = JSON.parse(payloadText);
        } catch (err) {
          return;
        }

        if (Array.isArray(parsed)) {
          for (const entry of parsed) {
            handleServerMessage(entry);
          }
        } else {
          handleServerMessage(parsed);
        }
      }

      async function connect(timeoutMs = 15000) {
        if (socket && socket.readyState === WebSocket.OPEN) return;

        await new Promise((resolve, reject) => {
          const ws = new WebSocket(websocketUrl);
          let settled = false;
          const timer = setTimeout(() => {
            if (settled) return;
            settled = true;
            try { ws.close(); } catch (err) {}
            reject(new Error('Lean 4 WebSocket connection timeout'));
          }, timeoutMs);

          ws.addEventListener('open', () => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            socket = ws;
            closedError = null;

            ws.addEventListener('message', async (event) => {
              let data = '';
              if (typeof event.data === 'string') {
                data = event.data;
              } else if (event.data && typeof event.data.text === 'function') {
                try {
                  data = await event.data.text();
                } catch (err) {
                  data = '';
                }
              } else if (typeof ArrayBuffer !== 'undefined' && event.data instanceof ArrayBuffer) {
                data = new TextDecoder().decode(event.data);
              }
              if (!data) return;
              handleIncoming(data);
            });
            ws.addEventListener('error', () => {
              if (!closedError) {
                closedError = new Error('Lean 4 WebSocket error');
              }
            });
            ws.addEventListener('close', (event) => {
              if (!closedError) {
                closedError = new Error('Lean 4 WebSocket closed: ' + String(event.code || 'unknown'));
              }
              socket = null;
              initialized = false;
              opened = false;
              rejectAllPending(closedError);
            });

            resolve();
          });

          ws.addEventListener('error', () => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            reject(new Error('Lean 4 WebSocket connection failed'));
          });
        });
      }

      async function initialize() {
        if (initialized) return true;
        await connect();

        await sendRequest('initialize', {
          processId: null,
          rootUri: 'file:///',
          capabilities: {},
          workspaceFolders: null,
          clientInfo: {
            name: 'ivucx',
            version: '1.0'
          },
          trace: 'off'
        }, 20000);

        sendNotification('initialized', {});
        initialized = true;
        return true;
      }

      async function waitForDiagnostics(targetVersion, timeoutMs = 20000) {
        const requestedAt = Date.now();
        return waitForDiagnosticsSince(targetVersion, requestedAt, timeoutMs);
      }

      async function waitForDiagnosticsSince(targetVersion, requestedAt, timeoutMs = 20000) {
        const started = Date.now();
        while (true) {
          if (closedError) throw closedError;

          if (lastDiagnostics.version >= targetVersion && lastDiagnostics.receivedAt >= requestedAt) {
            return lastDiagnostics.diagnostics;
          }

          if (Date.now() - started > timeoutMs) {
            throw new Error('Lean 4 diagnostics timeout');
          }

          await sleep(80);
        }
      }

      async function execute(code) {
        await initialize();
        version += 1;
        const text = String(code || '');
        const requestedAt = Date.now();
        lastDiagnostics = {
          version: -1,
          diagnostics: [],
          receivedAt: 0
        };

        if (opened) {
          sendNotification('textDocument/didClose', {
            textDocument: {
              uri: documentUri
            }
          });
          opened = false;
        }

        sendNotification('textDocument/didOpen', {
          textDocument: {
            uri: documentUri,
            languageId: 'lean',
            version: version,
            text: text
          }
        });
        opened = true;

        return waitForDiagnosticsSince(version, requestedAt, 25000);
      }

      function dispose() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          try {
            socket.close();
          } catch (err) {
            // ignore close failures
          }
        }
        socket = null;
        initialized = false;
        opened = false;
        pending.clear();
      }

      return {
        initialize,
        execute,
        dispose
      };
    }

    function formatLeanRpcError(error) {
      if (!error) return 'Lean 4 RPC error';
      if (typeof error === 'string') return error;
      if (typeof error.message === 'string' && error.message.length > 0) return error.message;
      try {
        return JSON.stringify(error);
      } catch (err) {
        return String(error);
      }
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    if (window.__ivucxNeedsJsCoq) {
      autoInitJsCoq().catch(() => {
        // Initialization errors are surfaced via status/output panel.
      });
    }
    if (window.__ivucxNeedsLean4) {
      autoInitLean4().catch(() => {
        // Initialization errors are surfaced via status/output panel.
      });
    }
  </script>
