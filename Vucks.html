<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iVucx</title>
  <style>
    :root{
      --bg-white:#ffffff;
      --bg-black:#111111;
      --bg-navy:#0b1e3d;
    }

    *,*::before,*::after{box-sizing:border-box}

    html,body{
      height:100vh;
      height:100dvh;
      margin:0;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }

    body{
      background:var(--bg-white);
      transition:background .45s ease,color .35s ease;
    }

    body.mode-q{
      background:var(--bg-black);
      color:#fff;
    }

    body.scrolled{
      background:#888888;
      color:#111;
    }

    body.login-check{
      background:var(--bg-navy);
      color:#fff;
    }

    body.login-check .fixed-wrapper{
      display:none;
    }

    .fixed-wrapper{
      position:fixed;
      inset:0;
      z-index:26;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      transition:justify-content .45s cubic-bezier(.4,0,.2,1);
    }

    body.suggestions-open .search-container{
      max-width:min(980px, 100vw);
      padding:0 16px calc(12px + env(safe-area-inset-bottom));
      text-align:left;
    }

    .search-container{
      width:100%;
      max-width:700px;
      padding:16px;
      text-align:center;
      pointer-events:auto;
      transition:max-width .45s cubic-bezier(.4,0,.2,1), height .45s cubic-bezier(.4,0,.2,1), padding .45s cubic-bezier(.4,0,.2,1);
      height:auto;
    }

    .search-container.expanded{
      max-width:100vw;
      /* height is calculated dynamically so the top never leaves the viewport */
      padding:0 24px 24px 24px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
    }

    .search-box{
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      border-radius:28px;
      padding:12px 16px;
      background:#111;
      transition:all .45s cubic-bezier(.4,0,.2,1);
      max-height:calc(100vh - 160px);
      max-height:calc(100dvh - 160px);
      flex-direction:row;
    }

    body.suggestions-open .search-box{
      border-radius:22px;
      border:1px solid rgba(15,23,42,0.14);
      box-shadow:0 10px 30px rgba(15,23,42,0.12);
      background:#ffffff;
    }

    body.mode-q.suggestions-open .search-box{
      border-color:rgba(255,255,255,0.2);
      box-shadow:0 14px 34px rgba(0,0,0,0.44);
      background:#0f141d;
    }

    .search-container.expanded .search-box{
      height:100%;
      max-height:none;
      border-radius:18px;
      padding:16px;
      align-items:stretch;
      flex-direction:column-reverse;
      gap:8px;
    }

    body.mode-q .search-box{ background:#fff; }

    body.scrolled .search-box{
      background:rgba(255,255,255,0.6);
      backdrop-filter:blur(8px);
    }

    body.login-check .search-box{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
    }

    .search-input{
      flex:1;
      border:none;
      outline:none;
      font-size:16px;
      background:transparent;
      color:#fff;
      resize:none;
      line-height:1.4;
      max-height:calc(100vh - 300px);
      max-height:calc(100dvh - 300px);
      overflow:auto;
      width:100%;
      transition:height .45s cubic-bezier(.4,0,.2,1);
    }

    .search-container.expanded .search-input{
      max-height:none;
      height:100%;
      overflow-y:auto;
      overflow-x:hidden;
      flex-grow:1;
      min-height:200px;
    }

    body.mode-q .search-input{ color:#111; }
    body.scrolled .search-input{ color:#111; }
    body.login-check .search-input{ color:#fff; caret-color:#fff; }

    body.suggestions-open .search-input{
      color:#111;
    }

    body.mode-q.suggestions-open .search-input{
      color:#eaf1ff;
      caret-color:#eaf1ff;
    }

    .send-button{
      flex:0 0 44px;
      border:none;
      border-radius:50%;
      width:44px;
      height:44px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      color:#111;
    }

    .search-container.expanded .send-button{
      align-self:flex-end;
      margin-top:8px;
    }

    .attachment-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:0;
      text-align:left;
      overflow:hidden;
      max-height:0;
      opacity:0;
      transform:translateY(-6px);
      pointer-events:none;
      transition:max-height .3s cubic-bezier(.4,0,.2,1),opacity .25s ease,margin-top .3s cubic-bezier(.4,0,.2,1),transform .3s cubic-bezier(.4,0,.2,1);
    }

    .attachment-list.has-files{
      margin-top:10px;
      max-height:220px;
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .attachment-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      max-width:100%;
      padding:6px 10px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,0.18);
      background:#e8e8e8;
      color:#111;
      font-size:12px;
      line-height:1.2;
      opacity:0;
      transform:translateY(6px) scale(.98);
      transition:opacity .2s ease,transform .25s cubic-bezier(.22,1,.36,1);
    }

    .attachment-chip.is-visible{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    .attachment-chip.is-removing{
      opacity:0;
      transform:translateY(-4px) scale(.96);
    }

    body.mode-q .attachment-chip{
      border-color:rgba(255,255,255,0.32);
      background:#222;
      color:#fff;
    }

    body.scrolled .attachment-chip{
      border-color:rgba(0,0,0,0.2);
      background:rgba(255,255,255,0.6);
      backdrop-filter:blur(8px);
      color:#111;
    }

    body.login-check .attachment-chip{
      border-color:rgba(255,255,255,0.32);
      background:rgba(255,255,255,0.12);
      color:#fff;
    }

    .attachment-chip .name{
      color:currentColor;
      opacity:.78;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:min(52vw, 320px);
    }

    .attachment-chip .meta{
      opacity:.7;
      white-space:nowrap;
    }

    .attachment-chip .remove{
      border:none;
      background:transparent;
      color:inherit;
      cursor:pointer;
      font-size:14px;
      line-height:1;
      padding:0;
    }

    body.mode-q .send-button{ background:#111; color:#fff; }
    body.login-check .send-button{ background:#fff; color:#0b1e3d; }

    .send-button svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .icon-arrow{display:none;}
    body.scrolled .icon-search{display:none;}
    body.scrolled .icon-arrow{display:block;}

    .button-group{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:22px;
      transition:opacity .45s ease,transform .45s ease;
    }

    body.scrolled .button-group,
    body.login-check .button-group{
      opacity:0;
      transform:translateY(-10px);
      pointer-events:none;
    }

    body.suggestions-open .button-group{
      opacity:0;
      transform:translateY(-10px);
      pointer-events:none;
    }

    .sub-button{
      padding:10px 20px;
      border-radius:22px;
      border:1px solid rgba(0,0,0,0.12);
      background:#fff;
      color:#111;
      cursor:pointer;
    }

    body:not(.mode-q) .sub-button.active{ background:#fff; color:#111; }
    body:not(.mode-q) .sub-button:not(.active){ background:#111; color:#fff; }

    body.mode-q .sub-button.active{ background:#111; color:#fff; }
    body.mode-q .sub-button:not(.active){ background:#fff; color:#111; }

    .hint{
      margin-top:14px;
      font-size:13px;
      opacity:.6;
    }

    body.scrolled .hint,
    body.login-check .hint{ opacity:0; }

    body.suggestions-open .hint{
      opacity:0;
      pointer-events:none;
    }

    .selection-mode{
      display:flex;
      flex-direction:column;
      gap:16px;
      align-items:center;
      justify-content:center;
      height:100vh;
      padding:20px;
      position:fixed;
      inset:0;
    }

    .selection-option{
      width:100%;
      max-width:400px;
      padding:20px;
      border-radius:12px;
      background:#fff;
      color:#111;
      border:2px solid #ddd;
      cursor:pointer;
      font-size:18px;
      font-weight:500;
      text-align:center;
      transition:background-color .28s ease,color .28s ease,border-color .28s ease,transform .2s ease;
    }

    .selection-option:hover{
      background:#111;
      color:#fff;
      border-color:#111;
      transform:translateY(-2px);
    }

    .selection-option:active{
      transform:translateY(0);
    }

    .selection-cancel{
      position:absolute;
      top:18px;
      right:18px;
      width:40px;
      height:40px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,0.9);
      color:#111;
      font-size:26px;
      line-height:1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:background-color .25s ease,color .25s ease,transform .2s ease;
    }

    .selection-cancel:hover{
      background:#111;
      color:#fff;
    }

    .selection-cancel:active{
      transform:scale(.95);
    }

    .blue-mode-shell{
      position:fixed;
      inset:0;
      z-index:25;
      display:none;
      pointer-events:none;
      overflow:hidden;
    }

    body.login-check .blue-mode-shell{
      display:block;
      pointer-events:auto;
    }

    .blue-mode-panel{
      position:absolute;
      top:24px;
      left:24px;
      width:min(360px, calc(100vw - 40px));
      opacity:0;
      transform:translateY(-10px);
      pointer-events:none;
      transition:opacity .3s ease,transform .3s ease;
    }

    .blue-mode-panel.is-visible{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .vx-title{
      margin:0;
      font-size:clamp(32px, 5vw, 52px);
      line-height:1.05;
      letter-spacing:.02em;
      color:#fff;
      font-weight:760;
      text-shadow:0 8px 26px rgba(0,0,0,0.38);
    }

    .cash-actions{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .cash-action-btn{
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.58);
      font-size:18px;
      font-weight:540;
      line-height:1.2;
      cursor:pointer;
      padding:2px 0;
      transition:color .2s ease;
    }

    .cash-action-btn:hover,
    .cash-action-btn:focus-visible{
      color:#fff;
      outline:none;
    }

    .cash-divider{
      color:rgba(255,255,255,0.45);
      font-size:17px;
      user-select:none;
    }

    .rewards-caption{
      margin-top:14px;
      font-size:14px;
      color:rgba(255,255,255,0.5);
      letter-spacing:.01em;
    }

    .rewards-list{
      margin-top:8px;
      width:100%;
      min-height:190px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(8px);
      padding:12px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .rewards-login-wrap{
      min-height:166px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .rewards-login-btn{
      width:min(230px, 90%);
      min-height:58px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.1);
      color:#fff;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
      transition:background-color .2s ease,transform .2s ease;
    }

    .rewards-login-btn:hover{
      background:rgba(255,255,255,0.2);
      transform:translateY(-1px);
    }

    .rewards-items{
      margin:0;
      padding:0;
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .rewards-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.92);
      font-size:13px;
      line-height:1.35;
    }

    .rewards-item .amount{
      color:rgba(255,255,255,0.68);
      white-space:nowrap;
      font-size:12px;
    }

    .rewards-empty{
      min-height:166px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,0.58);
      font-size:14px;
      text-align:center;
      padding:18px;
    }

    .login-popup{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(4,11,31,0.52);
      backdrop-filter:blur(8px);
    }

    .login-popup.is-open{
      display:flex;
    }

    .login-popup-card{
      position:relative;
      width:min(430px, 100%);
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.22);
      padding:24px 22px 22px;
      background:linear-gradient(145deg, rgba(12,34,78,0.95), rgba(7,17,44,0.95));
      box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 18px 48px rgba(0,0,0,0.45),0 0 56px rgba(46,223,255,0.28),0 0 34px rgba(255,98,183,0.25);
      overflow:hidden;
    }

    .login-popup-card::before{
      content:'';
      position:absolute;
      inset:-35%;
      background:radial-gradient(circle at 20% 20%, rgba(67,244,255,0.22), transparent 58%),radial-gradient(circle at 85% 10%, rgba(255,76,166,0.2), transparent 50%);
      pointer-events:none;
    }

    .login-popup-close{
      position:absolute;
      top:12px;
      right:12px;
      width:34px;
      height:34px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:20px;
      line-height:1;
      cursor:pointer;
      z-index:1;
      transition:background-color .2s ease,color .2s ease;
    }

    .login-popup-close:hover{
      background:rgba(255,255,255,0.22);
      color:#fff;
    }

    .login-popup-title{
      position:relative;
      z-index:1;
      margin:0;
      font-size:26px;
      line-height:1.18;
      color:#fff;
      letter-spacing:.01em;
    }

    .login-popup-copy{
      position:relative;
      z-index:1;
      margin:10px 0 18px;
      color:rgba(255,255,255,0.74);
      font-size:14px;
      line-height:1.45;
    }

    .login-popup-form{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .login-popup-loading{
      position:relative;
      z-index:1;
      min-height:190px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      color:rgba(255,255,255,0.82);
      opacity:0;
      transform:translateY(4px);
      transition:opacity .32s ease,transform .32s ease;
      pointer-events:none;
    }

    .login-popup-main{
      position:relative;
      z-index:1;
      opacity:0;
      transform:translateY(8px);
      filter:blur(2px);
      transition:opacity .42s ease,transform .42s ease,filter .42s ease;
      pointer-events:none;
    }

    .login-popup-spinner{
      width:40px;
      height:40px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.24);
      border-top-color:#ffffff;
      animation:popup-spin .9s linear infinite;
    }

    .login-popup.loading .login-popup-loading{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .login-popup.loading .login-popup-main{
      opacity:0;
      transform:translateY(8px);
      filter:blur(2px);
      pointer-events:none;
    }

    .login-popup.show-main .login-popup-loading{
      opacity:0;
      transform:translateY(-6px);
      pointer-events:none;
    }

    .login-popup.show-main .login-popup-main{
      opacity:1;
      transform:translateY(0);
      filter:blur(0);
      pointer-events:auto;
    }

    @keyframes popup-spin{
      to{ transform:rotate(360deg); }
    }

    .login-popup-input{
      width:100%;
      height:48px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.28);
      background:rgba(255,255,255,0.12);
      color:#fff;
      font-size:15px;
      padding:0 14px;
      outline:none;
    }

    .login-popup-input::placeholder{
      color:rgba(255,255,255,0.5);
    }

    .login-popup-submit{
      width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.7);
      background:rgba(255,255,255,0.18);
      color:#fff;
      font-size:16px;
      font-weight:680;
      cursor:pointer;
      transition:background-color .2s ease,transform .2s ease;
    }

    .login-popup-submit:hover{
      background:rgba(255,255,255,0.3);
      transform:translateY(-1px);
    }

    .login-popup-status{
      position:relative;
      z-index:1;
      min-height:18px;
      margin-top:2px;
      font-size:12px;
      color:rgba(255,255,255,0.72);
      line-height:1.35;
    }

    .suggestion-pane{
      position:fixed;
      inset:0;
      z-index:14;
      pointer-events:none;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding:16px 16px 122px;
      opacity:0;
      transform:translateY(14px);
      transition:opacity .36s ease,transform .36s cubic-bezier(.22,1,.36,1);
    }

    body.suggestions-open .suggestion-pane{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .suggestion-panel{
      width:min(980px, 100%);
      max-height:calc(100vh - 148px);
      max-height:calc(100dvh - 148px);
      overflow:auto;
      border-radius:26px;
      border:1px solid rgba(15,23,42,0.1);
      background:linear-gradient(180deg, rgba(251,252,255,0.96), rgba(243,246,251,0.96));
      color:#0f172a;
      box-shadow:0 18px 50px rgba(15,23,42,0.09);
      padding:18px 16px 14px;
      backdrop-filter:blur(6px);
    }

    body.mode-q .suggestion-panel{
      border-color:rgba(255,255,255,0.15);
      background:linear-gradient(180deg, rgba(20,24,34,0.92), rgba(12,15,23,0.92));
      color:#f3f6ff;
      box-shadow:0 20px 52px rgba(0,0,0,0.48);
    }

    .suggestion-thread{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .chat-turn-user{
      display:flex;
      justify-content:flex-end;
    }

    .chat-user-bubble{
      max-width:min(82%, 700px);
      padding:11px 14px;
      border-radius:18px 18px 4px 18px;
      background:#111827;
      color:#fff;
      font-size:15px;
      line-height:1.45;
      word-break:break-word;
      box-shadow:0 10px 24px rgba(15,23,42,0.18);
    }

    body.mode-q .chat-user-bubble{
      background:#dbe7ff;
      color:#121a2d;
      box-shadow:0 10px 24px rgba(0,0,0,0.3);
    }

    .chat-turn-assistant{
      display:flex;
      justify-content:flex-start;
    }

    .chat-assistant-card{
      width:min(100%, 860px);
      border-radius:18px;
      border:1px solid rgba(15,23,42,0.11);
      background:#ffffff;
      padding:12px;
      color:#111827;
      box-shadow:0 8px 22px rgba(15,23,42,0.08);
    }

    body.mode-q .chat-assistant-card{
      border-color:rgba(255,255,255,0.16);
      background:rgba(255,255,255,0.04);
      color:#eaf1ff;
      box-shadow:none;
    }

    .chat-assistant-head{
      font-size:12px;
      letter-spacing:.07em;
      text-transform:uppercase;
      color:#52637f;
      margin-bottom:8px;
      font-weight:700;
    }

    body.mode-q .chat-assistant-head{
      color:#9bb0d4;
    }

    .suggestion-loading{
      min-height:74px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
      color:#4f647f;
      font-size:14px;
    }

    body.mode-q .suggestion-loading{
      color:#b2c4e7;
    }

    .suggestion-loading .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:currentColor;
      opacity:.28;
      animation:suggest-dot 1.1s ease-in-out infinite;
    }

    .suggestion-loading .dot:nth-child(2){ animation-delay:.16s; }
    .suggestion-loading .dot:nth-child(3){ animation-delay:.32s; }

    @keyframes suggest-dot{
      0%, 80%, 100%{ transform:translateY(0); opacity:.25; }
      40%{ transform:translateY(-4px); opacity:.95; }
    }

    .suggestion-list{
      list-style:none;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .suggestion-item{
      display:flex;
      align-items:flex-start;
      gap:12px;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,0.08);
      background:#ffffff;
      color:#0f172a;
      transition:border-color .18s ease,background-color .18s ease;
    }

    .suggestion-item:hover{
      border-color:rgba(26,115,232,0.3);
      background:#f8fbff;
    }

    body.mode-q .suggestion-item{
      border-color:rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      color:#edf2ff;
    }

    body.mode-q .suggestion-item:hover{
      border-color:rgba(143,185,255,0.4);
      background:rgba(87,132,209,0.14);
    }

    .suggestion-index{
      width:24px;
      min-width:24px;
      height:24px;
      border-radius:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#e8eefb;
      color:#2f4b7a;
      font-size:12px;
      font-weight:700;
      margin-top:1px;
    }

    body.mode-q .suggestion-index{
      background:rgba(153,184,235,0.2);
      color:#d9e8ff;
    }

    .suggestion-text{
      font-size:14px;
      line-height:1.45;
      color:inherit;
      word-break:break-word;
    }

    .show-more-wrap{
      margin-top:12px;
      display:flex;
      justify-content:center;
    }

    .show-more-button{
      border:1px solid #dadce0;
      border-radius:999px;
      height:38px;
      min-width:152px;
      padding:0 20px;
      background:#fff;
      color:#1a73e8;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:background-color .2s ease,border-color .2s ease,transform .2s ease;
    }

    .show-more-button:hover{
      background:#f8f9fa;
      border-color:#c6c9ce;
      transform:translateY(-1px);
    }

    .show-more-button:disabled{
      opacity:.65;
      cursor:wait;
      transform:none;
    }

    body.mode-q .show-more-button{
      border-color:rgba(153,184,235,0.5);
      background:rgba(255,255,255,0.04);
      color:#9fc3ff;
    }

    body.mode-q .show-more-button:hover{
      background:rgba(133,171,241,0.14);
      border-color:rgba(153,184,235,0.75);
    }

    .suggestion-error{
      margin-top:8px;
      font-size:13px;
      color:#b42318;
    }

    body.mode-q .suggestion-error{
      color:#ffb6b6;
    }

    @media (max-width:700px){
      .suggestion-pane{
        padding:10px 10px 118px;
      }

      .suggestion-panel{
        max-height:calc(100vh - 136px);
        max-height:calc(100dvh - 136px);
        border-radius:18px;
        padding:12px 10px;
      }

      .chat-user-bubble{
        max-width:92%;
      }
    }

    @media (max-width:700px){
      .blue-mode-panel{
        top:18px;
        left:16px;
        width:calc(100vw - 32px);
      }

      .vx-title{
        font-size:clamp(28px, 12vw, 44px);
      }

      .cash-action-btn{
        font-size:17px;
      }
    }
  </style>
</head>
<body>

<div class="fixed-wrapper">
  <div class="search-container" id="searchContainer">

    <form class="search-box" id="searchForm">
      <textarea
        class="search-input"
        id="searchInput"
        placeholder="Search..."
        rows="1"
      ></textarea>
      <button class="send-button" id="sendButton" type="submit">
        <svg class="icon-search" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16.5" y2="16.5"></line>
        </svg>
        <svg class="icon-arrow" viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
    <div class="attachment-list" id="attachmentList" aria-live="polite"></div>

    <div class="button-group">
      <button class="sub-button" id="qBtn">unsolved</button>
      <button class="sub-button active" id="aBtn">Solved&amp; Proofs</button>
    </div>

    <div class="hint">Scroll to switch — Enter for a new line, Shift + Enter to confirm</div>

  </div>
</div>

<section class="suggestion-pane" id="suggestionPane" aria-live="polite" aria-label="Suggestion results">
  <div class="suggestion-panel">
    <div id="suggestionBody" class="suggestion-thread"></div>
  </div>
</section>

<div class="selection-mode" id="selectionMode" style="display:none;">
  <button class="selection-cancel" id="selectionCancel" type="button" aria-label="Cancel">×</button>
  <div class="selection-option" data-value="Lean">Lean</div>
  <div class="selection-option" data-value="Coq">Coq</div>
  <div class="selection-option" data-value="Isabelle">Isabelle</div>
  <div class="selection-option" data-value="Agda">Agda</div>
</div>

<div class="blue-mode-shell" id="blueModeShell">
  <section class="blue-mode-panel" id="blueModePanel" aria-live="polite">
    <h1 class="vx-title">Vx -- ($ --)</h1>

    <div class="cash-actions" aria-label="Withdraw and deposit actions">
      <button class="cash-action-btn" id="withdrawBtn" type="button">Withdrawals</button>
      <span class="cash-divider">/</span>
      <button class="cash-action-btn" id="depositBtn" type="button">Deposits</button>
    </div>

    <div class="rewards-caption">Rewards</div>
    <div class="rewards-list" id="rewardsList"></div>
  </section>

  <div class="login-popup" id="loginPopup" aria-hidden="true">
    <div class="login-popup-card" role="dialog" aria-modal="true" aria-labelledby="loginPopupTitle">
      <button class="login-popup-close" id="loginPopupClose" type="button" aria-label="Close login popup">×</button>
      <div class="login-popup-loading" id="loginPopupLoading">
        <div class="login-popup-spinner" aria-hidden="true"></div>
        <div id="loginLoadingText">Checking server...</div>
      </div>
      <div class="login-popup-main" id="loginPopupMain">
        <h2 class="login-popup-title" id="loginPopupTitle">Login Approval</h2>
        <p class="login-popup-copy" id="loginPopupCopy">Enter your email address to receive an approval link and sign in.</p>
        <form class="login-popup-form" id="loginPopupForm">
          <input class="login-popup-input" id="loginEmailInput" type="email" inputmode="email" autocomplete="email" required placeholder="name@example.com" />
          <button class="login-popup-submit" type="submit">Send Approval Email</button>
        </form>
        <div class="login-popup-status" id="loginPopupStatus"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const bodyEl = document.body;
  const qBtn = document.getElementById('qBtn');
  const aBtn = document.getElementById('aBtn');
  const form = document.getElementById('searchForm');
  const input = document.getElementById('searchInput');
  const container = document.getElementById('searchContainer');
  const sendButton = document.getElementById('sendButton');
  const attachmentList = document.getElementById('attachmentList');
  const suggestionPane = document.getElementById('suggestionPane');
  const suggestionBody = document.getElementById('suggestionBody');
  const suggestionPanel = suggestionPane ? suggestionPane.querySelector('.suggestion-panel') : null;
  const EDITOR_RETURN_KEY = 'ivucxEditorReturn';
  let attachedFiles = [];
  const MAX_ATTACHMENTS = 5;
  const ATTACHMENT_ANIM_MS = 180;
  let selectionMode = false;
  let rememberedContent = '';
  let rememberedFiles = [];
  const selectionModeEl = document.getElementById('selectionMode');
  const selectionCancel = document.getElementById('selectionCancel');
  const blueModePanel = document.getElementById('blueModePanel');
  const rewardsList = document.getElementById('rewardsList');
  const loginPopup = document.getElementById('loginPopup');
  const loginPopupClose = document.getElementById('loginPopupClose');
  const loginPopupForm = document.getElementById('loginPopupForm');
  const loginEmailInput = document.getElementById('loginEmailInput');
  const loginPopupStatus = document.getElementById('loginPopupStatus');
  const loginPopupCopy = document.getElementById('loginPopupCopy');
  const loginLoadingText = document.getElementById('loginLoadingText');
  const withdrawBtn = document.getElementById('withdrawBtn');
  const depositBtn = document.getElementById('depositBtn');
  const editorReturnContext = readEditorReturnContext();

  function readEditorReturnContext(){
    try{
      const raw = sessionStorage.getItem(EDITOR_RETURN_KEY);
      if(!raw) return null;
      sessionStorage.removeItem(EDITOR_RETURN_KEY);
      const parsed = JSON.parse(raw);
      if(!parsed || typeof parsed !== 'object') return null;
      return parsed;
    }catch(err){
      return null;
    }
  }

  function setMode(isQ){
    if(isQ){
      bodyEl.classList.add('mode-q');
      qBtn.classList.add('active');
      aBtn.classList.remove('active');
    } else {
      bodyEl.classList.remove('mode-q');
      aBtn.classList.add('active');
      qBtn.classList.remove('active');
    }
  }

  setMode(false);

  qBtn.addEventListener('click',e=>{e.preventDefault();setMode(true);});
  aBtn.addEventListener('click',e=>{e.preventDefault();setMode(false);});

  function formatFileSize(bytes){
    if(bytes < 1024) return bytes + 'B';
    if(bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
  }

  function renderAttachments(){
    if(!attachmentList) return;
    attachmentList.innerHTML = '';

    if(attachedFiles.length === 0){
      attachmentList.classList.remove('has-files');
      requestAnimationFrame(adjustTextarea);
      return;
    }

    attachedFiles.forEach((file, index)=>{
      const chip = document.createElement('div');
      chip.className = 'attachment-chip';

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = file.name || 'untitled';

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = formatFileSize(file.size || 0);

      const remove = document.createElement('button');
      remove.className = 'remove';
      remove.type = 'button';
      remove.textContent = '×';
      remove.setAttribute('aria-label', 'Remove ' + (file.name || 'file'));
      remove.addEventListener('click', ()=>{
        if(remove.disabled) return;
        remove.disabled = true;
        chip.classList.add('is-removing');
        setTimeout(()=>{
          attachedFiles.splice(index, 1);
          renderAttachments();
        }, ATTACHMENT_ANIM_MS);
      });

      chip.append(name, meta, remove);
      attachmentList.appendChild(chip);
      requestAnimationFrame(()=>{
        chip.classList.add('is-visible');
      });
    });

    attachmentList.classList.add('has-files');
    requestAnimationFrame(adjustTextarea);
  }

  function collectClipboardFiles(clipboardData){
    if(!clipboardData || !clipboardData.items) return [];
    const files = [];

    for(const item of clipboardData.items){
      if(item.kind !== 'file') continue;
      const file = item.getAsFile();
      if(file) files.push(file);
    }

    return files;
  }

  function handlePasteFiles(e){
    const files = collectClipboardFiles(e.clipboardData);
    if(files.length === 0) return;

    const availableSlots = Math.max(0, MAX_ATTACHMENTS - attachedFiles.length);
    if(availableSlots === 0){
      e.preventDefault();
      return;
    }

    e.preventDefault();
    attachedFiles = attachedFiles.concat(files.slice(0, availableSlots));
    renderAttachments();
  }

  window.addEventListener('paste', handlePasteFiles);

  function enterSelectionMode(){
    selectionMode = true;
    rememberedContent = input.value;
    rememberedFiles = [...attachedFiles];
    fixedWrapper.style.display = 'none';
    selectionModeEl.style.display = 'flex';
  }

  function exitSelectionMode(restore = true){
    selectionMode = false;
    if(restore){
      input.value = rememberedContent;
      attachedFiles = [...rememberedFiles];
    }
    renderAttachments();
    fixedWrapper.style.removeProperty('display');
    selectionModeEl.style.display = 'none';
    adjustTextarea();
  }

  function openEditor(choice){
    const initPayload = {
      proofAssistant: choice,
      summary: rememberedContent || '',
      draft: rememberedContent || '',
      attachedFileNames: rememberedFiles.map(file=>file.name),
      sourceState: state,
      createdAt: new Date().toISOString()
    };

    try{
      sessionStorage.setItem('ivucxEditorInit', JSON.stringify(initPayload));
    }catch(err){
      console.warn('Failed to store editor init payload:', err);
    }

    const params = new URLSearchParams({ lang: choice });
    window.location.href = `editor.html?${params.toString()}`;
  }

  function handleSelection(choice){
    openEditor(choice);
  }

  if(selectionCancel){
    selectionCancel.addEventListener('click', ()=>{
      exitSelectionMode(true);
    });
  }

  // Add click handlers for selection options
  document.querySelectorAll('.selection-option').forEach(option => {
    option.addEventListener('click', () => {
      const choice = option.dataset.value;
      handleSelection(choice);
    });
  });

  if(loginPopupClose){
    loginPopupClose.addEventListener('click', ()=>{
      loginPopupDismissed = true;
      closeLoginPopup(true);
    });
  }

  if(loginPopup){
    loginPopup.addEventListener('click', e=>{
      if(e.target !== loginPopup) return;
      loginPopupDismissed = true;
      closeLoginPopup(true);
    });
  }

  if(loginPopupForm){
    loginPopupForm.addEventListener('submit', e=>{
      e.preventDefault();

      if(!loginEmailInput) return;
      const email = loginEmailInput.value.trim();
      if(email.length === 0){
        setPopupStatus('Email address is required.');
        loginEmailInput.focus();
        return;
      }

      setPopupStatus(`Approval mail sent to ${email}.`);
      loginPopupDismissed = true;
      setTimeout(()=>{
        if(state === 2){
          closeLoginPopup(true);
        }
      }, 250);
    });
  }

  window.addEventListener('keydown', e=>{
    if(e.key !== 'Escape') return;
    if(!loginPopup || !loginPopup.classList.contains('is-open')) return;
    loginPopupDismissed = true;
    closeLoginPopup(true);
  });

  if(withdrawBtn){
    withdrawBtn.addEventListener('click', ()=>{
      if(!blueModeLoggedIn){
        loginPopupDismissed = false;
        showPopupMain(DEFAULT_LOGIN_COPY);
      }
    });
  }

  if(depositBtn){
    depositBtn.addEventListener('click', ()=>{
      if(!blueModeLoggedIn){
        loginPopupDismissed = false;
        showPopupMain(DEFAULT_LOGIN_COPY);
      }
    });
  }

  let expandedFixedHeight = null;
  const fixedWrapper = document.querySelector('.fixed-wrapper');
  const EXPAND_THRESHOLD = 100; // Expand when height exceeds this (pixels)
  const COLLAPSE_AT_OR_BELOW_LINES = 5; // Collapse when rendered lines are 5 or fewer
  let previousLineCount = null;
  let state = 0;
  let blueModeDraft = '';
  let blueModeLoggedIn = false;
  let blueModeRewards = [];
  let blueModeCheckToken = 0;
  let loginPopupDismissed = false;
  let suggestionAbortController = null;
  let hasSuggestionResults = false;
  let suggestionTurnSeq = 0;
  let suggestionTurns = [];
  const LOGIN_CHECK_TIMEOUT_MS = 3500;
  const SUGGESTION_COUNT = 10;
  const POPUP_LOADING_TEXT = 'Checking server...';
  const DEFAULT_LOGIN_COPY = 'Enter your email address to receive an approval link and sign in.';
  const NO_RESPONSE_COPY = 'No response from server. Please continue with email approval login.';

  function setPopupStatus(message){
    if(!loginPopupStatus) return;
    loginPopupStatus.textContent = message || '';
  }

  function showBlueModePanel(){
    if(!blueModePanel) return;
    blueModePanel.classList.add('is-visible');
  }

  function hideBlueModePanel(){
    if(!blueModePanel) return;
    blueModePanel.classList.remove('is-visible');
  }

  function openLoginPopup(hidePanel = true){
    if(!loginPopup) return;
    if(hidePanel) hideBlueModePanel();
    loginPopup.classList.add('is-open');
    loginPopup.setAttribute('aria-hidden', 'false');
  }

  function setPopupCopy(message){
    if(!loginPopupCopy) return;
    loginPopupCopy.textContent = message || DEFAULT_LOGIN_COPY;
  }

  function showPopupLoading(){
    if(!loginPopup) return;
    if(loginLoadingText){
      loginLoadingText.textContent = POPUP_LOADING_TEXT;
    }
    openLoginPopup(true);
    loginPopup.classList.add('loading');
    loginPopup.classList.remove('show-main');
    setPopupStatus('');
    setPopupCopy(DEFAULT_LOGIN_COPY);
  }

  function showPopupMain(copyMessage, statusMessage = ''){
    if(!loginPopup) return;
    openLoginPopup(true);
    loginPopup.classList.remove('loading');
    setPopupCopy(copyMessage || DEFAULT_LOGIN_COPY);
    setPopupStatus(statusMessage);

    requestAnimationFrame(()=>{
      if(!loginPopup || !loginPopup.classList.contains('is-open')) return;
      loginPopup.classList.add('show-main');
      if(loginEmailInput){
        loginEmailInput.focus();
      }
    });
  }

  function closeLoginPopup(showPanel = true){
    if(!loginPopup) return;
    loginPopup.classList.remove('is-open');
    loginPopup.classList.remove('loading');
    loginPopup.classList.remove('show-main');
    loginPopup.setAttribute('aria-hidden', 'true');
    setPopupStatus('');
    setPopupCopy(DEFAULT_LOGIN_COPY);
    if(loginLoadingText){
      loginLoadingText.textContent = POPUP_LOADING_TEXT;
    }
    if(showPanel) showBlueModePanel();
  }

  function syncSearchDocking(){
    if(!fixedWrapper) return;
    if(hasSuggestionResults){
      fixedWrapper.style.justifyContent = 'flex-end';
      return;
    }

    if(container.classList.contains('expanded')){
      fixedWrapper.style.justifyContent = 'flex-end';
      return;
    }

    fixedWrapper.style.justifyContent = 'center';
  }

  function setSuggestionPaneOpen(isOpen){
    hasSuggestionResults = isOpen;
    bodyEl.classList.toggle('suggestions-open', isOpen);
    syncSearchDocking();
  }

  function clearSuggestionPane(){
    if(suggestionAbortController){
      suggestionAbortController.abort();
      suggestionAbortController = null;
    }
    if(sendButton){
      sendButton.disabled = false;
    }

    suggestionTurns = [];

    if(suggestionBody){
      suggestionBody.innerHTML = '';
    }

    setSuggestionPaneOpen(false);
  }

  function scrollSuggestionPanelToBottom(){
    if(!suggestionPanel) return;
    requestAnimationFrame(()=>{
      suggestionPanel.scrollTop = suggestionPanel.scrollHeight;
    });
  }

  function normalizeSuggestionText(item, index, query){
    if(typeof item === 'string' && item.trim().length > 0){
      return item.trim();
    }

    if(item && typeof item === 'object'){
      if(typeof item.text === 'string' && item.text.trim().length > 0){
        return item.text.trim();
      }
      if(typeof item.title === 'string' && item.title.trim().length > 0){
        return item.title.trim();
      }
      if(typeof item.suggestion === 'string' && item.suggestion.trim().length > 0){
        return item.suggestion.trim();
      }
    }

    return `${query} - suggestion ${index + 1}`;
  }

  function normalizeSuggestionBatch(rawSuggestions, query, startAt){
    const source = Array.isArray(rawSuggestions) ? rawSuggestions : [];
    const normalized = [];
    for(let i = 0; i < source.length; i += 1){
      normalized.push(normalizeSuggestionText(source[i], startAt + i, query));
    }
    return normalized;
  }

  function renderSuggestionThread(){
    if(!suggestionBody) return;

    suggestionBody.innerHTML = '';

    if(suggestionTurns.length === 0){
      setSuggestionPaneOpen(false);
      return;
    }

    const thread = document.createElement('div');
    thread.className = 'suggestion-thread';

    suggestionTurns.forEach(turn=>{
      const userRow = document.createElement('div');
      userRow.className = 'chat-turn-user';

      const userBubble = document.createElement('div');
      userBubble.className = 'chat-user-bubble';
      userBubble.textContent = turn.query;
      userRow.appendChild(userBubble);
      thread.appendChild(userRow);

      const assistantRow = document.createElement('div');
      assistantRow.className = 'chat-turn-assistant';

      const assistantCard = document.createElement('div');
      assistantCard.className = 'chat-assistant-card';

      const head = document.createElement('div');
      head.className = 'chat-assistant-head';
      head.textContent = 'Suggestions';
      assistantCard.appendChild(head);

      if(turn.loading && turn.suggestions.length === 0){
        const loading = document.createElement('div');
        loading.className = 'suggestion-loading';
        loading.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span><span>Collecting suggestions...</span>';
        assistantCard.appendChild(loading);
      }else{
        const list = document.createElement('ol');
        list.className = 'suggestion-list';

        turn.suggestions.forEach((text, index)=>{
          const item = document.createElement('li');
          item.className = 'suggestion-item';

          const indexBadge = document.createElement('span');
          indexBadge.className = 'suggestion-index';
          indexBadge.textContent = String(index + 1);

          const label = document.createElement('span');
          label.className = 'suggestion-text';
          label.textContent = text;

          item.append(indexBadge, label);
          list.appendChild(item);
        });

        assistantCard.appendChild(list);
      }

      if(turn.error){
        const error = document.createElement('div');
        error.className = 'suggestion-error';
        error.textContent = turn.error;
        assistantCard.appendChild(error);
      }

      const canShowMore = turn.hasMore && turn.suggestions.length >= SUGGESTION_COUNT && !turn.error;
      if(canShowMore){
        const moreWrap = document.createElement('div');
        moreWrap.className = 'show-more-wrap';

        const moreBtn = document.createElement('button');
        moreBtn.type = 'button';
        moreBtn.className = 'show-more-button';
        moreBtn.dataset.turnId = String(turn.id);
        moreBtn.textContent = turn.loadingMore ? 'Loading...' : 'Show more';
        moreBtn.disabled = !!turn.loadingMore;
        moreWrap.appendChild(moreBtn);
        assistantCard.appendChild(moreWrap);
      }

      assistantRow.appendChild(assistantCard);
      thread.appendChild(assistantRow);
    });

    suggestionBody.appendChild(thread);
    setSuggestionPaneOpen(true);
    scrollSuggestionPanelToBottom();
  }

  async function fetchSuggestionBatch(turn, append = false){
    if(!turn) return;

    if(suggestionAbortController){
      suggestionAbortController.abort();
      suggestionAbortController = null;
    }

    const controller = new AbortController();
    suggestionAbortController = controller;

    const offset = append ? turn.suggestions.length : 0;

    if(append){
      turn.loadingMore = true;
    }else{
      turn.loading = true;
      turn.loadingMore = false;
      turn.error = '';
    }
    renderSuggestionThread();

    try{
      const payload = {
        mode: bodyEl.classList.contains('mode-q') ? 'q' : 'a',
        state,
        query: turn.query,
        files: turn.files || [],
        limit: SUGGESTION_COUNT,
        offset
      };

      const res = await fetch('/api/suggest', {
        method:'POST',
        credentials:'include',
        headers:{
          'Content-Type':'application/json',
          'Accept':'application/json'
        },
        body:JSON.stringify(payload),
        signal:controller.signal
      });

      if(!res.ok){
        throw new Error(`Suggest API failed: ${res.status}`);
      }

      const data = await res.json();
      if(controller !== suggestionAbortController) return;

      const normalized = normalizeSuggestionBatch(data && data.suggestions, turn.query, offset);
      if(append){
        turn.suggestions = turn.suggestions.concat(normalized);
      }else{
        turn.suggestions = normalized;
      }

      turn.hasMore = normalized.length >= SUGGESTION_COUNT;
      turn.error = '';
    }catch(err){
      if(err && err.name === 'AbortError') return;
      if(controller !== suggestionAbortController) return;
      turn.error = 'Could not fetch suggestions from server.';
      turn.hasMore = false;
    }finally{
      if(controller === suggestionAbortController){
        suggestionAbortController = null;
      }
      turn.loading = false;
      turn.loadingMore = false;
      if(sendButton) sendButton.disabled = false;
      renderSuggestionThread();
    }
  }

  async function requestSuggestions(query, fileNames){
    if(!query) return;

    const turn = {
      id: ++suggestionTurnSeq,
      query,
      files: Array.isArray(fileNames) ? [...fileNames] : [],
      suggestions:[],
      loading:true,
      loadingMore:false,
      hasMore:true,
      error:''
    };

    suggestionTurns.push(turn);
    if(sendButton) sendButton.disabled = true;
    renderSuggestionThread();
    await fetchSuggestionBatch(turn, false);
  }

  if(suggestionBody){
    suggestionBody.addEventListener('click', e=>{
      const target = e.target instanceof Element ? e.target : null;
      if(!target) return;

      const button = target.closest('.show-more-button');
      if(!button) return;

      const turnId = Number(button.dataset.turnId);
      if(!Number.isFinite(turnId)) return;

      const turn = suggestionTurns.find(entry=>entry.id === turnId);
      if(!turn || turn.loading || turn.loadingMore || !turn.hasMore) return;

      fetchSuggestionBatch(turn, true);
    });
  }

  function readBooleanField(payload, key){
    if(!payload || typeof payload !== 'object') return null;
    if(!(key in payload)) return null;
    const value = payload[key];
    if(typeof value === 'boolean') return value;
    if(typeof value === 'number') return value > 0;
    if(typeof value === 'string'){
      const normalized = value.trim().toLowerCase();
      if(normalized === 'true' || normalized === 'ok' || normalized === 'logged_in' || normalized === 'authenticated') return true;
      if(normalized === 'false' || normalized === 'none' || normalized === 'logged_out' || normalized === 'unauthorized') return false;
    }
    return null;
  }

  function parseLoginState(payload, statusCode){
    const knownKeys = ['loggedIn', 'isLoggedIn', 'authenticated', 'isAuthenticated', 'login', 'status', 'state', 'result'];
    for(const key of knownKeys){
      const parsed = readBooleanField(payload, key);
      if(parsed !== null) return parsed;
    }
    return statusCode >= 200 && statusCode < 300;
  }

  function normalizeRewardItem(item, index){
    if(typeof item === 'string'){
      return {
        title: item,
        amount: ''
      };
    }

    if(item && typeof item === 'object'){
      const title = typeof item.title === 'string'
        ? item.title
        : (typeof item.name === 'string' ? item.name : `Reward ${index + 1}`);

      let amount = '';
      if(typeof item.amount === 'string'){
        amount = item.amount;
      }else if(typeof item.value === 'string'){
        amount = item.value;
      }else if(typeof item.points === 'number'){
        amount = `${item.points} pts`;
      }else if(typeof item.points === 'string'){
        amount = item.points;
      }

      return { title, amount };
    }

    return {
      title: `Reward ${index + 1}`,
      amount: ''
    };
  }

  function parseRewards(payload){
    if(!payload || typeof payload !== 'object') return [];

    const candidates = ['rewards', 'rewardList', 'list'];
    for(const key of candidates){
      if(Array.isArray(payload[key])){
        return payload[key].slice(0, 8).map((item, index)=>normalizeRewardItem(item, index));
      }
    }

    return [];
  }

  function renderRewards(){
    if(!rewardsList) return;
    rewardsList.innerHTML = '';

    if(!blueModeLoggedIn){
      const wrap = document.createElement('div');
      wrap.className = 'rewards-login-wrap';

      const loginBtn = document.createElement('button');
      loginBtn.type = 'button';
      loginBtn.className = 'rewards-login-btn';
      loginBtn.textContent = 'Login';
      loginBtn.addEventListener('click', ()=>{
        loginPopupDismissed = false;
        showPopupMain(DEFAULT_LOGIN_COPY);
      });

      wrap.appendChild(loginBtn);
      rewardsList.appendChild(wrap);
      return;
    }

    if(blueModeRewards.length === 0){
      const empty = document.createElement('div');
      empty.className = 'rewards-empty';
      empty.textContent = 'No rewards available yet.';
      rewardsList.appendChild(empty);
      return;
    }

    const list = document.createElement('ul');
    list.className = 'rewards-items';

    blueModeRewards.forEach(item=>{
      const row = document.createElement('li');
      row.className = 'rewards-item';

      const title = document.createElement('span');
      title.textContent = item.title;
      row.appendChild(title);

      const amount = document.createElement('span');
      amount.className = 'amount';
      amount.textContent = item.amount || '--';
      row.appendChild(amount);

      list.appendChild(row);
    });

    rewardsList.appendChild(list);
  }

  function exitBlueMode(){
    blueModeCheckToken += 1;
    blueModeLoggedIn = false;
    blueModeRewards = [];
    loginPopupDismissed = false;
    if(loginEmailInput){
      loginEmailInput.value = '';
    }
    closeLoginPopup(false);
    hideBlueModePanel();
  }

  async function enterBlueMode(){
    blueModeCheckToken += 1;
    const token = blueModeCheckToken;
    const startedAt = performance.now();

    blueModeLoggedIn = false;
    blueModeRewards = [];
    loginPopupDismissed = false;
    hideBlueModePanel();
    closeLoginPopup(false);

    const loadingTimer = setTimeout(()=>{
      if(state !== 2 || token !== blueModeCheckToken) return;
      showPopupLoading();
    }, 100);

    const loginResult = await checkLogin();
    clearTimeout(loadingTimer);
    if(state !== 2 || token !== blueModeCheckToken) return;

    blueModeLoggedIn = loginResult.loggedIn;
    blueModeRewards = loginResult.rewards;
    renderRewards();

    if(blueModeLoggedIn){
      closeLoginPopup(true);
      return;
    }

    if(loginPopupDismissed){
      closeLoginPopup(true);
      return;
    }

    const noResponse = loginResult.reason === 'timeout' || loginResult.reason === 'network';
    if(noResponse){
      const elapsed = performance.now() - startedAt;
      if(elapsed < LOGIN_CHECK_TIMEOUT_MS){
        await new Promise(resolve=>setTimeout(resolve, LOGIN_CHECK_TIMEOUT_MS - elapsed));
        if(state !== 2 || token !== blueModeCheckToken) return;
      }
      showPopupMain(NO_RESPONSE_COPY, 'No response in 3.5 seconds.');
      return;
    }

    showPopupMain(DEFAULT_LOGIN_COPY);
  }

  function restoreSummaryFromEditor(){
    if(!editorReturnContext) return;

    const summary = typeof editorReturnContext.summary === 'string' ? editorReturnContext.summary : '';

    selectionMode = false;
    selectionModeEl.style.display = 'none';
    input.value = summary;
    rememberedContent = summary;
    rememberedFiles = [];
    attachedFiles = [];
    renderAttachments();
    clearSuggestionPane();
    fixedWrapper.style.removeProperty('display');
    bodyEl.classList.remove('login-check');
    bodyEl.classList.add('scrolled');
    input.placeholder = 'Make Puzzler - Write a summary of the puzzler';
    state = 1;
    adjustTextarea();
  }

  restoreSummaryFromEditor();

  function getRenderedLineCountFromContentHeight(contentHeight){
    const computed = window.getComputedStyle(input);
    const lineHeight = parseFloat(computed.lineHeight) || 22.4;
    const paddingTop = parseFloat(computed.paddingTop) || 0;
    const paddingBottom = parseFloat(computed.paddingBottom) || 0;
    const textOnlyHeight = Math.max(0, contentHeight - paddingTop - paddingBottom);
    return Math.max(1, Math.round(textOnlyHeight / lineHeight));
  }

  function isAtOrBelowLineLimit(contentHeight, lineLimit){
    const computed = window.getComputedStyle(input);
    const lineHeight = parseFloat(computed.lineHeight) || 22.4;
    const paddingTop = parseFloat(computed.paddingTop) || 0;
    const paddingBottom = parseFloat(computed.paddingBottom) || 0;
    const thresholdHeight = (lineHeight * lineLimit) + paddingTop + paddingBottom + 1;
    return contentHeight <= thresholdHeight;
  }

  function measureInputContent(){
    const tempHeight = input.style.height;
    const tempMinHeight = input.style.minHeight;
    const tempMaxHeight = input.style.maxHeight;
    const tempOverflow = input.style.overflow;

    // Neutralize expanded-mode constraints while measuring real content lines.
    input.style.minHeight = '0';
    input.style.maxHeight = 'none';
    input.style.overflow = 'hidden';
    input.style.height = 'auto';

    const contentHeight = input.scrollHeight;
    const lineCount = getRenderedLineCountFromContentHeight(contentHeight);

    input.style.height = tempHeight;
    input.style.minHeight = tempMinHeight;
    input.style.maxHeight = tempMaxHeight;
    input.style.overflow = tempOverflow;

    return { contentHeight, lineCount };
  }

  function updateLineCount(lineCount){
    if(previousLineCount === lineCount) return;
    previousLineCount = lineCount;
    input.dataset.lineCount = String(lineCount);
  }

  function getSingleLineInputHeight(){
    const computed = window.getComputedStyle(input);
    const lineHeight = parseFloat(computed.lineHeight) || 22.4;
    const paddingTop = parseFloat(computed.paddingTop) || 0;
    const paddingBottom = parseFloat(computed.paddingBottom) || 0;
    return Math.ceil(lineHeight + paddingTop + paddingBottom);
  }

  function collapseToInitialSearchBox(contentHeight){
    container.classList.remove('expanded');
    expandedFixedHeight = null;

    if(fixedWrapper){
      fixedWrapper.style.justifyContent = hasSuggestionResults ? 'flex-end' : 'center';
    }

    container.style.height = '';
    if(input.value.length === 0){
      input.style.overflow = 'hidden';
      input.style.height = getSingleLineInputHeight() + 'px';
    } else {
      input.style.overflow = 'auto';
      input.style.height = 'auto';
      input.style.height = Math.min(contentHeight, 220) + 'px';
    }
    input.scrollTop = 0;
  }

  function adjustTextarea(){
    const { contentHeight, lineCount } = measureInputContent();
    updateLineCount(lineCount);

    const isInputEmpty = input.value.length === 0;
    if(isInputEmpty){
      collapseToInitialSearchBox(contentHeight);
      return;
    }

    if(hasSuggestionResults){
      container.classList.remove('expanded');
      expandedFixedHeight = null;
      if(fixedWrapper) fixedWrapper.style.justifyContent = 'flex-end';
      container.style.height = '';
      input.style.overflow = 'auto';
      input.style.height = 'auto';
      input.style.height = Math.min(contentHeight, 148) + 'px';
      return;
    }

    const shouldCollapseByLineCount = isAtOrBelowLineLimit(contentHeight, COLLAPSE_AT_OR_BELOW_LINES);
    const shouldExpand = contentHeight > EXPAND_THRESHOLD && !shouldCollapseByLineCount;

    if(shouldExpand){
      if(!container.classList.contains('expanded')){
        container.classList.add('expanded');

        // anchor container to viewport bottom so top never leaves the screen
        if(fixedWrapper) fixedWrapper.style.justifyContent = 'flex-end';

        const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const topMargin = 16;
        const bottomSafe = 16;

        // container height to fill most of viewport
        const maxContainerHeight = Math.max(200, Math.floor(viewportH - topMargin - bottomSafe));
        container.style.height = maxContainerHeight + 'px';

        // Account for button (44px) + gap (8px) + padding (16px top/bottom)
        const buttonHeight = 44;
        const gapSize = 8;
        const boxPadding = 32; // 16px top + 16px bottom
        const reservedHeight = buttonHeight + gapSize + boxPadding;

        // Remaining space for textarea
        const availableHeight = maxContainerHeight - 24 - reservedHeight; // 24 is container bottom padding

        input.style.height = availableHeight + 'px';
        input.style.overflow = 'auto';
      } else {
        // If already expanded, update container height on resize
        const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const topMargin = 16;
        const bottomSafe = 16;
        const maxContainerHeight = Math.max(200, Math.floor(viewportH - topMargin - bottomSafe));
        container.style.height = maxContainerHeight + 'px';

        const buttonHeight = 44;
        const gapSize = 8;
        const boxPadding = 32; // 16px top + 16px bottom
        const reservedHeight = buttonHeight + gapSize + boxPadding;
        const availableHeight = maxContainerHeight - 24 - reservedHeight; // 24 is container bottom padding

        input.style.height = availableHeight + 'px';
      }

      requestAnimationFrame(()=>{
        // Always keep cursor at bottom (like command prompt)
        input.scrollTop = input.scrollHeight - input.clientHeight;
      });

    } else {
      collapseToInitialSearchBox(contentHeight);
    }
  }

  adjustTextarea();

  window.addEventListener('resize', adjustTextarea);
  let lastInputValue = input.value;
  function syncInputChanges(){
    if(input.value === lastInputValue) return;
    lastInputValue = input.value;
    adjustTextarea();
  }

  ['input','keyup','change','cut','paste','compositionend'].forEach(evt=>{
    input.addEventListener(evt, syncInputChanges);
  });
  setInterval(syncInputChanges, 120);

  input.addEventListener('keydown', e=>{

    if(e.key === 'Enter' && e.shiftKey){
      e.preventDefault();
      form.requestSubmit();
    }

  });

  form.addEventListener('submit', async e=>{

    e.preventDefault();

    const v = input.value.trim();
    const hasFiles = attachedFiles.length > 0;

    if(!v && !hasFiles) return;

    // If in scrolled mode (gray background), enter selection mode
    if(state === 1){
      enterSelectionMode();
      return;
    }

    if(state === 0){
      const attachedNames = hasFiles ? attachedFiles.map(file=>file.name) : [];
      await requestSuggestions(v, attachedNames);
      adjustTextarea();
      return;
    }

    const attachedNames = hasFiles ? attachedFiles.map(file=>file.name).join(', ') : '';
    const message = hasFiles ? `${v}\n\nFiles: ${attachedNames}` : v;
    alert('検索内容: ' + message);

    input.value = '';
    attachedFiles = [];
    renderAttachments();
    adjustTextarea();

  });

  async function checkLogin(){
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), LOGIN_CHECK_TIMEOUT_MS);

    try{
      const res = await fetch('/api/check-login', {
        method:'GET',
        credentials:'include',
        headers:{
          'Accept':'application/json'
        },
        signal:controller.signal
      });

      clearTimeout(timeoutId);

      let payload = null;
      const contentType = res.headers.get('content-type') || '';
      if(contentType.includes('application/json')){
        try{
          payload = await res.json();
        }catch(err){
          payload = null;
        }
      }

      const loggedIn = parseLoginState(payload, res.status);
      return {
        loggedIn,
        rewards: loggedIn ? parseRewards(payload) : [],
        reason: loggedIn ? 'ok' : 'not_logged_in'
      };

    }catch(err){
      clearTimeout(timeoutId);
      const reason = err && err.name === 'AbortError' ? 'timeout' : 'network';
      return {
        loggedIn:false,
        rewards:[],
        reason
      };
    }
  }

  const THRESHOLD = 40;

  let wheelAccum = 0;
  let isAnimating = false;
  let touchLastY = null;

  function applyState(next){

    if(isAnimating || next === state) return;

    const previousState = state;
    isAnimating = true;

    // Exit selection mode if changing states
    if(selectionMode){
      exitSelectionMode();
    }

    bodyEl.classList.remove('scrolled','login-check');

    if(next === 0){
      input.placeholder = 'Search...';
    }

    if(next === 1){
      bodyEl.classList.add('scrolled');
      input.placeholder = 'Make Puzzler - Write a summary of the puzzler';
    }

    if(next === 2){
      // Entering Blue Mode: save current input value and clear input
      blueModeDraft = input.value;
      input.value = '';
      bodyEl.classList.add('login-check');
      input.placeholder = 'Search...';
      enterBlueMode();
    }

    state = next;

    if(next !== 0){
      clearSuggestionPane();
    }

    if(previousState === 2 && next !== 2){
      exitBlueMode();
    }
    
    // Exiting Blue Mode: restore saved input value if it exists
    if(previousState === 2 && next !== 2 && blueModeDraft){
      input.value = blueModeDraft;
      lastInputValue = input.value;
    }
    
    if(next !== 2){
      adjustTextarea();
    }

    setTimeout(()=>{
      isAnimating = false;
    },450);

  }

  function applyForwardCycle(){
    if(state === 0) applyState(1);
    else if(state === 1) applyState(2);
    else if(state === 2) applyState(0);
  }

  function applyBackwardCycle(){
    if(state === 0) applyState(2);
    else if(state === 1) applyState(0);
    else if(state === 2) applyState(1);
  }

  function shouldSkipScrollDetection(target){
    if(!(target instanceof Element)) return false;
    return !!target.closest('.search-container.expanded, .login-popup-card, .blue-mode-panel, .suggestion-panel');
  }

  function handleScrollDelta(deltaY){
    if(isAnimating) return false;

    wheelAccum += deltaY;

    if(wheelAccum > THRESHOLD){
      wheelAccum = 0;
      applyForwardCycle();
      return true;
    }

    if(wheelAccum < -THRESHOLD){
      wheelAccum = 0;
      applyBackwardCycle();
      return true;
    }

    return false;
  }

  window.addEventListener('wheel', e=>{

    if(shouldSkipScrollDetection(e.target)){
      return;
    }

    handleScrollDelta(e.deltaY);

    e.preventDefault();

  },{passive:false});

  window.addEventListener('touchstart', e=>{
    if(e.touches.length !== 1) return;
    touchLastY = e.touches[0].clientY;
  },{passive:true});

  window.addEventListener('touchmove', e=>{
    if(touchLastY === null || e.touches.length !== 1) return;
    if(shouldSkipScrollDetection(e.target)) return;

    const currentY = e.touches[0].clientY;
    const deltaY = touchLastY - currentY;
    touchLastY = currentY;

    const changed = handleScrollDelta(deltaY);
    if(changed){
      e.preventDefault();
    }
  },{passive:false});

  window.addEventListener('touchend', ()=>{
    touchLastY = null;
    wheelAccum = 0;
  });

  window.addEventListener('touchcancel', ()=>{
    touchLastY = null;
    wheelAccum = 0;
  });

</script>

</body>
</html>
