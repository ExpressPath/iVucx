<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ChatGPT-style Search Box</title>
  <style>
    :root{
      --bg-white:#ffffff;
      --bg-black:#111111;
      --bg-navy:#0b1e3d;
    }

    *,*::before,*::after{box-sizing:border-box}

    html,body{
      height:100vh;
      margin:0;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }

    body{
      background:var(--bg-white);
      transition:background .45s ease,color .35s ease;
    }

    body.mode-q{
      background:var(--bg-black);
      color:#fff;
    }

    body.scrolled{
      background:#888888;
      color:#111;
    }

    /* 上スクロール検知時 */
    body.login-check{
      background:var(--bg-navy);
      color:#fff;
    }

    .fixed-wrapper{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .search-container{
      width:100%;
      max-width:700px;
      padding:16px;
      text-align:center;
      pointer-events:auto;
      transition:max-width .45s cubic-bezier(.4,0,.2,1), height .45s cubic-bezier(.4,0,.2,1);
      height:auto;
    }

    .search-container.expanded{
      max-width:100vw;
      height:100dvh;
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
    }

    .search-box{
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      border-radius:28px;
      padding:12px 16px;
      background:#111;
      transition:all .45s ease;
      max-height:calc(100vh - 160px);
    }

    .search-container.expanded .search-box{
      height:100%;
      max-height:none;
      border-radius:18px;
    }

    body.mode-q .search-box{ background:#fff; }

    body.scrolled .search-box{
      background:rgba(255,255,255,0.6);
      backdrop-filter:blur(8px);
    }

    body.login-check .search-box{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
    }

    .search-input{
      flex:1;
      border:none;
      outline:none;
      font-size:16px;
      background:transparent;
      color:#fff;
      resize:none;
      line-height:1.4;
      max-height:calc(100vh - 300px);
      overflow:auto;
      width:100%;
    }

    .search-container.expanded .search-input{
      max-height:none;
      height:100%;
      overflow:auto;
    }

    body.mode-q .search-input{ color:#111; }
    body.scrolled .search-input{ color:#111; }
    body.login-check .search-input{ color:#fff; caret-color:#fff; }

    .send-button{
      flex:0 0 44px;
      border:none;
      border-radius:50%;
      width:44px;
      height:44px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      color:#111;
    }

    body.mode-q .send-button{ background:#111; color:#fff; }
    body.login-check .send-button{ background:#fff; color:#0b1e3d; }

    .send-button svg{
      width:18px;
      height:18px;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .icon-arrow{display:none;}
    body.scrolled .icon-search{display:none;}
    body.scrolled .icon-arrow{display:block;}

    .button-group{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:22px;
      transition:opacity .45s ease,transform .45s ease;
    }

    body.scrolled .button-group,
    body.login-check .button-group{
      opacity:0;
      transform:translateY(-10px);
      pointer-events:none;
    }

    .sub-button{
      padding:10px 20px;
      border-radius:22px;
      border:1px solid rgba(0,0,0,0.12);
      background:#fff;
      color:#111;
      cursor:pointer;
    }

    body:not(.mode-q) .sub-button.active{ background:#fff; color:#111; }
    body:not(.mode-q) .sub-button:not(.active){ background:#111; color:#fff; }

    body.mode-q .sub-button.active{ background:#111; color:#fff; }
    body.mode-q .sub-button:not(.active){ background:#fff; color:#111; }

    .hint{
      margin-top:14px;
      font-size:13px;
      opacity:.6;
    }

    body.scrolled .hint,
    body.login-check .hint{ opacity:0; }
  </style>
</head>
<body>

<div class="fixed-wrapper">
  <div class="search-container" id="searchContainer">

    <form class="search-box" id="searchForm">
      <textarea
        class="search-input"
        id="searchInput"
        placeholder="Search..."
        rows="1"
      ></textarea>
      <button class="send-button" type="submit">
        <svg class="icon-search" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16.5" y2="16.5"></line>
        </svg>
        <svg class="icon-arrow" viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>

    <div class="button-group">
      <button class="sub-button" id="qBtn">Q</button>
      <button class="sub-button active" id="aBtn">A &amp; Proofs</button>
    </div>

    <div class="hint">Scrollで切替 — Shift+Enterで改行、Enterで送信</div>

  </div>
</div>

<script>
  const bodyEl = document.body;
  const qBtn = document.getElementById('qBtn');
  const aBtn = document.getElementById('aBtn');
  const form = document.getElementById('searchForm');
  const input = document.getElementById('searchInput');
  const container = document.getElementById('searchContainer');

  function setMode(isQ){
    if(isQ){
      bodyEl.classList.add('mode-q');
      qBtn.classList.add('active');
      aBtn.classList.remove('active');
    } else {
      bodyEl.classList.remove('mode-q');
      aBtn.classList.add('active');
      qBtn.classList.remove('active');
    }
  }

  setMode(false);

  qBtn.addEventListener('click',e=>{e.preventDefault();setMode(true);});
  aBtn.addEventListener('click',e=>{e.preventDefault();setMode(false);});

  function adjustTextarea(){
    const lineCount = input.value.split('\n').length;

    if(lineCount > 10){
      container.classList.add('expanded');

      const containerHeight = container.clientHeight;
      const buttonHeight = form.querySelector('.send-button').offsetHeight;
      const verticalPadding = 48;
      const maxAvailable = containerHeight - buttonHeight - verticalPadding;

      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, maxAvailable) + 'px';

      requestAnimationFrame(()=>{
        const cursorPos = input.selectionStart;
        input.scrollTop = input.scrollHeight;
        input.setSelectionRange(cursorPos, cursorPos);
      });

    } else {
      container.classList.remove('expanded');
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight,220) + 'px';
      input.scrollTop = 0;
    }
  }

  adjustTextarea();
  window.addEventListener('resize', adjustTextarea);
  input.addEventListener('input', adjustTextarea);

  input.addEventListener('keydown', e=>{
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener('submit', e=>{
    e.preventDefault();
    const v = input.value.trim();
    if(!v) return;
    alert('検索内容: ' + v);
    input.value = '';
    adjustTextarea();
  });

  /* ===== Login Check ===== */
  async function checkLogin(){
    try{
      const res = await fetch('/api/check-login', { method:'GET', credentials:'include' });
      console.log('Login status:', res.status);
    }catch(err){
      console.log('Login check failed (no server?)');
    }
  }

  const THRESHOLD = 40;
let wheelAccum = 0;
let state = 0; // 0=default,1=gray,2=blue
let isAnimating = false;

function applyState(next){
  if(isAnimating || next === state) return;
  isAnimating = true;

  bodyEl.classList.remove('scrolled','login-check');

  if(next === 0){
    // default
    input.placeholder = 'Search...';
  }

  if(next === 1){
    // gray
    bodyEl.classList.add('scrolled');
    input.placeholder = 'Make Puzzler - Write a summary of the puzzler';
  }

  if(next === 2){
    // blue
    bodyEl.classList.add('login-check');
    input.placeholder = 'Search...';
    checkLogin();
  }

  state = next;
  setTimeout(()=>{ isAnimating=false; },450);
}

window.addEventListener('wheel', e=>{
  if(isAnimating) return;

  wheelAccum += e.deltaY;

  if(wheelAccum > THRESHOLD){ // down scroll
    wheelAccum = 0;

    if(state === 0) applyState(1);      // default -> gray
    else if(state === 1) applyState(2); // gray -> blue
    else if(state === 2) applyState(0); // blue -> default
  }

  if(wheelAccum < -THRESHOLD){ // up scroll
    wheelAccum = 0;

    if(state === 0) applyState(2);      // default -> blue
    else if(state === 1) applyState(0); // gray -> default
    else if(state === 2) applyState(1); // blue -> gray
  }

  e.preventDefault();
},{passive:false});

</script>

</body>
</html>
